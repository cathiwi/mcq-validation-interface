ce draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"MILD"},{"id":"162","section":"Toxicity","question":"A 52-year-old woman with stage II triple-negative breast cancer receives dose-dense doxorubicin/cyclophosphamide followed by paclitaxel. After cycle 3, her LVEF declines from 62% to 47%, but she remains asymptomatic. What is the most appropriate next step?","options":{"A":"Start dexrazoxane and continue doxorubicin","B":"Add beta-blocker and ACE-inhibitor prophylactically and complete planned cycles","C":"Discontinue anthracycline and refer to cardiologist","D":"Switch to pembrolizumab therapy","E":"Continue anthracycline therapy with close monitoring"},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. This recommendation is guideline-based and supported by drug-label safety language, but most cardio-oncology management recommendations here are consensus-driven rather than trial-proven.","references":["2022 ESC Cardio-Oncology Guidelines and contemporaneous summaries: moderate asymptomatic CTRCD warrants interruption of anthracycline therapy and HF-directed treatment."],"length_bias_flag":"NONE"},{"id":"163","section":"Toxicity","question":"A patient receiving weekly paclitaxel develops grade 2 peripheral neuropathy interfering with fine motor skills. What is the best management?","options":{"A":"Switch to nab-paclitaxel as a less neurotoxic alternative; however, this is not a neuropathy-sparing switch, as nab-paclitaxel causes at least comparable and often higher neuropathy rates than solvent-based paclitaxel in prospective comparative breast cancer data.","B":"Continue same dose until the neuropathy reaches grade 3 before modifying treatment; however, this is not best practice, because the goal is to prevent worsening and potentially irreversible persistent neuropathy once functional impairment is already present at grade 2.","C":"Start duloxetine and continue chemotherapy at full dose; duloxetine may help painful chemotherapy-induced peripheral neuropathy symptomatically, but it does not address the need to modify the causative taxane dose when neuropathy is already causing functional impairment.","D":"Start vitamin B6 supplementation to treat or prevent further neuropathy progression; however, vitamin B6 is not guideline-recommended for prevention or treatment of chemotherapy-induced peripheral neuropathy, and systematic reviews have found insufficient evidence for benefit.","E":"Reduce dose or hold treatment until neuropathy improves to grade 1 or better, as grade 2 peripheral neuropathy with functional impairment is a dose-limiting toxicity warranting treatment modification rather than continuation at full dose"},"correct_answer":"E","short_rationale":"Grade 2 paclitaxel neuropathy that is interfering with fine motor skills represents clinically meaningful functional impairment. ASCO recommends discussing dose delay, dose reduction, stopping, or substituting the neurotoxic chemotherapy in patients who develop intolerable neuropathy or functional nerve impairment during treatment, and ESMO similarly frames CIPN as a dose-limiting toxicity. Duloxetine is for painful CIPN symptom control, not a substitute for taxane dose modification when function is affected.","why_other_options_are_wrong":"A. Continue same dose until grade 3\nNot best practice, because the goal is to prevent worsening and potentially persistent neuropathy once functional impairment is already present.\n\nB. Switch to nab-paclitaxel\nThis is not a neuropathy-sparing switch; nab-paclitaxel causes at least comparable and often higher neuropathy rates than solvent-based paclitaxel.\n\nC. Start vitamin B6 supplementation\nVitamin B6 is not guideline-recommended for prevention or treatment of CIPN, and evidence for benefit is insufficient.\n\nD. Start duloxetine and continue full dose\nDuloxetine may help painful CIPN, but it does not address the need to modify the causative taxane when neuropathy is function-limiting.","evidence":"This is a good question. The only small ambiguity is that if the stem had specified painful neuropathy, duloxetine would become more tempting, but the key phrase here is \u201cinterfering with fine motor skills,\u201d which points toward treatment modification.\n\nEvidence\n\nStrong for the principle that function-limiting CIPN should trigger dose modification discussion. More limited for an exact universal grade-2 paclitaxel algorithm, since specific hold versus reduce decisions often depend on regimen protocol and clinical context.\n\nPlausibility of distractors\n\nD is the best distractor because duloxetine is the one evidence-based drug for painful CIPN, but it is incomplete here. B is a weaker distractor because nab-paclitaxel is not less neurotoxic.","references":["Loprinzi CL, et al. Prevention and Management of Chemotherapy-Induced Peripheral Neuropathy in Survivors of Adult Cancers: ASCO Guideline Update. J Clin Oncol. 2020. ASCO recommends considering dose delay, dose reduction, stopping, or substitution for patients who develop intolerable neuropathy or functional impairment, and duloxetine for painful CIPN. Evidence grade: guideline, moderate recommendation for duloxetine; consensus-based recommendation for treatment modification.","Jordan B, et al. Systemic anticancer therapy-induced peripheral and central neurotoxicity: ESMO-EONS-EANO Clinical Practice Guideline. Ann Oncol. 2020. Supports CIPN as a dose-limiting toxicity and recommends management through clinical assessment and treatment adjustment. Evidence grade: guideline / expert consensus.","Smith EML, et al. Effect of duloxetine on pain, function, and quality of life among patients with chemotherapy-induced painful peripheral neuropathy. JAMA. 2013. Shows benefit of duloxetine for painful CIPN, not for reversing the need to modify offending chemotherapy. Evidence grade: level I.","Gianni L, et al. ETNA trial. JAMA Oncol. 2018. Nab-paclitaxel was associated with more neuropathy than paclitaxel in this breast cancer trial. Evidence grade: level I.","Kida K, et al. Breast Cancer. 2024. Prospective comparison found nab-paclitaxel induced sensory neuropathy sooner and motor neuropathy was more severe than with paclitaxel. Evidence grade: prospective comparative study.","Heilfort L, et al. J Am Coll Nutr. 2022. Systematic review of B vitamins for CIPN found insufficient evidence to recommend them. Evidence grade: low."],"length_bias_flag":"NONE"},{"id":"164","section":"Toxicity","question":"A 60-year-old woman receiving adjuvant trastuzumab for HER2+ breast cancer develops an asymptomatic LVEF decline from 58% to 44% on routine monitoring. No heart failure symptoms. No prior anthracycline cardiotoxicity. What is the most appropriate next step?","options":{"A":"Permanently discontinue trastuzumab; this LVEF decline indicates irreversible cardiotoxicity.","B":"Continue trastuzumab at extended six-weekly intervals to reduce cumulative cardiac exposure while maintaining efficacy.","C":"Hold trastuzumab and repeat echocardiography in four weeks with cardiology input per guideline criteria.","D":"Continue trastuzumab unchanged and add an ACE inhibitor; asymptomatic decline does not meet interruption criteria.","E":"Continue trastuzumab and add dexrazoxane to prevent further LVEF decline during ongoing therapy."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. This is based mainly on regulatory prescribing criteria and cardio-oncology guideline recommendations rather than randomized trials of hold versus continue.","references":["EMA Herceptin product information: suspend trastuzumab if LVEF drops by at least 10 points from baseline and to below 50%, repeat LVEF in about 3 weeks, cardiology referral."],"length_bias_flag":"NONE"},{"id":"165","section":"Toxicity","question":"A 47-year-old woman with node-positive HR+/HER2\u2212 breast cancer receives adjuvant dose-dense EC with pegfilgrastim given 24 hours post-chemotherapy. On day 10 of cycle 2 she develops fever 38.9\u00b0C, ANC 90/\u00b5L, BP 105/65 mmHg, and mild oral mucositis. What is the most appropriate immediate management step?","options":{"A":"Admit to hospital, initiate intravenous anti-pseudomonal antibiotics, and reduce subsequent EC doses by 25% after recovery to prevent recurrence","B":"Admit to hospital, administer an additional dose of pegfilgrastim, and initiate broad-spectrum oral antibiotics pending culture results","C":"Admit to hospital, initiate intravenous anti-pseudomonal antibiotics within one hour, and obtain blood cultures before starting antimicrobial therapy","D":"Admit to hospital, add daily short-acting filgrastim to augment granulocyte recovery, and initiate empiric antifungal therapy given the presence of oral mucositis","E":"Admit to hospital, start oral amoxicillin-clavulanate, and reassess ANC and vital signs within 24 hours before escalating therapy"},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"166","section":"Toxicity","question":"ECG shows QTc 520 ms in a patient on ribociclib. What is the best management in this situation?","options":{"A":"Start beta blocker Beta blockers are not standard treatment for drug-induced QT prolongation from ribociclib and could worsen bradycardia in some patients.","B":"Switch to abemaciclib This may be considered later if ribociclib cannot be safely resumed, but the immediate best step at QTc 520 ms is to hold ribociclib and correct reversible factors.","C":"Continue therapy in dose reduction Dose reduction alone without first interrupting treatment is not label-concordant when QTc is >500 ms.","D":"Observe and repeat ECG in 2 weeks Observation alone is unsafe because QTc >500 ms is the threshold for immediate interruption.","E":"Hold ribociclib immediately and correct electrolytes; reassess QTc after correction and resume at reduced dose only when QTc returns below 480 ms"},"correct_answer":"E","short_rationale":"A QTc of 520 ms on ribociclib crosses the >500 ms threshold in the current prescribing information. The recommended management is to interrupt ribociclib, correct reversible causes such as hypokalemia, hypomagnesemia, or hypocalcemia, review other QT-prolonging drugs, and only resume at a lower dose once QTc falls below 480 ms; if QTc >500 ms recurs, ribociclib should be discontinued.","why_other_options_are_wrong":"A. Start beta blocker\nBeta blockers are not standard treatment for drug-induced QT prolongation from ribociclib and could worsen bradycardia in some patients.\n\nB. Switch to abemaciclib\nThis may be considered later if ribociclib cannot be safely resumed, but the immediate best step at QTc 520 ms is to hold ribociclib and correct reversible factors.\n\nC. Continue therapy in dose reduction\nDose reduction alone without first interrupting treatment is not label-concordant when QTc is >500 ms.\n\nD. Observe and repeat ECG in 2 weeks\nObservation alone is unsafe because QTc >500 ms is the threshold for immediate interruption.","evidence":"Clear and good question. It tests exact ribociclib label management rather than general cardio-oncology principles.\n\nPlausibility of distractors\n\nB is the strongest distractor because abemaciclib does not share the same degree of QT concern, but it is not the first step in the acute situation. A is a moderate distractor because dose reduction is part of later re-challenge, not initial management.","references":["Kisqali (ribociclib) US Prescribing Information, FDA/Novartis, 2025. Recommends interrupting treatment for QTcF >500 ms, correcting abnormalities, resuming below 480 ms at the next lower dose, and discontinuing if recurrent. Evidence grade: regulatory label / high-authority drug-specific guidance.","EMA Kisqali Product Information, 2026 update. Confirms ECG and electrolyte monitoring and interruption/resumption thresholds for QT prolongation. Evidence grade: regulatory label / high-authority drug-specific guidance.","Curigliano G, et al. Management of cardiac disease in cancer patients throughout oncological treatment: ESMO consensus recommendations. Ann Oncol. 2020. Supports correction of reversible causes and management of cancer-therapy-associated QT prolongation. Evidence grade: expert consensus guideline.","Bottom line: the correct management is to stop ribociclib now, correct electrolytes and interacting drugs, then reassess ECG before any dose-reduced restart."],"length_bias_flag":"NONE"},{"id":"167","section":"Toxicity","question":"A 48-year-old premenopausal woman on tamoxifen develops proximal deep vein thrombosis. What is the most appropriate management?","options":{"A":"Start therapeutic anticoagulation and switch endocrine therapy from tamoxifen to aromatase inhibitor plus ovarian suppression, as tamoxifen increases thromboembolic risk and should be discontinued after an on-treatment DVT in a premenopausal patient","B":"Continue tamoxifen with concurrent therapeutic anticoagulation. Not best, because tamoxifen is the likely provoking factor and continuing it leaves the patient on a prothrombotic drug despite a new DVT.","C":"Reduce tamoxifen to 10 mg daily and add prophylactic anticoagulation. A proximal DVT requires therapeutic, not prophylactic, anticoagulation, and lowering the tamoxifen dose does not solve the thrombosis problem.","D":"Discontinue tamoxifen and start therapeutic anticoagulation alone. Stopping tamoxifen and anticoagulating is appropriate acutely, but this option unnecessarily abandons breast-cancer endocrine therapy when a valid alternative exists.","E":"Switch to aromatase inhibitor monotherapy and initiate therapeutic anticoagulation. This would only be appropriate if she were definitively postmenopausal; in a likely premenopausal 48-year-old, an AI should not be used without ovarian suppression."},"correct_answer":"A","short_rationale":"A proximal DVT in a patient with cancer requires therapeutic anticoagulation, typically for at least 6 months. Tamoxifen increases VTE risk, and after an on-treatment DVT the safer endocrine strategy is to stop tamoxifen rather than continue it. Because this stem most likely intends a premenopausal patient, aromatase inhibitor therapy should be paired with ovarian suppression, not given alone.","why_other_options_are_wrong":"B. Continue tamoxifen with concurrent therapeutic anticoagulation.\nNot best, because tamoxifen is the likely provoking factor and continuing it leaves the patient on a prothrombotic drug despite a new DVT.\n\nC. Reduce tamoxifen to 10 mg daily and add prophylactic anticoagulation.\nA proximal DVT requires therapeutic, not prophylactic, anticoagulation, and lowering the tamoxifen dose does not solve the thrombosis problem.\n\nD. Discontinue tamoxifen and start therapeutic anticoagulation alone.\nStopping tamoxifen and anticoagulating is appropriate acutely, but this option unnecessarily abandons breast-cancer endocrine therapy when a valid alternative exists.\n\nE. Switch to aromatase inhibitor monotherapy and initiate therapeutic anticoagulation.\nThis would only be appropriate if she were definitively postmenopausal; in a likely premenopausal 48-year-old, an AI should not be used without ovarian suppression.","evidence":"This question is slightly flawed because menopausal status is not stated. If she is truly postmenopausal, B becomes a strong answer; if she is premenopausal or perimenopausal, E is the best answer. Given her age and the fact that she is on tamoxifen, I would interpret the intended answer as E.\n\nEvidence\n\nStrong for therapeutic anticoagulation for cancer-associated proximal DVT and strong for the principle that premenopausal women need ovarian suppression with an AI. The specific step of stopping tamoxifen after an on-treatment DVT is highly plausible and supported by tamoxifen\u2019s known VTE risk and contraindication logic, but there is less direct randomized evidence specifically testing \u201ccontinue tamoxifen plus anticoagulation\u201d versus \u201cstop tamoxifen.\u201d","references":["Key NS, Khorana AA, Kuderer NM, et al. Venous Thromboembolism Prophylaxis and Treatment in Patients With Cancer: ASCO Guideline Update. J Clin Oncol. 2023. Therapeutic anticoagulation with LMWH, edoxaban, rivaroxaban, or apixaban for at least 6 months is recommended for cancer-associated VTE. Level of evidence: guideline, high.","Falanga A, Russo L, Verzeroli C, et al. Venous thromboembolism in cancer patients: ESMO Clinical Practice Guideline. Ann Oncol. 2023. Confirms standard therapeutic anticoagulation for cancer-associated VTE. Level of evidence: guideline, high.","Tamoxifen FDA label. Tamoxifen increases thromboembolic events, including DVT and PE; for patients with breast cancer, risks and benefits should be carefully considered in women with thromboembolic history. Evidence grade: regulatory labeling, high-authority drug-specific safety guidance.","Pagani O, Regan MM, Walley BA, et al. Adjuvant exemestane with ovarian suppression in premenopausal breast cancer. N Engl J Med. 2014. Establishes AI plus ovarian suppression as a valid endocrine strategy in premenopausal women. Level of evidence: I.","Pagani O, Francis PA, Fleming GF, et al. Long-Term Follow-Up of the Combined TEXT and SOFT Trials. J Clin Oncol. 2023. Confirms durable benefit of OFS-containing endocrine therapy in premenopausal HR-positive breast cancer. Level of evidence: I.","This is a good example of a question where the intended answer is probably E, but the stem should explicitly say \u201cpremenopausal\u201d to make it airtight."],"length_bias_flag":"NONE"},{"id":"168","section":"Toxicity","question":"A 62-year-old woman with metastatic HER2-positive breast cancer is receiving trastuzumab deruxtecan (T-DXd). After cycle 5, she reports new dry cough and mild dyspnoea for 3 days. Vitals: temperature 37.4\u00b0C, SpO\u2082 95% on room air, respiratory rate 18/min. Laboratory results: mild CRP elevation, normal leukocytes, no neutropenia. What is the most appropriate next management step?","options":{"A":"Obtain chest CT and perform bronchoscopy with bronchoalveolar lavage before initiating corticosteroids, to confirm the diagnosis histologically.","B":"Obtain chest CT and, if imaging shows findings consistent with ILD, hold T-DXd and promptly initiate systemic corticosteroids at 1 mg/kg/day.","C":"Obtain chest X-ray and start oral broad-spectrum antibiotics for suspected respiratory infection while continuing T-DXd on schedule.","D":"Postpone the next T-DXd cycle until symptoms resolve but no imaging workup is required given preserved oxygen saturation","E":"Defer imaging and reassess clinically in one week, as mild respiratory symptoms on T-DXd are common and self-limiting in most patients."},"correct_answer":"B","short_rationale":"Brief rationale: New dry cough and dyspnoea in a patient receiving T-DXd must be evaluated as possible drug-related interstitial lung disease until proven otherwise. ILD is a recognised and potentially fatal adverse effect of T-DXd, reported in approximately 12\u201315% of patients across pivotal trials (DESTINY-Breast01 through 06), with a treatment-related mortality rate of approximately 2\u20133%. Fatal outcomes have been consistently associated with delayed diagnosis and treatment initiation.The appropriate management follows a clear algorithm established by multidisciplinary expert consensus (Rugo et al., JCO Oncol Pract 2023) and the ENHERTU prescribing information. First, chest CT (not chest X-ray) is the imaging modality of choice because it can detect ground-glass opacities, consolidation, and organising pneumonia patterns that are characteristic of drug-related ILD and may be invisible on plain radiography. Second, T-DXd must be held immediately upon clinical suspicion. Third, if CT findings are consistent with ILD, systemic corticosteroids should be initiated promptly at approximately 1 mg/kg/day prednisone equivalent.\n\n**A \u2014 Chest X-ray plus antibiotics, continue T-DXd.** This option makes three errors. First, chest X-ray has insufficient sensitivity for early ILD \u2014 ground-glass opacities and subtle interstitial changes are frequently missed on plain radiography but readily detected on CT. Second, empiric antibiotics without CT imaging fail to address the primary differential diagnosis of drug-related ILD. The clinical presentation (dry cough, no neutropenia, mild CRP, low-grade temperature) is more consistent with ILD than bacterial pneumonia. Third, continuing T-DXd on schedule is contraindicated when ILD is suspected \u2014 drug rechallenge risks fatal progression.\n**C \u2014 CT plus bronchoscopy with BAL before steroids.** CT imaging is correct, but requiring bronchoscopy with BAL before initiating corticosteroids introduces a dangerous delay. In a typical presentation of T-DXd-related ILD \u2014 new respiratory symptoms, characteristic CT findings, appropriate temporal relationship to drug exposure \u2014 the diagnosis is primarily clinical and radiographic. BAL may be considered selectively when infection cannot be excluded, when the CT pattern is atypical, or when the patient fails to respond to corticosteroids. However, it should not routinely precede steroid initiation. The Rugo et al. consensus document explicitly recommends prompt corticosteroid initiation based on clinical and CT findings without mandating bronchoscopic confirmation.\n**D \u2014 Defer imaging, reassess in one week.** Watchful waiting is unsafe when a patient on T-DXd develops new respiratory symptoms. ILD can progress rapidly from grade 1\u20132 to grade 3\u20134 or fatal within days. The multidisciplinary consensus and prescribing information both emphasise that any new or worsening respiratory symptoms during T-DXd treatment warrant immediate diagnostic evaluation. Characterising these symptoms as \"common and self-limiting\" is inaccurate \u2014 while cough can occur as a non-ILD adverse effect, it must be investigated to exclude ILD.\n**E \u2014 Postpone T-DXd without imaging.** Holding T-DXd is appropriate when ILD is suspected, but omitting imaging is a critical error. Without CT confirmation, the clinician cannot grade the ILD severity, guide corticosteroid dosing, establish a radiographic baseline for monitoring treatment response, or exclude alternative diagnoses (pulmonary embolism, infection, progression). Preserved oxygen saturation (95%) does not exclude significant parenchymal disease \u2014 CT may show extensive ground-glass changes despite near-normal oxygenation at rest. Management decisions must be guided by both clinical and radiographic assessment.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Rugo HS et al.** \"Interstitial lung disease associated with trastuzumab deruxtecan: a multidisciplinary clinical guidance document.\" *JCO Oncol Pract.* 2023."],"length_bias_flag":"NONE"},{"id":"169","section":"Toxicity","question":"A 59-year-old woman with metastatic HER2-positive breast cancer develops grade 3 ILD attributed to trastuzumab deruxtecan (T-DXd). T-DXd is permanently discontinued. Prednisone 1 mg/kg/day (60 mg daily) is initiated with a taper planned over 8 weeks. She has no history of diabetes, peptic ulcer disease, or anticoagulation. BMI is 27 kg/m\u00b2. Baseline labs are normal. Which of the following adjunctive measures is important to initiate at the start of corticosteroid therapy?","options":{"A":"Trimethoprim-sulfamethoxazole prophylaxis for Pneumocystis jirovecii prevention Reasonable but incomplete, because this stem asks for adjunctive measures at steroid initiation and calcium/vitamin D should also be started.","B":"Amoxicillin-sulbactam prophylaxis for broad-spectrum bacterial coverage There is no role for routine broad-spectrum antibacterial prophylaxis here without evidence of infection.","C":"Pantoprazole prophylaxis for gastric protection during prolonged corticosteroids Routine PPI prophylaxis is not recommended for corticosteroids alone in a patient without ulcer history, NSAID use, or anticoagulation.","D":"Trimethoprim-sulfamethoxazole prophylaxis for Pneumocystis jirovecii prevention plus calcium and vitamin D supplementation for glucocorticoid-induced bone loss, as both are indicated when initiating high-dose systemic corticosteroids at 1 mg/kg/day for grade 3 ILD","E":"Weekly blood glucose monitoring for corticosteroid-induced hyperglycemia Glucose monitoring is sensible during high-dose steroids, but it is not the key prophylactic adjunctive measure that best answers this MCQ compared with TMP-SMX plus bone support."},"correct_answer":"D","short_rationale":"This patient is starting high-dose prednisone at about 1 mg/kg/day with an 8-week taper for grade 3 T-DXd-related ILD. That steroid exposure is enough to make Pneumocystis prophylaxis a relevant supportive-care measure, and TMP-SMX is the standard agent. In parallel, calcium plus vitamin D is an appropriate bone-protective measure to start early in glucocorticoid therapy, since steroid-related bone loss begins quickly and major US/European bone guidelines recommend optimized calcium/vitamin D intake in glucocorticoid-treated adults.","why_other_options_are_wrong":"A. Trimethoprim-sulfamethoxazole prophylaxis for Pneumocystis jirovecii prevention\nReasonable but incomplete, because this stem asks for adjunctive measures at steroid initiation and calcium/vitamin D should also be started.\n\nB. Amoxicillin-sulbactam prophylaxis for broad-spectrum bacterial coverage\nThere is no role for routine broad-spectrum antibacterial prophylaxis here without evidence of infection.\n\nC. Pantoprazole prophylaxis for gastric protection during prolonged corticosteroids\nRoutine PPI prophylaxis is not recommended for corticosteroids alone in a patient without ulcer history, NSAID use, or anticoagulation.\n\nE. Weekly blood glucose monitoring for corticosteroid-induced hyperglycemia\nGlucose monitoring is sensible during high-dose steroids, but it is not the key prophylactic adjunctive measure that best answers this MCQ compared with TMP-SMX plus bone support.","evidence":"Good question overall. The only nuance is that PJP prophylaxis thresholds are not perfectly uniform across all oncology sources, so the stem works best because the steroid dose is high and the taper is prolonged enough to make prophylaxis clearly reasonable. A is still the best constructed answer.\n\nEvidence\n\nModerate to strong. The T-DXd ILD management piece is strong and drug-specific; the glucocorticoid supportive-care components come from good-quality reviews and major bone guidelines. The strongest part of A is the combination logic rather than one single breast-cancer-specific randomized trial.\n\nPlausibility of distractors\n\nB is the best distractor because PJP prophylaxis is the most immediately obvious steroid-related intervention.\nC is a common real-world practice trap, but it is not evidence-based in this low-GI-risk patient.\nD is sensible supportive monitoring, but weaker than A because it is surveillance rather than the most important prophylactic package.","references":["ENHERTU US Prescribing Information, 2025. For symptomatic ILD, permanently discontinue T-DXd and start systemic corticosteroids at at least 1 mg/kg/day with taper. High-authority regulatory guidance.","Chiu JWY, et al. Clinical Guidance on the Monitoring and Management of Trastuzumab Deruxtecan-Related Adverse Events. Drug Saf. 2023. Notes that for grade 2 or higher ILD, prolonged steroids are used and PJP prophylaxis should be considered in patients receiving high-dose systemic corticosteroids. Peer-reviewed expert guidance.","Rhoads S, et al. Pneumocystis jirovecii Pneumonia in HIV-Negative, Non-HIV Immunocompromised Patients. 2024 review. States current recommendations generally start PJP prophylaxis once prednisone-equivalent dosing reaches about 20 mg daily for 4 weeks or more. Peer-reviewed review.","Humphrey MB, et al. 2022 American College of Rheumatology Guideline for the Prevention and Treatment of Glucocorticoid-Induced Osteoporosis. Arthritis Rheumatol. 2023. Recommends optimized dietary and supplemental calcium and vitamin D in glucocorticoid-treated adults. Guideline-level evidence.","Paccou J, et al. Prevention and treatment of glucocorticoid-induced osteoporosis in adults: recommendations from the European Calcified Tissue Society. Eur J Endocrinol. 2024. Recommends starting vitamin D and calcium in adults receiving oral glucocorticoids. Guideline-level evidence.","Kumar SS, et al. Things We Do for No Reason: Routine use of proton pump inhibitors for peptic ulcer prophylaxis in adults on high-dose corticosteroids. J Hosp Med. 2023. Supports that routine PPI prophylaxis is not indicated for corticosteroids alone without additional GI-risk factors. Peer-reviewed review.","Vakil N, et al. Peptic Ulcer Disease: A Review. JAMA. 2024. Notes that glucocorticoids are not an independent peptic-ulcer risk factor in nonhospitalized individuals. Peer-reviewed review.","Evidence grade","Best-answer confidence: high."],"length_bias_flag":"NONE"},{"id":"170","section":"Toxicity","question":"A 62-year-old woman with HR+/HER2\u2013 metastatic breast cancer is receiving palbociclib plus letrozole as first-line therapy. On cycle 2 day 15, routine labs show: ANC: 620/\u00b5L, hemoglobin: 11.4 g/dL, platelets: 210,000/\u00b5L, afebrile, asymptomatic, no signs of infection. What is the most appropriate management?","options":{"A":"Hold palbociclib until ANC recovers to \u22651,000/\u00b5L, then resume at the same dose level at the start of the next cycle.","B":"Discontinue palbociclib permanently and switch to abemaciclib, which has a lower incidence of severe neutropenia.","C":"Hold palbociclib until ANC recovers to \u22651,000/\u00b5L, then resume at a reduced dose due to recurrent grade 3 neutropenia.","D":"Hold palbociclib and administer prophylactic G-CSF to accelerate neutrophil recovery before resuming at the same dose.","E":"Continue palbociclib at the current dose to complete the cycle and repeat CBC on day 22 to guide further management."},"correct_answer":"E","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"171","section":"Toxicity","question":"A 55-year-old woman with HR+/HER2\u2013 metastatic breast cancer is starting first-line endocrine therapy plus a CDK4/6 inhibitor. She has: baseline QTc 472 ms, chronic IBS with intermittent diarrhea, mild baseline neutropenia (ANC 1,400/\u00b5L), normal liver function tests. Which of the following comparative toxicity statements regarding ribociclib, palbociclib, and abemaciclib is most accurate?","options":{"A":"Neutropenia is dose-cumulative and cytotoxic with all three agents; abemaciclib has the highest gastrointestinal toxicity overall due to its greater CDK4 selectivity relative to palbociclib and ribociclib. This is incorrect because CDK4/6-inhibitor neutropenia is generally cytostatic and reversible rather than classic cumulative cytotoxic marrow damage, even though abemaciclib does indeed have the highest GI toxicity.","B":"Abemaciclib and palbociclib have similar Grade \u22653 diarrhea rates due to continuous dosing, whereas ribociclib causes more frequent QT prolongation but produces less severe hematologic toxicity than the other two agents. This is incorrect because abemaciclib has much more diarrhea than palbociclib, and ribociclib does not have less hematologic toxicity than both other agents.","C":"Ribociclib and palbociclib have comparable Grade 3\u20134 neutropenia rates, while abemaciclib causes less neutropenia but higher Grade \u22653 diarrhea and transaminase elevation; QT prolongation is primarily associated with ribociclib. In this patient with baseline QTc 472 ms and chronic IBS, the toxicity profile comparison favors palbociclib as the most suitable initial choice among the three agents","D":"All three CDK4/6 inhibitors produce similar Grade 3\u20134 neutropenia; ribociclib uniquely causes cumulative marrow suppression requiring G-CSF prophylaxis, and QT prolongation risk is equivalent between ribociclib and palbociclib. This is incorrect because neutropenia patterns are not the same across all three, CDK4/6 neutropenia is generally reversible and non-cumulative, routine G-CSF prophylaxis is not standard, and QT risk is mainly a ribociclib issue.","E":"Ribociclib has the highest hepatotoxicity incidence among the three agents, while palbociclib and abemaciclib have comparable gastrointestinal toxicity profiles; QT prolongation is a class effect of CDK6 inhibition. Its first clause is directionally right, but the rest is wrong because abemaciclib has distinctly more diarrhea than palbociclib, and QT prolongation is not equally a class effect across all three."},"correct_answer":"C","short_rationale":"C is the closest overall summary of the three toxicity profiles. Across comparative reviews and meta-analyses, palbociclib and ribociclib are the more neutropenia-heavy agents, whereas abemaciclib causes less severe neutropenia but clearly more gastrointestinal toxicity, especially diarrhea. QT prolongation is most strongly linked to ribociclib rather than being a broad class effect.\n\nImportant nuance: C is not perfectly written. The weakest part is \u201chigher transaminase elevation\u201d for abemaciclib, because ribociclib is actually the agent most consistently associated with clinically relevant hepatotoxicity in comparative reviews. Even with that flaw, C is still the best option because the other answers contain larger errors.","why_other_options_are_wrong":"A. Neutropenia is dose-cumulative and cytotoxic with all three agents; abemaciclib has the highest gastrointestinal toxicity overall due to its greater CDK4 selectivity relative to palbociclib and ribociclib.\nThis is incorrect because CDK4/6-inhibitor neutropenia is generally cytostatic and reversible rather than classic cumulative cytotoxic marrow damage, even though abemaciclib does indeed have the highest GI toxicity.\n\nB. Abemaciclib and palbociclib have similar Grade \u22653 diarrhea rates due to continuous dosing, whereas ribociclib causes more frequent QT prolongation but produces less severe hematologic toxicity than the other two agents.\nThis is incorrect because abemaciclib has much more diarrhea than palbociclib, and ribociclib does not have less hematologic toxicity than both other agents.\n\nD. All three CDK4/6 inhibitors produce similar Grade 3\u20134 neutropenia; ribociclib uniquely causes cumulative marrow suppression requiring G-CSF prophylaxis, and QT prolongation risk is equivalent between ribociclib and palbociclib.\nThis is incorrect because neutropenia patterns are not the same across all three, CDK4/6 neutropenia is generally reversible and non-cumulative, routine G-CSF prophylaxis is not standard, and QT risk is mainly a ribociclib issue.\n\nE. Ribociclib has the highest hepatotoxicity incidence among the three agents, while palbociclib and abemaciclib have comparable gastrointestinal toxicity profiles; QT prolongation is a class effect of CDK6 inhibition.\nIts first clause is directionally right, but the rest is wrong because abemaciclib has distinctly more diarrhea than palbociclib, and QT prolongation is not equally a class effect across all three.","evidence":"Good concept, but the item is not perfectly clean because option A mixes a mostly correct overall pattern with an imperfect hepatotoxicity statement. A stronger version would say: \u201cpalbociclib and ribociclib are more neutropenic, abemaciclib is more diarrheagenic, ribociclib has the clearest QT signal, and ribociclib more than abemaciclib is associated with hepatotoxicity.\u201d\n\nEvidence\n\nModerate to strong, but mostly indirect. The toxicity differences are well described in systematic reviews, meta-analyses, and regulatory data, yet there are no head-to-head randomized trials specifically designed to compare toxicity across palbociclib, ribociclib, and abemaciclib.\n\nPlausibility of distractors\n\nC is the best distractor because its first clause about ribociclib hepatotoxicity is true.\nA remains the best answer because it captures the dominant neutropenia/diarrhea/QT pattern more accurately than the others, despite the liver-toxicity wording flaw.","references":["Onesti CE, Jerusalem G, et al. CDK4/6 inhibitors in breast cancer: differences in toxicity profiles and impact on agent choice. Systematic review and meta-analysis, 2021. Palbociclib and ribociclib showed high hematologic toxicity; abemaciclib showed more GI toxicity; ribociclib had more hepatic toxicity and QTc prolongation.","Desnoyers A, Nadler MB, Kumar V, et al. Comparison of treatment-related adverse events of different CDK4/6 inhibitors in metastatic breast cancer: meta-analysis, 2020. Compared with palbociclib, ribociclib and abemaciclib had less grade 3\u20134 neutropenia but more GI toxicity.","Murad B, et al. QTc prolongation across CDK4/6 inhibitors: systematic review and meta-analysis of randomized controlled trials, 2024. Supports QT prolongation being primarily driven by ribociclib.","Comparative toxicity pattern: Level I to II, based mainly on systematic reviews/meta-analyses of randomized trials, but indirect rather than head-to-head."],"length_bias_flag":"NONE"},{"id":"172","section":"Toxicity","question":"A 58-year-old woman with germline BRCA1\u2013mutated, HER2-negative metastatic breast cancer achieved partial remission after first-line carboplatin/paclitaxel. She transitioned to maintenance olaparib and has remained on therapy for 14 months. Her prior treatment history includes: Dose-dense anthracycline/taxane in the (neo)adjuvant setting 6 years earlier and carboplatin-based chemotherapy for metastatic disease. Baseline blood counts prior to olaparib: Hb: 12.8 g/dL, ANC: 3.4 \u00d7 10\u2079/L, platelets: 240 \u00d7 10\u2079/L. Current laboratory findings: Hb: 8.4 g/dL, MCV: 108 fL, reticulocyte count: low, ANC: 1.5 \u00d7 10\u2079/L, platelets: 135 \u00d7 10\u2079/L. LDH, bilirubin, haptoglobin: normal. Vitamin B12, folate, and iron studies: normal Peripheral smear shows macrocytosis and occasional hypogranulated neutrophils but no circulating blasts. Olaparib dose was reduced 6 weeks ago without hematologic improvement. Which of the following is the most appropriate next diagnostic step?","options":{"A":"Initiate erythropoiesis-stimulating agent therapy and reassess blood counts in 4 weeks.","B":"Permanently discontinue olaparib and monitor blood counts for spontaneous recovery.","C":"Begin empiric vitamin B12 supplementation despite currently normal serum levels.","D":"Perform bone marrow biopsy with cytogenetics and myeloid next-generation sequencing panel.","E":"Measure serum erythropoietin level and repeat reticulocyte count before proceeding."},"correct_answer":"D","short_rationale":"* Brief rationale: This pattern is highly suspicious for therapy-related MDS evolving during PARP inhibitor therapy rather than simple olaparib anemia: persistent macrocytic anemia, low reticulocytes, new mild multilineage cytopenia, dysplastic neutrophils on smear, prior anthracycline/platinum exposure, and no improvement despite dose reduction for >4 weeks. In this setting, the appropriate next step is bone marrow biopsy/aspirate with cytogenetics, and adding a myeloid NGS panel is clinically appropriate for modern diagnostic/prognostic characterization.\n* A is wrong because ESA therapy treats anemia symptomatically but would delay the necessary workup for suspected therapy-related myeloid neoplasia.\n* E is wrong because serum erythropoietin and repeating the reticulocyte count do not address the central concern of possible MDS/AML after persistent abnormal counts on olaparib.\n* D is right because persistent clinically abnormal counts after olaparib interruption/reduction warrant marrow evaluation with cytogenetics, and marrow examination remains the diagnostic gold standard for suspected MDS.\n* B is wrong because stopping olaparib alone is not enough when MDS/AML is suspected; diagnostic hematology evaluation should be initiated rather than passive observation.\n* C is wrong because B12 deficiency has already been reasonably excluded, and empiric replacement would not explain or resolve dysplastic multilineage cytopenias.\n* Level of evidence: Moderate to high; this is based on regulatory safety guidance for olaparib and standard peer-reviewed diagnostic literature for suspected MDS.\n* Clarity/plausibility: Good question. The key clue is not just macrocytic anemia, but persistent cytopenia plus dysplasia despite dose reduction, which should push you away from supportive anemia management and toward marrow workup.\n* References:\n  * EMA product information for olaparib: if blood counts remain clinically abnormal after 4 weeks of dose interruption, bone marrow analysis and/or blood cytogenetics are recommended; if MDS/AML is suspected, hematology referral for bone marrow analysis and cytogenetics is advised.\n  * Komrokji et al. Myelodysplastic syndromes: 2023 update on diagnosis, risk-stratification, and management. American Journal of Hematology. Diagnosis is confirmed by bone marrow aspiration/biopsy with appropriate ancillary studies.\n  * Oster and Mittelman. How we diagnose myelodysplastic syndromes. Frontiers in Oncology. Bone marrow examination is the gold standard; cytogenetics is essential and genetics is helpful in modern workup.\n\n# **Supportive Care**\n\n*10 questions*","why_other_options_are_wrong":"- A is wrong because ESA therapy treats anemia symptomatically but would delay the necessary workup for suspected therapy-related myeloid neoplasia.\n- E is wrong because serum erythropoietin and repeating the reticulocyte count do not address the central concern of possible MDS/AML after persistent abnormal counts on olaparib.\n- D is right because persistent clinically abnormal counts after olaparib interruption/reduction warrant marrow evaluation with cytogenetics, and marrow examination remains the diagnostic gold standard for suspected MDS.\n- B is wrong because stopping olaparib alone is not enough when MDS/AML is suspected; diagnostic hematology evaluation should be initiated rather than passive observation.\n- C is wrong because B12 deficiency has already been reasonably excluded, and empiric replacement would not explain or resolve dysplastic multilineage cytopenias.\n- Level of evidence: Moderate to high; this is based on regulatory safety guidance for olaparib and standard peer-reviewed diagnostic literature for suspected MDS.\n- Clarity/plausibility: Good question. The key clue is not just macrocytic anemia, but persistent cytopenia plus dysplasia despite dose reduction, which should push you away from supportive anemia management and toward marrow workup.\n- References:","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"MILD"},{"id":"173","section":"Supportive Care","question":"A 38-year-old woman with stage IIIB triple-negative breast cancer (TNBC) is receiving neoadjuvant chemotherapy with weekly paclitaxel plus carboplatin. On cycle 2, day 15, routine labs show: ANC: 0.6 \u00d7 10\u2079/L, hemoglobin: 10.8 g/dL, platelets: 180 \u00d7 10\u2079/L. Normal renal and hepatic function. Temperature 36,8\u00b0C.No symptoms, ECOG 0\\. She feels well and denies fever, chills, mucositis, cough, dysuria, or other symptoms. What is the most appropriate management?","options":{"A":"Admit for IV broad-spectrum antibiotics and initiate therapeutic G-CSF That is management for febrile neutropenia or suspected infection, not for a well, afebrile outpatient with isolated lab-detected neutropenia.","B":"Withhold chemotherapy temporarily; no antibiotics indicated; consider short-course G-CSF if prolonged neutropenia; resume with dose modification or G-CSF secondary prophylaxis.","C":"Permanently discontinue carboplatin and continue paclitaxel alone This is too drastic for a first episode of asymptomatic neutropenia and is not the standard first management step.","D":"Hold chemotherapy, start prophylactic oral antibiotics, and resume treatment when ANC > 1.0 \u00d7 10\u2079/L Holding treatment is reasonable, but routine prophylactic antibiotics are not recommended for typical solid-tumor patients with short-duration neutropenia.","E":"Continue chemotherapy with dose reduction because she is afebrile This conflicts with regimen-specific dose-modification guidance, which recommends delaying treatment for ANC 0.5 to less than 1.0 \u00d7 10\u2079/L rather than giving chemotherapy through it."},"correct_answer":"B","short_rationale":"She has uncomplicated afebrile chemotherapy-induced neutropenia on weekly paclitaxel/carboplatin, with ANC 0.6 \u00d7 10\u2079/L, normal organ function, no fever, and no infectious symptoms. For this specific weekly paclitaxel/carboplatin breast regimen, pre-treatment ANC 0.5 to less than 1.0 \u00d7 10\u2079/L calls for delaying treatment until recovery; ASCO guidance also says colony-stimulating factors should not be used routinely for patients with afebrile neutropenia, while secondary prophylaxis can be considered in subsequent cycles if a neutropenic complication or delay threatens planned dose intensity. Antibiotic prophylaxis is not routinely recommended for patients with solid tumors.","why_other_options_are_wrong":"A. Admit for IV broad-spectrum antibiotics and initiate therapeutic G-CSF\nThat is management for febrile neutropenia or suspected infection, not for a well, afebrile outpatient with isolated lab-detected neutropenia.\n\nC. Permanently discontinue carboplatin and continue paclitaxel alone\nThis is too drastic for a first episode of asymptomatic neutropenia and is not the standard first management step.\n\nD. Hold chemotherapy, start prophylactic oral antibiotics, and resume treatment when ANC > 1.0 \u00d7 10\u2079/L\nHolding treatment is reasonable, but routine prophylactic antibiotics are not recommended for typical solid-tumor patients with short-duration neutropenia.\n\nE. Continue chemotherapy with dose reduction because she is afebrile\nThis conflicts with regimen-specific dose-modification guidance, which recommends delaying treatment for ANC 0.5 to less than 1.0 \u00d7 10\u2079/L rather than giving chemotherapy through it.","evidence":"Good question overall. The stem clearly defines uncomplicated afebrile neutropenia, which should steer away from antibiotics or admission. The only small imperfection is that option A is a bit broad because \u201cconsider short-course G-CSF if prolonged neutropenia\u201d is more nuanced than the cleaner core action, which is simply to hold treatment and reassess counts.\n\nEvidence\n\nStrong for holding weekly paclitaxel/carboplatin at ANC 0.6 \u00d7 10\u2079/L and for not giving routine antibiotic prophylaxis in a solid-tumor patient with short-term neutropenia. Evidence is somewhat less direct for exactly when to add secondary G-CSF in this specific neoadjuvant TNBC regimen, because that part is individualized around delays, dose intensity, and recurrent events.\n\nPlausibility of distractors\n\nB is the strongest distractor because it starts correctly by holding treatment, but the antibiotic part makes it wrong.\nE is a classic trap for febrile neutropenia management and should be rejected because she is afebrile and asymptomatic.","references":["eviQ. Breast neoadjuvant carboplatin weekly and paclitaxel weekly protocol. Dose-modification table states ANC 0.5 to less than 1.0 \u00d7 10\u2079/L: delay treatment until recovery; more severe or recurrent myelosuppression may prompt later dose reduction. Evidence grade: regimen-level protocol guidance.","ASCO Clinical Practice Guideline Update on white blood cell growth factors. Secondary prophylaxis with CSF is recommended after a prior neutropenic complication when maintaining dose intensity matters, but CSFs should not be used routinely for afebrile neutropenia. Evidence grade: guideline, high.","ASCO/IDSA antimicrobial prophylaxis guideline. Antibiotic prophylaxis is not routinely recommended for patients with solid tumors. Evidence grade: guideline, high.","IDSA guideline on antimicrobial use in neutropenic patients with cancer. Antibacterial prophylaxis is generally reserved for selected high-risk patients with profound, prolonged neutropenia rather than routine short-term solid-tumor neutropenia. Evidence grade: guideline, high.","High for holding treatment and avoiding routine antibiotics."],"length_bias_flag":"NONE"},{"id":"174","section":"Supportive Care","question":"A 29-year-old nulliparous woman is diagnosed with stage IIB (T2N1) estrogen receptor\u2013positive, HER2-negative breast cancer. She desires future fertility. Neoadjuvant chemotherapy is planned to begin in 2 weeks. She is concerned about the potential impact of ovarian stimulation on her estrogen-sensitive tumor. Which of the following is the most appropriate fertility preservation strategy in this patient?","options":{"A":"Ovarian stimulation with concurrent letrozole, followed by oocyte or embryo cryopreservation","B":"Ovarian tissue cryopreservation","C":"Delay chemotherapy for completion of 6 cycles of ovarian stimulation to maximize oocyte yield","D":"Standard controlled ovarian stimulation without modification, followed by oocyte or embryo cryopreservation","E":"ovarian stimulation followed by oocyte or embryo cryopreservation, and Gonadotropin-releasing hormone (GnRH) agonist therapy during chemotherapy"},"correct_answer":"A","short_rationale":"* Brief rationale: In a postpubertal woman with ER-positive breast cancer who has about 2 weeks before chemotherapy, the preferred fertility-preservation approach is urgent random-start controlled ovarian stimulation with letrozole followed by oocyte or embryo cryopreservation; this is the established method most likely to preserve fertility, it keeps estradiol exposure lower than standard stimulation, and it can usually be completed without a meaningful delay in systemic therapy. GnRH agonist during chemotherapy can be offered as an adjunct for ovarian protection, but it should not replace established cryopreservation-based fertility preservation.\n* D is wrong because in ER-positive breast cancer, standard unmodified stimulation is not the preferred protocol when letrozole-supplemented stimulation is available.\n* B is wrong because ovarian tissue cryopreservation is an established option, but it is generally reserved for selected cases when controlled ovarian stimulation is not feasible or time is too limited, which is not the case here.\n* C is wrong because delaying neoadjuvant chemotherapy for multiple stimulation cycles is not appropriate.\n* E is wrong because GnRH agonist during chemotherapy is a reasonable adjunct, but the stimulation itself should be modified with letrozole in this ER-positive patient, so E is the best single answer.\n* Level of evidence: High for oocyte/embryo cryopreservation as standard fertility preservation; moderate for GnRH agonists as an adjunct to reduce chemotherapy-induced ovarian insufficiency, but not as a substitute for cryopreservation.\n* Clarity/plausibility: Good question, but slightly tricky because D contains something partly correct; the discriminator is that in an estrogen-sensitive tumor, the ovarian stimulation protocol should be letrozole-based, making E the best answer.\n* References:\n  * ASCO Guideline Update 2025, Fertility Preservation in People With Cancer.\n  * ASRM Committee Opinion 2026, Fertility preservation in patients with medical indications.\n  * ESMO Clinical Practice Guideline 2020, Fertility preservation and post-treatment pregnancies in post-pubertal cancer patients.\n  * Azim et al. J Clin Oncol 2008, safety of ovarian stimulation with letrozole and gonadotropins in breast cancer patients.","why_other_options_are_wrong":"- D is wrong because in ER-positive breast cancer, standard unmodified stimulation is not the preferred protocol when letrozole-supplemented stimulation is available.\n- B is wrong because ovarian tissue cryopreservation is an established option, but it is generally reserved for selected cases when controlled ovarian stimulation is not feasible or time is too limited, which is not the case here.\n- C is wrong because delaying neoadjuvant chemotherapy for multiple stimulation cycles is not appropriate.\n- E is wrong because GnRH agonist during chemotherapy is a reasonable adjunct, but the stimulation itself should be modified with letrozole in this ER-positive patient, so E is the best single answer.\n- Level of evidence: High for oocyte/embryo cryopreservation as standard fertility preservation; moderate for GnRH agonists as an adjunct to reduce chemotherapy-induced ovarian insufficiency, but not as a substitute for cryopreservation.\n- Clarity/plausibility: Good question, but slightly tricky because D contains something partly correct; the discriminator is that in an estrogen-sensitive tumor, the ovarian stimulation protocol should be letrozole-based, making E the best answer.\n- References:","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"175","section":"Supportive Care","question":"A 46-year-old woman with stage II HER2-positive breast cancer is scheduled to receive adjuvant epirubicin plus cyclophosphamide (EC) followed by paclitaxel and trastuzumab. The EC regimen is classified as highly emetogenic chemotherapy (HEC). She has a history of motion sickness but no prior chemotherapy exposure. Which of the following is the most appropriate antiemetic regimen for prevention of acute and delayed chemotherapy-induced nausea and vomiting (CINV) during her EC cycles?","options":{"A":"Ondansetron + dexamethasone + fosaprepitant + olanzapine This is actually also guideline-concordant in principle, because MASCC/ESMO found no major differences between available 5-HT3 antagonists or NK1 antagonists in HEC prophylaxis, so this option is hard to call definitively wrong.","B":"Palonosetron + dexamethasone + netupitant + olanzapine This is also essentially guideline-concordant, but the option is awkwardly written because netupitant is usually given as the fixed combination NEPA with palonosetron rather than as a separately listed agent.","C":"Ondansetron + dexamethasone + aprepitant Also incomplete for the same reason, since it omits olanzapine.","D":"Palonosetron + dexamethasone + aprepitant This is incomplete because AC/EC-Hec prophylaxis should now include olanzapine as part of the standard four-drug regimen.","E":"Palonosetron plus dexamethasone plus aprepitant plus olanzapine, as the standard four-drug prophylactic antiemetic regimen recommended by ASCO and MASCC/ESMO for highly emetogenic chemotherapy including anthracycline plus cyclophosphamide"},"correct_answer":"E","short_rationale":"For anthracycline/cyclophosphamide-type highly emetogenic chemotherapy, current major guidelines recommend a four-drug prophylactic regimen consisting of an NK1 receptor antagonist, a 5-HT3 receptor antagonist, dexamethasone, and olanzapine for acute and delayed CINV prevention. Her female sex, younger age, and history of motion sickness all increase CINV risk, which reinforces using full four-drug prophylaxis from cycle 1.","why_other_options_are_wrong":"A. Ondansetron + dexamethasone + fosaprepitant + olanzapine\nThis is actually also guideline-concordant in principle, because MASCC/ESMO found no major differences between available 5-HT3 antagonists or NK1 antagonists in HEC prophylaxis, so this option is hard to call definitively wrong.\n\nB. Palonosetron + dexamethasone + netupitant + olanzapine\nThis is also essentially guideline-concordant, but the option is awkwardly written because netupitant is usually given as the fixed combination NEPA with palonosetron rather than as a separately listed agent.\n\nC. Ondansetron + dexamethasone + aprepitant\nAlso incomplete for the same reason, since it omits olanzapine.\n\nD. Palonosetron + dexamethasone + aprepitant\nThis is incomplete because AC/EC-HEC prophylaxis should now include olanzapine as part of the standard four-drug regimen.","evidence":"This is not a clean single-best-answer question. The intended principle is clearly \u201cuse four-drug prophylaxis for AC/EC,\u201d but A, B, and E are all broadly acceptable modern four-drug regimens. If you want one keyed answer, A is the cleanest and most conventional wording, but the item should really be rewritten.\n\nPlausibility of distractors\n\nC and D are clearly inferior because they omit olanzapine.\nB and E are too plausible, which weakens the item substantially.","references":["Hesketh PJ, et al. ASCO Guideline Update, J Clin Oncol 2020. Adults receiving anthracycline plus cyclophosphamide should receive a four-drug combination of NK1 RA, 5-HT3 RA, dexamethasone, and olanzapine. Level of evidence: guideline, high.","Herrstedt J, et al. 2023 updated MASCC/ESMO consensus recommendations, Support Care Cancer 2024. Olanzapine is now recommended as a fixed part of a four-drug prophylactic regimen in both AC and non-AC HEC, and no major differences between 5-HT3 or NK1 antagonists were identified. Level of evidence: guideline/systematic review, high.","Basch E, et al. ASCO guideline update 2016. Includes netupitant/palonosetron among accepted antiemetic options. Level of evidence: guideline, high.","Bottom line: the best keyed answer is A, but the question is flawed because B and E are also defensible."],"length_bias_flag":"NONE"},{"id":"176","section":"Supportive Care","question":"A 34-year-old premenopausal woman with newly diagnosed stage II, ER-positive, HER2-negative breast cancer is planned to receive adjuvant chemotherapy with dose-dense AC followed by paclitaxel. She desires future fertility. You plan ovarian function suppression with a GnRH agonist for ovarian protection during chemotherapy. When should ovarian suppression be initiated to achieve optimal ovarian protection?","options":{"A":"at least 1-2 weeks prior to initiation of chemotherapy","B":"at least 1-2 days before the first chemotherapy cycle","C":"after computation of the first chemotherapy cycle","D":"at least 4 weeks prior to initiation of chemotherapy","E":"on the same day as the first chemotherapy infusion"},"correct_answer":"A","short_rationale":"* Brief rationale: GnRH agonist for ovarian protection should be started before chemotherapy, and among these options, 1\u20132 weeks prior is the best answer because this matches how the major breast cancer trials and ESMO guidance have generally implemented temporary ovarian suppression during chemotherapy; 4 weeks is unnecessary, while same-day or 1\u20132 days before is less well aligned with the classic evidence base.\n* B is wrong because 1\u20132 days before chemotherapy is shorter than the lead-in used in most supporting trials and is not the standard \u201coptimal\u201d timing.\n* C is wrong because starting after the first chemotherapy cycle misses the ovarian-protection intent during the initial exposure.\n* D is wrong because starting 4 weeks earlier is not required and could create an unnecessary delay or extra burden without evidence that it improves protection.\n* E is wrong because same-day initiation is less consistent with the protocol used in the pivotal evidence base when the question asks for \u201coptimal\u201d protection.\n* Level of evidence: Moderate for the exact timing; high that GnRH agonist should be given during chemotherapy for ovarian protection, but the precise lead-in interval is based more on trial design and expert guidance than on definitive comparative randomized timing data.\n* Clarity/plausibility: Reasonable question, but slightly imperfect because the strongest evidence supports starting before chemotherapy, while the exact superiority of 1\u20132 weeks over shorter intervals is less certain; one prospective study found no clear ovarian-reserve difference by timing interval.\n* References:\n  * ESMO Clinical Practice Guideline on fertility preservation: temporary ovarian suppression with GnRHa starting at least 1 week before systemic therapy.\n  * Del Mastro et al., JAMA 2011: triptorelin administered at least 1 week before chemotherapy and then every 4 weeks.\n  * Munhoz et al., JAMA Oncology 2016 meta-analysis: GnRHa in the included breast cancer trials generally began at least 1 week before chemotherapy.\n  * Shin et al., Journal of Breast Cancer 2020: no significant AMH difference by shorter versus longer pre-chemotherapy interval, highlighting that the exact \u201cbest\u201d interval is not definitively proven.","why_other_options_are_wrong":"- B is wrong because 1\u20132 days before chemotherapy is shorter than the lead-in used in most supporting trials and is not the standard \u201coptimal\u201d timing.\n- C is wrong because starting after the first chemotherapy cycle misses the ovarian-protection intent during the initial exposure.\n- D is wrong because starting 4 weeks earlier is not required and could create an unnecessary delay or extra burden without evidence that it improves protection.\n- E is wrong because same-day initiation is less consistent with the protocol used in the pivotal evidence base when the question asks for \u201coptimal\u201d protection.\n- Level of evidence: Moderate for the exact timing; high that GnRH agonist should be given during chemotherapy for ovarian protection, but the precise lead-in interval is based more on trial design and expert guidance than on definitive comparative randomized timing data.\n- Clarity/plausibility: Reasonable question, but slightly imperfect because the strongest evidence supports starting before chemotherapy, while the exact superiority of 1\u20132 weeks over shorter intervals is less certain; one prospective study found no clear ovarian-reserve difference by timing interval.\n- References:","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"MILD"},{"id":"177","section":"Supportive Care","question":"A 38-year-old premenopausal woman with stage IIIC (cT2N2) hormone receptor\u2013positive, HER2-negative breast cancer is planned for dose-dense ETC (Epirubicin, Paclitaxel, Cyclophosphamide) as neoadjuvant chemotherapy due to 4 biopsy-proven positive axillary lymph nodes.Which of the following additional medications is most important to administer during the cyclophosphamide-containing cycles?","options":{"A":"Mesna for urothelial protection during cyclophosphamide Cyclophosphamide SmPC says mesna can be used, but it is not the defining mandatory adjunct for standard breast-cancer cyclophosphamide dosing in this setting.","B":"Ciprofloxacin d2\u2013d15 for antibacterial prophylaxis Too incomplete, because the regimen-specific support strategy also included pegfilgrastim.","C":"Aggressive oral hydration with bladder protection measures Supported by the cyclophosphamide SmPC, but not the most important additional medication in classical dose-dense ETC support.","D":"G-CSF (pegfilgrastim) for primary neutropenia prophylaxis and ciprofloxacin (d5\u2013d14) for antibacterial prophylaxis, combined as standard supportive care during dose-dense ETC in the German high-risk neoadjuvant breast cancer protocol","E":"G-CSF (pegfilgrastim) for primary neutropenia prophylaxis This is the best generic modern-guideline answer, but for classical German iddETC protocol questions it misses the added ciprofloxacin component."},"correct_answer":"D","short_rationale":"The SmPC-level part is clear for pegfilgrastim: it is indicated to reduce the duration of neutropenia and the incidence of febrile neutropenia in adults receiving cytotoxic chemotherapy. For cyclophosphamide, the SmPC supports hydration and bladder-emptying measures and says mesna can be used, but it does not make mesna the key routine add-on for conventional-dose breast regimens.\n\nWhat pushed me to revise from C to D is the regimen-specific evidence around intense dose-dense ETC/iddETC: later safety reports from the German GAIN/AGO experience state that patients received pegfilgrastim on day 2 of each cycle, and that protocol implementations to improve safety included prophylactic oral ciprofloxacin during the cyclophosphamide/EC-containing cycles. So if the exam is testing that exact regimen culture, D is the better keyed answer.\n\nImportant caveat: the option is still imperfectly written, because the published ciprofloxacin schedule is typically described as 500 mg twice daily on days 5\u201314, not \u201cd2\u2013d15.\u201d So D is the closest answer, not a perfectly phrased one.\n\nWhy the others are not correct\n\nA. Aggressive oral hydration with bladder protection measures\nSupported by the cyclophosphamide SmPC, but not the most important additional medication in classical dose-dense ETC support.\n\nB. Ciprofloxacin d2\u2013d15 for antibacterial prophylaxis\nToo incomplete, because the regimen-specific support strategy also included pegfilgrastim.\n\nC. G-CSF (pegfilgrastim) for primary neutropenia prophylaxis\nThis is the best generic modern-guideline answer, but for classical German iddETC protocol questions it misses the added ciprofloxacin component.\n\nE. Mesna for urothelial protection during cyclophosphamide\nCyclophosphamide SmPC says mesna can be used, but it is not the defining mandatory adjunct for standard breast-cancer cyclophosphamide dosing in this setting.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"The question is flawed because it mixes two different frames. If it asks for current broad supportive-care standards, C is cleaner. If it asks for the historical/classical dose-dense ETC protocol used in German breast-cancer trials, D is the intended answer. Given the regimen name and the node-positive high-risk setting, I now think D is more likely what the writer wanted.","references":["Neulasta EMA product information: pegfilgrastim is indicated to reduce neutropenia duration and febrile neutropenia in adults receiving cytotoxic chemotherapy. High-authority regulatory source.","Cyclophosphamide SmPC: maintain urine output, hydrate well, frequent bladder emptying; mesna can be used concurrently to reduce urotoxicity. High-authority regulatory source.","GAIN/AGO safety report snippet: during iddETC and EC, patients received pegfilgrastim on day 2; protocol implementations to improve safety included prophylactic oral ciprofloxacin during EC cycles. Regimen-specific trial support.","Peer-reviewed review snippet: primary prophylaxis in these breast-cancer dose-dense settings included ciprofloxacin 500 mg orally twice daily on days 5\u201314, pegfilgrastim day 2, or the combination. Supportive but less authoritative than SmPC/guideline sources.","Evidence grade","For pegfilgrastim: high.","For adding ciprofloxacin specifically in classical dose-dense ETC/iddETC: moderate, regimen-specific rather than universal guideline standard.","For D as the best exam key in this wording: moderate."],"length_bias_flag":"NONE"},{"id":"178","section":"Supportive Care","question":"A 62-year-old postmenopausal woman with stage IIA, ER+/PR+, HER2-negative breast cancer is receiving adjuvant anastrozole. After 8 months of therapy, she reports progressive bilateral hand, wrist, and knee pain with morning stiffness lasting 45 minutes. Physical examination reveals tenderness of the metacarpophalangeal and proximal interphalangeal joints without synovitis. ESR and CRP are normal. Rheumatoid factor and anti-CCP antibodies are negative. Vitamin D level is 18 ng/mL (low). Bone mineral density shows osteopenia. She has been compliant with therapy and is concerned about stopping treatment due to fear of recurrence. Which of the following is the most appropriate next step?","options":{"A":"pause anastrozole, start with duloxetin therapy and restart when symptoms are better","B":"Initiate vitamin D supplementation, structured exercise program, and NSAIDs while continuing anastrozole","C":"pause anastrozole, initiate vitamin D supplementation and re-start again after symptoms getting better","D":"Permanently discontinue anastrozole and initiate tamoxifen","E":"Start low-dose prednisone for presumed inflammatory arthritis"},"correct_answer":"B","short_rationale":"* Brief rationale: This is classic aromatase inhibitor\u2013associated musculoskeletal syndrome rather than inflammatory arthritis, and with documented vitamin D deficiency plus osteopenia, the best next step is to continue anastrozole and start supportive management with vitamin D supplementation, structured exercise, and symptomatic analgesia such as NSAIDs; exercise has randomized-trial support, and bone health guidelines recommend correction of vitamin D deficiency with calcium/vitamin E and exercise during AI therapy.\n* A is wrong because duloxetine is a reasonable option for persistent AIMSS, but pausing an effective adjuvant AI is not the best first step when reversible contributors like vitamin D deficiency have not yet been addressed.\n* D is wrong because switching to tamoxifen is generally reserved for symptoms that remain intolerable despite supportive measures or AI switching strategies, not as the immediate next step.\n* E is wrong because the presentation lacks synovitis or inflammatory markers, so low-dose prednisone for presumed inflammatory arthritis is not appropriate.\n* C is wrong because a temporary AI interruption can be used diagnostically in selected refractory cases, but here the more appropriate first intervention is active supportive management while maintaining adherence.\n* Level of evidence: Moderate; exercise is supported by randomized data, duloxetine by a randomized placebo-controlled trial, and vitamin D/calcium plus exercise are guideline-supported for AI-treated patients with bone loss risk, but no single intervention is universally definitive for AIMSS.\n* Clarity/plausibility: Good question; the key is recognizing non-inflammatory AIMSS and not overreacting by stopping endocrine therapy too early.\n* References:\n  * Kim et al. aromatase inhibitor\u2013induced arthralgia, Rheumatology Advances in Practice 2024.\n  * Irwin et al. randomized exercise trial of AI-induced arthralgia, J Clin Oncol 2015.\n  * Henry et al. SWOG S1202 duloxetine trial, J Clin Oncol 2018.\n  * Coleman et al. Bone health in cancer, ESMO Clinical Practice Guidelines 2020.\n  * Hadji et al. management of AI-associated bone loss, Ann Oncol 2011.","why_other_options_are_wrong":"- A is wrong because duloxetine is a reasonable option for persistent AIMSS, but pausing an effective adjuvant AI is not the best first step when reversible contributors like vitamin D deficiency have not yet been addressed.\n- D is wrong because switching to tamoxifen is generally reserved for symptoms that remain intolerable despite supportive measures or AI switching strategies, not as the immediate next step.\n- E is wrong because the presentation lacks synovitis or inflammatory markers, so low-dose prednisone for presumed inflammatory arthritis is not appropriate.\n- C is wrong because a temporary AI interruption can be used diagnostically in selected refractory cases, but here the more appropriate first intervention is active supportive management while maintaining adherence.\n- Level of evidence: Moderate; exercise is supported by randomized data, duloxetine by a randomized placebo-controlled trial, and vitamin D/calcium plus exercise are guideline-supported for AI-treated patients with bone loss risk, but no single intervention is universally definitive for AIMSS.\n- Clarity/plausibility: Good question; the key is recognizing non-inflammatory AIMSS and not overreacting by stopping endocrine therapy too early.\n- References:","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"MILD"},{"id":"179","section":"Supportive Care","question":"A 56-year-old postmenopausal woman with ER-positive early-stage breast cancer is receiving adjuvant letrozole. She reports severe vasomotor symptoms (\u226510 hot flashes/day) significantly impairing sleep and quality of life. She has no history of depression. Her oncologic treatment must continue. Which of the following is the most evidence-based and guideline-supported management option?","options":{"A":"Start venlafaxine for vasomotor symptoms","B":"Recommend black cohosh or soy isoflavones as first-line therapy, continue with letrozole","C":"Initiate systemic hormone replacement therapy (estrogen \u00b1 progestin)","D":"switch to tamoxifen","E":"Continue letrozole and start fezolinetant"},"correct_answer":"A","short_rationale":"* Brief rationale: In a woman with ER-positive breast cancer who needs to continue letrozole, the most evidence-based and guideline-supported treatment for severe vasomotor symptoms is a nonhormonal agent such as venlafaxine; randomized trials in breast cancer survivors showed clear hot-flash reduction, and major menopause/cancer guidance supports SSRIs/SNRIs for VMS, whereas systemic hormone therapy is generally avoided in hormone-sensitive cancer and fezolinetant is not yet established for women actively receiving anti-hormone therapy for breast cancer.\n* C is wrong because systemic estrogen-based hormone therapy is generally not recommended in hormone-sensitive breast cancer.\n* D is wrong because switching endocrine therapy is not first-line management for hot flashes, and tamoxifen itself is also associated with vasomotor symptoms.\n* B is wrong because black cohosh and soy/isoflavones are not guideline-supported first-line therapies, and NAMS specifically does not recommend them for VMS.\n* E is wrong because fezolinetant is approved for menopausal VMS in general, but women undergoing oncologic anti-hormone treatment for breast cancer were not included in the clinical studies, and the EMA product information says it is not recommended in this population because safety and efficacy are unknown.\n* Level of evidence: moderate to high for venlafaxine, based on randomized trials plus guideline support; low/insufficient for fezolinetant specifically in patients on active breast cancer endocrine therapy.\n* Clarity/plausibility: good question; D is the only real trap because it is modern and nonhormonal, but today the guideline-safe exam answer in breast cancer remains venlafaxine, not fezolinetant.\n* Key references:\n  * NAMS 2023 Nonhormone Therapy Position Statement.\n  * Loprinzi et al., Lancet 2000, randomized trial of venlafaxine for hot flashes in breast cancer survivors.\n  * Zhu et al., The Oncologist 2025, review of vasomotor symptom management in cancer patients.\n  * EMA product information for fezolinetant.","why_other_options_are_wrong":"- C is wrong because systemic estrogen-based hormone therapy is generally not recommended in hormone-sensitive breast cancer.\n- D is wrong because switching endocrine therapy is not first-line management for hot flashes, and tamoxifen itself is also associated with vasomotor symptoms.\n- B is wrong because black cohosh and soy/isoflavones are not guideline-supported first-line therapies, and NAMS specifically does not recommend them for VMS.\n- E is wrong because fezolinetant is approved for menopausal VMS in general, but women undergoing oncologic anti-hormone treatment for breast cancer were not included in the clinical studies, and the EMA product information says it is not recommended in this population because safety and efficacy are unknown.\n- Level of evidence: moderate to high for venlafaxine, based on randomized trials plus guideline support; low/insufficient for fezolinetant specifically in patients on active breast cancer endocrine therapy.\n- Clarity/plausibility: good question; D is the only real trap because it is modern and nonhormonal, but today the guideline-safe exam answer in breast cancer remains venlafaxine, not fezolinetant.\n- Key references:","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"180","section":"Supportive Care","question":"A 55-year-old woman with stage IIIA triple-negative breast cancer is receiving adjuvant dose-dense chemotherapy after surgery. She has researched complementary medicine and requests subcutaneous mistletoe (Viscum album) therapy to \u201cstrengthen her immune system\u201d and reduce recurrence risk. She states she is willing to pay out of pocket and asks whether you will prescribe or supervise the treatment. Which of the following is the most ethically appropriate response?","options":{"A":"Strongly discourage mistletoe therapy by stating that published data demonstrate an increased recurrence risk, even though existing clinical trial evidence remains inconclusive and no guideline currently identifies mistletoe as harmful to oncologic outcomes.","B":"Decline to discuss mistletoe therapy in any clinical context as it falls outside evidence-based oncology guidelines and engaging with the request risks implying legitimacy to an unproven intervention that should not occupy valuable consultation time.","C":"Agree to prescribe mistletoe therapy and present it as a likely beneficial adjunct to chemotherapy, reasoning that patient autonomy and willingness to self-fund override physician concerns about the current limitations in the evidence base for this intervention.","D":"Explain the evidence transparently including the absence of proven survival benefit, discuss potential harms and financial costs, affirm that chemotherapy must not be compromised, and engage in shared decision-making that respects autonomy while maintaining clinical integrity.","E":"Redirect the patient to another provider without further discussion to avoid medico-legal liability, reputational risk, and institutional scrutiny associated with supervising any complementary or integrative therapy during active oncologic treatment."},"correct_answer":"D","short_rationale":"* Brief rationale: The ethically best response is transparent counseling plus shared decision-making: explain that mistletoe has no proven benefit for recurrence reduction or survival, that any quality-of-life benefit is at best limited/uncertain, review possible harms, interactions, logistics, and financial cost, and make clear that evidence-based adjuvant chemotherapy must not be compromised; this respects autonomy without overstating benefit or abandoning professional integrity. ASCO-endorsed integrative oncology guidance allows subcutaneous mistletoe only as a selective Grade C option for quality of life, not for oncologic outcome improvement, and AGO rates mistletoe negatively for recurrence/overall survival.\n* E is wrong because simply redirecting her without discussion fails the physician\u20

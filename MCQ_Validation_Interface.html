dified radical mastectomy to control bleeding and local disease Immediate surgery is not standard for inflammatory breast cancer, which is considered a neoadjuvant-first disease; surgery is usually performed after response to systemic therapy.","B":"Embolization of feeding vessels followed by surgical resection if technically feasible Embolization is not standard first-line management for inflammatory breast cancer and is supported mainly by isolated case-level experience for selected uncontrolled local symptoms, not as routine initial therapy.","C":"Neoadjuvant trastuzumab, pertuzumab, and taxane-based chemotherapy with aggressive wound care and supportive hemostatic measures, as this is nonmetastatic stage III HER2-positive inflammatory breast cancer requiring trimodality therapy starting with neoadjuvant systemic treatment per standard guidelines","D":"Urgent palliative radiation therapy followed by surgery if adequate response occurs This is not the standard sequence for inflammatory breast cancer; guideline-concordant care is neoadjuvant systemic therapy first, then surgery, then radiation.","E":"Urgent radiation therapy to achieve hemostasis before initiating systemic therapy Radiotherapy can palliate bleeding from malignant fungating wounds, but in a stable patient with potentially curable, nonmetastatic inflammatory HER2-positive disease it should not replace or delay standard neoadjuvant systemic therapy as the initial oncologic strategy."},"correct_answer":"C","short_rationale":"This is nonmetastatic inflammatory HER2-positive breast cancer with ongoing but not catastrophic local bleeding. For stage III inflammatory breast cancer, the standard approach is trimodality therapy starting with neoadjuvant systemic therapy, then modified radical mastectomy, then radiotherapy. In HER2-positive stage II\u2013III disease, neoadjuvant chemotherapy plus dual HER2 blockade is the preferred systemic approach. Because she is hemodynamically stable, has no sepsis, and the bleeding is persistent but not brisk, the bleeding does not override the usual \u201csystemic therapy first\u201d strategy; it calls for aggressive local wound care and supportive management alongside systemic treatment.\n\nA practical nuance: the stem does not mention supportive measures, but with a hemoglobin of 5.2 mmol/L, anemia management and local hemostatic wound care should be addressed urgently in parallel. That still does not make upfront radiation or surgery the best oncologic next step from the options given.","why_other_options_are_wrong":"A. Immediate modified radical mastectomy to control bleeding and local disease\nImmediate surgery is not standard for inflammatory breast cancer, which is considered a neoadjuvant-first disease; surgery is usually performed after response to systemic therapy.\n\nB. Embolization of feeding vessels followed by surgical resection if technically feasible\nEmbolization is not standard first-line management for inflammatory breast cancer and is supported mainly by isolated case-level experience for selected uncontrolled local symptoms, not as routine initial therapy.\n\nD. Urgent palliative radiation therapy followed by surgery if adequate response occurs\nThis is not the standard sequence for inflammatory breast cancer; guideline-concordant care is neoadjuvant systemic therapy first, then surgery, then radiation.\n\nE. Urgent radiation therapy to achieve hemostasis before initiating systemic therapy\nRadiotherapy can palliate bleeding from malignant fungating wounds, but in a stable patient with potentially curable, nonmetastatic inflammatory HER2-positive disease it should not replace or delay standard neoadjuvant systemic therapy as the initial oncologic strategy.","evidence":"The evidence for neoadjuvant systemic therapy first in stage III inflammatory breast cancer is strong at the guideline and consensus level. The evidence for dual HER2 blockade in stage II\u2013III HER2-positive disease is also strong. What is weaker is direct comparative evidence for exactly how to handle \u201cstable but bleeding\u201d inflammatory presentations, so that part is driven more by multidisciplinary practice logic than by randomized trials.\n\nA is the strongest distractor because radiotherapy really can help control bleeding in fungating breast tumors. It becomes the better answer only if the bleeding is brisk, unstable, refractory to local measures, or if the patient is not a candidate for prompt systemic therapy. In this stem, that threshold is not reached.","references":["Takahashi Y, et al. Inflammatory breast cancer, best practice in the community setting. npj Breast Cancer. 2025. States that newly diagnosed IBC is treated with neoadjuvant systemic therapy, surgery, and radiation therapy. Evidence grade: review/consensus.","Kronen EA, et al. National trends and survival outcomes associated with non-guideline-concordant treatment of inflammatory breast cancer. Breast Cancer Res Treat. 2025. Describes NCCN-concordant trimodality therapy as neoadjuvant systemic therapy, modified radical mastectomy, and adjuvant radiation for nonmetastatic IBC. Evidence grade: observational, strong practice-supporting.","NICE Guideline NG101 evidence review for HER2-positive breast cancer. 2025. Recommends offering neoadjuvant chemotherapy for HER2-positive invasive breast cancer when neoadjuvant treatment is indicated, cross-referring to pertuzumab-based neoadjuvant therapy. Evidence grade: guideline.","Neoadjuvant chemotherapy for people with HER2-positive breast cancer. NICE Bookshelf. 2025. Confirms the neoadjuvant setting for HER2-positive invasive breast cancer and pertuzumab/trastuzumab-containing regimens for locally advanced or inflammatory disease. Evidence grade: guideline.","Reinking AL, et al. Radiotherapy in the treatment of malignant fungating wounds. Strahlenther Onkol. 2025. Supports radiotherapy as an effective local option to reduce bleeding, exudation, and edema in malignant fungating wounds. Evidence grade: retrospective/practice review.","Best-answer confidence: high."],"length_bias_flag":"NONE"}];

let current = 0, filter = 'all', activeView = 'questions', tableSearch = '';
let validations = {};
try { const s = localStorage.getItem('mcq_val_v3'); if(s) validations = JSON.parse(s); } catch(e) {}

function save() { try { localStorage.setItem('mcq_val_v3', JSON.stringify(validations)); } catch(e) {} }
function getVal(id) { return validations[id] || { correctOk:null, distractorsOk:null, usable:null, comment:'' }; }
function setVal(id, key, value) {
  if(!validations[id]) validations[id] = { correctOk:null, distractorsOk:null, usable:null, comment:'' };
  validations[id][key] = validations[id][key] === value ? null : value;
  save(); render();
}
function setComment(id, text) {
  if(!validations[id]) validations[id] = { correctOk:null, distractorsOk:null, usable:null, comment:'' };
  validations[id].comment = text; save();
}
function getStatus(id) { const v = validations[id]; return (!v || v.usable===null) ? null : v.usable; }

function getCounts() {
  let ok=0,rev=0,rej=0;
  DATA.forEach(q => { const s=getStatus(q.id); if(s==='OK')ok++; else if(s==='Revise')rev++; else if(s==='Reject')rej++; });
  return { ok, rev, rej, open: DATA.length-ok-rev-rej };
}

function getFilteredIndices() {
  return DATA.map((q,i)=>i).filter(i => {
    const s = getStatus(DATA[i].id);
    if(filter==='all') return true;
    if(filter==='open') return s===null;
    return s===filter;
  });
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const t = b.textContent.trim();
    b.classList.toggle('active', t.toLowerCase()===f.toLowerCase() || (f==='all' && t==='All'));
  });
  renderList();
}

function setView(v) {
  activeView = v;
  document.getElementById('viewQuestions').classList.toggle('active', v==='questions');
  document.getElementById('viewOverview').classList.toggle('active', v==='overview');
  document.getElementById('questionView').style.display = v==='questions' ? '' : 'none';
  document.getElementById('overviewView').style.display = v==='overview' ? '' : 'none';
  document.getElementById('filterBar').style.display = v==='questions' ? '' : 'none';
  document.getElementById('qList').style.display = v==='questions' ? '' : 'none';
  if(v==='overview') renderOverview();
}

function navigate(dir) {
  const filtered = getFilteredIndices();
  if(!filtered.length) return;
  const ci = filtered.indexOf(current);
  current = dir===1 ? (ci===-1||ci>=filtered.length-1 ? filtered[0] : filtered[ci+1]) : (ci<=0 ? filtered[filtered.length-1] : filtered[ci-1]);
  render();
}
function goTo(i) { current = i; if(activeView==='overview') setView('questions'); render(); }

function updateStats() {
  const c = getCounts();
  document.getElementById('statOk').textContent = c.ok;
  document.getElementById('statRevise').textContent = c.rev;
  document.getElementById('statReject').textContent = c.rej;
  document.getElementById('statOpen').textContent = c.open;
  document.getElementById('progressBar').style.width = ((c.ok+c.rev+c.rej)/DATA.length*100)+'%';
}

function renderList() {
  const filtered = getFilteredIndices();
  document.getElementById('qList').innerHTML = filtered.map(i => {
    const q = DATA[i], s = getStatus(q.id);
    const color = s==='OK'?'#1A6B52':s==='Revise'?'#D4850A':s==='Reject'?'#C0392B':'rgba(255,255,255,0.12)';
    return '<div class="q-item '+(i===current?'active':'')+'" onclick="goTo('+i+')"><span class="q-num">Q'+q.id+'</span><span class="q-section">'+q.section+'</span><span class="q-status" style="background:'+color+'"></span></div>';
  }).join('');
}

function renderQuestion() {
  const q = DATA[current], v = getVal(q.id);
  document.getElementById('qCounter').innerHTML = 'Q'+q.id+' <span>/ '+DATA.length+'</span>';
  document.getElementById('sectionBadge').textContent = q.section;
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===DATA.length-1;

  const optKeys = Object.keys(q.options);
  const optionsHtml = optKeys.map(k => {
    const ic = k===q.correct_answer;
    return '<div class="option '+(ic?'correct':'wrong')+'"><span class="option-letter">'+k+'.</span><span>'+q.options[k]+'</span></div>';
  }).join('');

  const flagClass = q.length_bias_flag && q.length_bias_flag!=='NONE' ? 'flag-'+q.length_bias_flag : 'flag-NONE';
  const flagLabel = q.length_bias_flag && q.length_bias_flag!=='NONE' ? q.length_bias_flag+' length bias' : '';
  const refsHtml = (q.references||[]).map(r => '<li>'+r+'</li>').join('');

  function vBtn(key, val, label, type) {
    const sel = v[key]===val;
    const cls = sel ? (type==='ok'?'selected-ok':type==='revise'?'selected-revise':'selected-reject') : '';
    return '<button class="val-btn '+cls+'" onclick="setVal(''+q.id+"','"+key+"','"+val+'')">'+label+'</button>';
  }

  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="question-card"><div class="question-label">Question <span class="length-flag '+flagClass+'">'+flagLabel+'</span></div><div class="question-text">'+q.question+'</div></div>'
    +'<div class="options-card"><div class="question-label">Answer Options <span style="color:var(--correct);font-size:12px;font-weight:600;">— Correct: '+q.correct_answer+'</span></div>'+optionsHtml+'</div>'
    +'<div class="rationale-card"><button class="rationale-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'; this.querySelector('.arrow').classList.toggle('open')">Rationale & References <span class="arrow">&#9660;</span></button>'
    +'<div class="rationale-body" style="display:none;"><div class="rationale-section-title">Why '+q.correct_answer+' is correct</div>'
    +q.short_rationale.split('\n\n').map(p=>'<p>'+p+'</p>').join('')
    +'<div class="rationale-section-title">Why other options are wrong</div>'
    +q.why_other_options_are_wrong.split('\n\n').map(p=>'<p>'+p+'</p>').join('')
    +(refsHtml?'<div class="rationale-section-title">References</div><ul class="ref-list">'+refsHtml+'</ul>':'')
    +'</div></div>'
    +'<div class="validation-card"><div class="validation-title">&#9745; Your Validation</div>'
    +'<div class="val-row"><span class="val-label">1. Correct answer is right?</span><div class="val-btns">'+vBtn('correctOk','yes','Yes','ok')+vBtn('correctOk','no','No','reject')+'</div></div>'
    +'<div class="val-row"><span class="val-label">2. Wrong options suitable?</span><div class="val-btns">'+vBtn('distractorsOk','yes','Yes','ok')+vBtn('distractorsOk','partially','Partially','revise')+vBtn('distractorsOk','no','No','reject')+'</div></div>'
    +'<div class="val-row"><span class="val-label">3. MCQ usable?</span><div class="val-btns">'+vBtn('usable','OK','OK','ok')+vBtn('usable','Revise','Revise','revise')+vBtn('usable','Reject','Reject','reject')+'</div></div>'
    +'<textarea class="comment-area" placeholder="Comment (optional)..." oninput="setComment(''+q.id+'', this.value)">'+(v.comment||'')+'</textarea></div>'
    +'<div class="keyboard-hint"><kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigate &middot; <kbd>1</kbd> correct yes &middot; <kbd>2</kbd> distractors yes &middot; <kbd>3</kbd> MCQ OK</div>';
  area.scrollTop = 0;
}

function renderOverview() {
  const c = getCounts();

  // Section breakdown
  const sections = {};
  DATA.forEach(q => {
    if(!sections[q.section]) sections[q.section] = {ok:0,rev:0,rej:0,open:0,total:0};
    sections[q.section].total++;
    const s = getStatus(q.id);
    if(s==='OK') sections[q.section].ok++;
    else if(s==='Revise') sections[q.section].rev++;
    else if(s==='Reject') sections[q.section].rej++;
    else sections[q.section].open++;
  });

  const sectionRows = Object.entries(sections).sort((a,b)=>b[1].total-a[1].total).map(([name, d]) => {
    const pOk = d.ok/d.total*100, pRev = d.rev/d.total*100, pRej = d.rej/d.total*100, pOpen = d.open/d.total*100;
    const reviewed = d.ok+d.rev+d.rej;
    return '<div class="section-row"><span class="section-name">'+name+'</span>'
      +'<div class="section-bar-wrap"><div class="section-bar-ok" style="width:'+pOk+'%"></div><div class="section-bar-revise" style="width:'+pRev+'%"></div><div class="section-bar-reject" style="width:'+pRej+'%"></div><div class="section-bar-open" style="width:'+pOpen+'%"></div></div>'
      +'<span class="section-count">'+reviewed+' / '+d.total+'</span></div>';
  }).join('');

  // Table rows
  const tableRows = DATA.filter(q => {
    if(!tableSearch) return true;
    const s = tableSearch.toLowerCase();
    return q.id.includes(s) || q.section.toLowerCase().includes(s) || q.question.toLowerCase().includes(s) || (getVal(q.id).comment||'').toLowerCase().includes(s);
  }).map((q,idx) => {
    const v = getVal(q.id), s = getStatus(q.id);
    const pillClass = s ? 'pill-'+s : 'pill-open';
    const pillText = s || 'Open';
    const corrIcon = v.correctOk==='yes'?'<span style="color:var(--correct)">&#10003;</span>':v.correctOk==='no'?'<span style="color:var(--reject)">&#10007;</span>':'—';
    const distIcon = v.distractorsOk==='yes'?'<span style="color:var(--correct)">&#10003;</span>':v.distractorsOk==='partially'?'<span style="color:var(--revise)">~</span>':v.distractorsOk==='no'?'<span style="color:var(--reject)">&#10007;</span>':'—';
    const i = DATA.indexOf(q);
    return '<tr onclick="goTo('+i+')">'
      +'<td>Q'+q.id+'</td>'
      +'<td>'+q.section+'</td>'
      +'<td class="q-preview">'+q.question.substring(0,80)+'...</td>'
      +'<td style="text-align:center">'+corrIcon+'</td>'
      +'<td style="text-align:center">'+distIcon+'</td>'
      +'<td><span class="status-pill '+pillClass+'">'+pillText+'</span></td>'
      +'<td class="comment-preview">'+(v.comment||'')+'</td></tr>';
  }).join('');

  document.getElementById('overviewContent').innerHTML =
    '<div class="overview-stats">'
    +'<div class="stat-card stat-ok"><div class="stat-num">'+c.ok+'</div><div class="stat-label">Approved</div></div>'
    +'<div class="stat-card stat-revise"><div class="stat-num">'+c.rev+'</div><div class="stat-label">Revise</div></div>'
    +'<div class="stat-card stat-reject"><div class="stat-num">'+c.rej+'</div><div class="stat-label">Rejected</div></div>'
    +'<div class="stat-card stat-open"><div class="stat-num">'+c.open+'</div><div class="stat-label">Open</div></div></div>'
    +'<div class="section-summary"><h3>Progress by Section</h3>'+sectionRows+'</div>'
    +'<div class="overview-table-wrap"><div class="overview-table-header"><h3>All Questions</h3><input class="search-input" placeholder="Search by ID, section, text..." value="'+tableSearch+'" oninput="tableSearch=this.value;renderOverview()"></div>'
    +'<div class="ov-table-scroll"><table class="ov-table"><thead><tr><th>ID</th><th>Section</th><th>Question</th><th>Correct</th><th>Distr.</th><th>Status</th><th>Comment</th></tr></thead><tbody>'+tableRows+'</tbody></table></div></div>';
}

function render() { updateStats(); renderList(); if(activeView==='questions') renderQuestion(); else renderOverview(); }

document.addEventListener('keydown', e => {
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  const q = DATA[current];
  if(e.key==='ArrowRight') navigate(1);
  else if(e.key==='ArrowLeft') navigate(-1);
  else if(e.key==='1') setVal(q.id,'correctOk','yes');
  else if(e.key==='2') setVal(q.id,'distractorsOk','yes');
  else if(e.key==='3') setVal(q.id,'usable','OK');
});

function exportResults() {
  const rows = [['Q-ID','Section','Correct Answer','Correct OK','Distractors OK','MCQ Usable','Comment']];
  DATA.forEach(q => {
    const v = getVal(q.id);
    rows.push([q.id, q.section, q.correct_answer, v.correctOk||'', v.distractorsOk||'', v.usable||'', (v.comment||'').replace(/"/g,'""')]);
  });
  const csv = rows.map(r => r.map(c => '"'+c+'"').join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'mcq_validation_results.csv'; a.click();
}

render();
</script>
</body>
</html>

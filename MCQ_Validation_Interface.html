<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Clinical Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #F7F5F2; --card: #FFFFFF; --border: #E4E0DA; --text: #2D2A26;
  --text-muted: #8A8580; --accent: #1A6B52; --accent-light: #E8F5F0;
  --correct: #1A6B52; --correct-bg: #E8F5F0; --wrong-bg: #FFF8F0;
  --reject: #C0392B; --reject-bg: #FDECEB; --revise: #D4850A; --revise-bg: #FFF5E5;
  --ok-bg: #E8F5F0; --sidebar-bg: #2D2A26; --sidebar-text: #C8C4BE;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

.sidebar { width:280px; min-width:280px; background:var(--sidebar-bg); display:flex; flex-direction:column; }
.sidebar-header { padding:24px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-header h1 { font-family:'Source Serif 4',serif; font-size:18px; color:#fff; font-weight:700; margin-bottom:4px; }
.sidebar-header p { font-size:12px; color:var(--sidebar-text); }
.progress-bar-wrap { margin-top:12px; background:rgba(255,255,255,0.08); border-radius:6px; height:6px; overflow:hidden; }
.progress-bar-fill { height:100%; background:var(--accent); border-radius:6px; transition:width 0.3s; }
.progress-stats { display:flex; gap:12px; margin-top:8px; font-size:11px; color:var(--sidebar-text); }
.progress-stats span { display:flex; align-items:center; gap:4px; }
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot-ok { background:#1A6B52; } .dot-revise { background:#D4850A; } .dot-reject { background:#C0392B; } .dot-skip { background:rgba(255,255,255,0.15); }

.view-toggle { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; gap:4px; }
.view-btn { flex:1; padding:8px; border-radius:8px; border:none; background:transparent; color:var(--sidebar-text); cursor:pointer; font-size:12px; font-weight:600; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.view-btn:hover { background:rgba(255,255,255,0.06); }
.view-btn.active { background:rgba(255,255,255,0.12); color:#fff; }

.filter-bar { padding:12px 20px; display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn { font-size:11px; padding:4px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:var(--sidebar-text); cursor:pointer; transition:all 0.15s; }
.filter-btn:hover, .filter-btn.active { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.25); }

.q-list { flex:1; overflow-y:auto; padding:8px 12px; }
.q-list::-webkit-scrollbar { width:4px; }
.q-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:4px; }
.q-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; cursor:pointer; transition:background 0.15s; margin-bottom:2px; }
.q-item:hover { background:rgba(255,255,255,0.06); }
.q-item.active { background:rgba(255,255,255,0.1); }
.q-item .q-num { font-size:12px; font-weight:600; color:var(--sidebar-text); min-width:36px; }
.q-item .q-section { font-size:11px; color:var(--sidebar-text); opacity:0.7; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-item .q-status { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); background:var(--card); }
.topbar .nav-group { display:flex; align-items:center; gap:12px; }
.nav-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--text); }
.nav-btn:hover { background:var(--bg); }
.nav-btn:disabled { opacity:0.3; cursor:default; }
.q-counter { font-size:14px; font-weight:600; }
.q-counter span { color:var(--text-muted); font-weight:400; }
.section-badge { font-size:12px; background:var(--accent-light); color:var(--accent); padding:4px 12px; border-radius:12px; font-weight:600; }
.export-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:13px; font-weight:600; color:var(--text); transition:all 0.15s; font-family:'DM Sans',sans-serif; }
.export-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

.content { flex:1; overflow-y:auto; padding:32px; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.question-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:28px 32px; margin-bottom:20px; }
.question-label { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); font-weight:600; margin-bottom:10px; }
.question-text { font-family:'Source Serif 4',serif; font-size:17px; line-height:1.65; }
.options-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:28px 32px; margin-bottom:20px; }
.option { padding:14px 16px; border-radius:8px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; line-height:1.55; font-size:14px; }
.option:last-child { margin-bottom:0; }
.option.correct { background:var(--correct-bg); }
.option.wrong { background:var(--wrong-bg); }
.option-letter { font-weight:700; min-width:22px; flex-shrink:0; }
.option.correct .option-letter { color:var(--correct); }

.rationale-card { background:var(--card); border-radius:12px; border:1px solid var(--border); margin-bottom:20px; overflow:hidden; }
.rationale-toggle { width:100%; padding:18px 32px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--text); }
.rationale-toggle .arrow { transition:transform 0.2s; font-size:12px; color:var(--text-muted); }
.rationale-toggle .arrow.open { transform:rotate(180deg); }
.rationale-body { padding:0 32px 24px; }
.rationale-body p { font-size:14px; line-height:1.65; margin-bottom:12px; }
.rationale-body p:last-child { margin-bottom:0; }
.rationale-section-title { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); font-weight:700; margin:16px 0 8px; }
.ref-list { list-style:none; padding:0; }
.ref-list li { font-size:13px; color:var(--text-muted); padding:4px 0 4px 16px; position:relative; line-height:1.5; }
.ref-list li::before { content:"\2022"; position:absolute; left:0; color:var(--accent); }

.validation-card { background:var(--card); border-radius:12px; border:2px solid var(--accent); padding:28px 32px; margin-bottom:20px; }
.validation-title { font-size:15px; font-weight:700; color:var(--accent); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.val-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
.val-row:last-of-type { border-bottom:none; }
.val-label { font-size:14px; font-weight:500; }
.val-btns { display:flex; gap:6px; }
.val-btn { padding:6px 18px; border-radius:6px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.val-btn:hover { border-color:var(--accent); }
.val-btn.selected-ok { background:var(--ok-bg); border-color:var(--correct); color:var(--correct); }
.val-btn.selected-revise { background:var(--revise-bg); border-color:var(--revise); color:var(--revise); }
.val-btn.selected-reject { background:var(--reject-bg); border-color:var(--reject); color:var(--reject); }
.comment-area { width:100%; margin-top:16px; padding:12px 14px; border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; resize:vertical; min-height:60px; outline:none; transition:border-color 0.15s; }
.comment-area:focus { border-color:var(--accent); }
.comment-area::placeholder { color:var(--text-muted); }

.length-flag { display:inline-block; font-size:11px; padding:3px 8px; border-radius:4px; font-weight:600; margin-left:8px; }
.flag-NONE { display:none; } .flag-MILD { background:#FFF5E5; color:#D4850A; } .flag-MODERATE { background:#FDECEB; color:#C0392B; }

.keyboard-hint { text-align:center; padding:8px; font-size:11px; color:var(--text-muted); }
kbd { background:var(--bg); padding:2px 6px; border-radius:4px; border:1px solid var(--border); font-size:11px; font-family:inherit; }

/* ── Overview page ── */
.overview-topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); background:var(--card); }
.overview-topbar h2 { font-family:'Source Serif 4',serif; font-size:20px; font-weight:700; }

.overview-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:20px 24px; text-align:center; }
.stat-card .stat-num { font-size:32px; font-weight:700; font-family:'Source Serif 4',serif; }
.stat-card .stat-label { font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:500; }
.stat-ok .stat-num { color:var(--correct); }
.stat-revise .stat-num { color:var(--revise); }
.stat-reject .stat-num { color:var(--reject); }
.stat-open .stat-num { color:var(--text-muted); }

.section-summary { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:24px 28px; margin-bottom:28px; }
.section-summary h3 { font-size:14px; font-weight:700; margin-bottom:16px; }
.section-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--bg); gap:12px; }
.section-row:last-child { border-bottom:none; }
.section-name { width:180px; font-size:13px; font-weight:600; }
.section-bar-wrap { flex:1; height:18px; background:var(--bg); border-radius:9px; overflow:hidden; display:flex; }
.section-bar-ok { background:var(--correct); height:100%; transition:width 0.3s; }
.section-bar-revise { background:var(--revise); height:100%; transition:width 0.3s; }
.section-bar-reject { background:var(--reject); height:100%; transition:width 0.3s; }
.section-bar-open { background:var(--border); height:100%; transition:width 0.3s; }
.section-count { font-size:12px; color:var(--text-muted); min-width:60px; text-align:right; }

.overview-table-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.overview-table-header { padding:20px 28px 12px; display:flex; align-items:center; justify-content:space-between; }
.overview-table-header h3 { font-size:14px; font-weight:700; }
.search-input { padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; width:240px; outline:none; }
.search-input:focus { border-color:var(--accent); }

.ov-table { width:100%; border-collapse:collapse; }
.ov-table th { text-align:left; padding:10px 16px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); font-weight:600; border-bottom:2px solid var(--border); background:var(--bg); position:sticky; top:0; }
.ov-table td { padding:10px 16px; font-size:13px; border-bottom:1px solid var(--bg); vertical-align:top; }
.ov-table tr { cursor:pointer; transition:background 0.1s; }
.ov-table tbody tr:hover { background:var(--accent-light); }
.ov-table-scroll { max-height:calc(100vh - 380px); overflow-y:auto; }
.ov-table-scroll::-webkit-scrollbar { width:4px; }
.ov-table-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.status-pill { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; }
.pill-OK { background:var(--ok-bg); color:var(--correct); }
.pill-Revise { background:var(--revise-bg); color:var(--revise); }
.pill-Reject { background:var(--reject-bg); color:var(--reject); }
.pill-open { background:var(--bg); color:var(--text-muted); }
.q-preview { max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.comment-preview { max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-muted); font-size:12px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>MCQ Validation</h1>
    <p>200 Breast Cancer Questions</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-stats">
      <span><span class="dot dot-ok"></span> <span id="statOk">0</span> OK</span>
      <span><span class="dot dot-revise"></span> <span id="statRevise">0</span> Revise</span>
      <span><span class="dot dot-reject"></span> <span id="statReject">0</span> Reject</span>
      <span><span class="dot dot-skip"></span> <span id="statOpen">200</span> Open</span>
    </div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="viewQuestions" onclick="setView('questions')">Questions</button>
    <button class="view-btn" id="viewOverview" onclick="setView('overview')">Overview</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('open')">Open</button>
    <button class="filter-btn" onclick="setFilter('OK')">OK</button>
    <button class="filter-btn" onclick="setFilter('Revise')">Revise</button>
    <button class="filter-btn" onclick="setFilter('Reject')">Reject</button>
  </div>
  <div class="q-list" id="qList"></div>
</div>

<div class="main">
  <div id="questionView">
    <div class="topbar">
      <div class="nav-group">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
        <span class="q-counter" id="qCounter"></span>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
        <span class="section-badge" id="sectionBadge"></span>
      </div>
      <div class="nav-group">
        <button class="export-btn" onclick="exportResults()">&#11123; Export CSV</button>
      </div>
    </div>
    <div class="content" id="contentArea"></div>
  </div>

  <div id="overviewView" style="display:none;">
    <div class="overview-topbar">
      <h2>Validation Overview</h2>
      <div class="nav-group">
        <button class="export-btn" onclick="exportResults()">&#11123; Export CSV</button>
      </div>
    </div>
    <div class="content" id="overviewContent"></div>
  </div>
</div>

<script>
const DATA = [{"id":"1","section":"Epidemiology","question":"A 45-year-old premenopausal woman with BI-RADS D density, BMI 33 kg/m\u00b2, and first pregnancy at age 37 has a lifetime breast cancer risk of 18% by Tyrer\u2013Cuzick v8. She has no pathogenic variants or family history. She asks whether she needs supplemental MRI despite falling below the \u226520% threshold. Which statement best reflects the relationship between risk models, density-related interval cancer risk, and MRI screening?","options":{"A":"Tyrer\u2013Cuzick v8 incorporates breast density as a multiplicative risk factor, capturing both biologic and masking-related effects; supplemental MRI is therefore unlikely to provide incremental benefit when calculated lifetime risk falls below 20%.","B":"Interval cancers in women with dense breasts primarily reflect aggressive tumor biology rather than masking; MRI therefore does not meaningfully reduce advanced-stage cancer presentation in women below the 20% lifetime risk threshold.","C":"Digital breast tomosynthesis provides equivalent cancer detection and mortality reduction compared with breast MRI in women with extremely dense breasts and 15\u201320% lifetime risk, thereby making supplemental MRI unnecessary in this population.","D":"Tyrer\u2013Cuzick v8 incompletely adjusts for obesity and late age at first birth, causing systematic risk underestimation; recalculating the model without breast density is therefore recommended before making any decision about supplemental MRI.","E":"Risk models estimate cancer incidence rather than detectability, and breast density independently causes masking; thus, women with extremely dense breasts and 15\u201320% lifetime risk may reasonably pursue supplemental MRI after shared decision-making."},"correct_answer":"E","short_rationale":"This stem is testing the difference between risk of developing cancer and risk of missing cancer on mammography. Tyrer\u2013Cuzick/IBIS is a risk-prediction model for breast cancer incidence. It does include many classical risk factors, including BMI and age at first live birth, and modern versions also incorporate breast density. But density does more than raise incidence risk: it also lowers mammographic sensitivity because dense tissue masks cancers. That masking problem is not \u201csolved\u201d just because density is entered into a risk calculator. Peer-reviewed reviews explicitly note that the density\u2013cancer association is partly entangled with masking and detection bias, meaning model-based lifetime risk and imaging detectability are not the same construct.\n\nThat is why a woman with BI-RADS D / extremely dense breasts and a calculated lifetime risk in the 15\u201320% range can still reasonably consider supplemental MRI after shared decision-making. The American College of Radiology\u2019s 2023 updated recommendations state that women with a calculated lifetime risk of 20% or more are recommended for MRI, but they also add that for women with dense breasts who desire supplemental screening, breast MRI is recommended. EUSOBI goes even further for extremely dense breasts, recommending MRI screening independent of other increased-risk categories.\n\nThe clinical rationale is the interval-cancer problem in dense breasts. In the DENSE randomized trial, women with extremely dense breasts who were invited to supplemental MRI had significantly fewer interval cancers than those screened with mammography alone, directly supporting the idea that masking matters and that MRI adds value beyond mammography in this population.","why_other_options_are_wrong":"B is wrong because it treats interval cancers in dense breasts as mainly a biology problem rather than a masking problem. The DENSE trial and density literature show that reduced mammographic detectability is a major part of the issue, and supplemental MRI reduces interval cancers.\n\nA is wrong because even if Tyrer\u2013Cuzick v8 incorporates density, that does not mean it fully captures the detectability penalty from density on mammography. Risk estimation and masking are related but not equivalent.\n\nC is wrong because DBT is not equivalent to MRI in dense breasts. In EA1141, abbreviated MRI detected significantly more invasive cancers than DBT in women with dense breasts; equivalence in cancer detection, let alone mortality reduction, is not established.\n\nD is wrong because BMI and age at first live birth are already part of the Tyrer\u2013Cuzick model, and there is no guideline basis for recalculating the model without density before making a screening decision.","evidence":"Not stated explicitly in the source draft.","references":["ACR. Breast Cancer Screening for Women at Higher-Than-Average Risk: Updated Recommendations From the ACR. J Am Coll Radiol. 2023."],"length_bias_flag":"MILD"},{"id":"2","section":"Epidemiology","question":"A 51-year-old woman with extremely dense breast tissue has undergone annual screening mammography for several years, all reported as negative. She is later diagnosed with an interval breast cancer. Her 40-year-old sister, who also has extremely dense breast tissue, asks whether she should escalate her future screening to annual breast MRI, even though she does not meet formal high-risk criteria (no known pathogenic mutation, no prior thoracic radiation, and calculated lifetime risk \\<20%). Which of the following is the most appropriate recommendation?","options":{"A":"Recommend continuation of annual mammography alone, as current evidence does not support routine supplemental MRI for women with dense breasts who do not meet established high-risk criteria, even in the setting of interval cancer in a first-degree relative with extremely dense breast tissue.","B":"Recommend shared decision-making regarding supplemental screening with MRI or contrast-enhanced mammography, acknowledging that extremely dense breasts reduce mammographic sensitivity and increase interval cancer risk but do not alone meet formal high-risk criteria for routine annual MRI","C":"Recommend annual digital breast tomosynthesis with supplemental whole-breast ultrasound rather than MRI, as this combination improves cancer detection in dense breasts with fewer false positives and lower cost than contrast-enhanced imaging modalities such as MRI or contrast-enhanced mammography.","D":"Recommend annual contrast-enhanced breast MRI in addition to mammography, as extremely dense breast tissue alone confers sufficiently elevated risk to meet high-risk screening criteria, independent of family history, calculated lifetime risk thresholds, or the absence of a known genetic predisposition.","E":"Recommend alternating mammography and MRI every 6 months, as interval cancer in a first-degree relative with dense breasts implies hereditary predisposition regardless of lifetime risk, the absence of an identified pathogenic germline variant, or formal risk-model assessment."},"correct_answer":"B","short_rationale":"This woman does not meet formal U.S. \u201chigh-risk\u201d MRI criteria based on the information given. NCCN\u2019s high-risk group includes, for example, residual lifetime risk 20% or more, known pathogenic variants, or prior chest radiation at a young age; for women with heterogeneous or extremely dense breasts, NCCN says supplemental screening should be considered, not that they automatically meet high-risk criteria for annual MRI.\n\nAt the same time, extremely dense breasts clearly reduce mammographic sensitivity and are associated with more interval cancers because of masking. That is the core reason supplemental screening enters the discussion even when formal lifetime-risk thresholds are not met. EUSOBI states that MRI should be offered to women with extremely dense breasts, preferably every 2\u20133 years, and emphasizes shared decision-making. ACR similarly states that for women with dense breasts who desire supplemental screening, breast MRI is recommended; if MRI cannot be done, contrast-enhanced mammography can be considered.\n\nSo the most appropriate recommendation is not \u201ceveryone like this must have annual MRI\u201d but rather a discussion of supplemental screening options, especially MRI, acknowledging that dense breasts impair mammographic detection even below the classic 20% lifetime-risk cutoff. That is exactly what option B says.","why_other_options_are_wrong":"C is not the best answer because ultrasound can increase detection, but MRI is generally the most sensitive supplemental test in dense breasts, and ACR/EUSOBI do not position whole-breast ultrasound as superior to MRI. MRI outperformed DBT in dense-breast screening trials, and ultrasound is usually more of an alternative when MRI is unavailable or unsuitable.\n\nD is too strong because extremely dense breasts alone do not automatically place her into formal high-risk MRI criteria in NCCN-style risk stratification. Dense breasts justify considering supplemental imaging, but they do not by themselves equal the standard \u226520% lifetime-risk category. Also, EUSOBI\u2019s recommendation for extremely dense breasts is not specifically \u201cannual MRI.\u201d\n\nE is wrong because an interval cancer in a first-degree relative with dense breasts does not by itself prove hereditary predisposition, and alternating mammography and MRI every 6 months is not the standard recommendation here.\n\nA is too dismissive. Current evidence does support that dense breasts reduce mammographic sensitivity, and multiple expert bodies support considering or offering supplemental MRI in this setting, even though USPSTF judged the evidence insufficient to make a population-wide recommendation for or against it.","evidence":"Evidence confidence: High","references":["NCCN Breast Cancer Screening guidance summarized in 2024 NCCN screening table: supplemental screening for heterogeneous or extremely dense breasts should be considered; formal high-risk MRI criteria include residual lifetime risk \u226520%."],"length_bias_flag":"MODERATE"},{"id":"3","section":"Epidemiology","question":"A 39-year-old unaffected woman is found to carry a pathogenic CHEK2 mutation during multigene panel testing after her sister was found to carry a CHEK2 pathogenic variant. She has no strong family history of breast or ovarian cancer. Risk modeling estimates her lifetime breast cancer risk at 24%. She asks whether bilateral prophylactic mastectomy should be recommended and how management compares to that of BRCA1/2mutation carriers. Which of the following is the most appropriate recommendation?","options":{"A":"Manage identically to BRCA1 carriers, including bilateral risk-reducing mastectomy and salpingo-oophorectomy by age 40, given similar penetrance and ovarian cancer risk, though the absolute magnitude of benefit may differ based on individual patient characteristics.","B":"Advise intensified breast surveillance with annual mammography and contrast-enhanced MRI beginning immediately; risk-reducing mastectomy is not routinely recommended for CHEK2 carriers with \\~24% lifetime risk but may be considered after individualized shared decision-making.","C":"Recommend annual mammography beginning at age 40 without supplemental MRI for now, reserving MRI or discussion of risk-reducing mastectomy for CHEK2 carriers with a first-degree family history of breast cancer or substantially higher modeled lifetime risk (for example, \u226530%), because CHEK2 is a moderate-penetrance gene and genotype alone does not justify intensified imaging before age 40.","D":"Recommend standard population breast screening only, as CHEK2 is a moderate-penetrance gene and does not warrant enhanced surveillance without significant family history, particularly in patients with additional clinical risk factors that may modify the expected benefit.","E":"Recommend bilateral risk-reducing mastectomy, as CHEK2 mutations confer breast cancer risks comparable to BRCA2, and prophylactic surgery is standard regardless of family history; the strength of this recommendation varies across international consensus guidelines."},"correct_answer":"B","short_rationale":"CHEK2 is a moderate-penetrance breast cancer susceptibility gene, but current expert guidance does not treat it as BRCA1/2-equivalent. Management is individualized based on variant type, family history, and modeled absolute risk. The ACMG CHEK2 practice resource explicitly states that risk-reducing mastectomy should be guided by personalized risk estimates and shared decision-making, and that international guidelines do not make a general recommendation for routine bilateral risk-reducing mastectomy in CHEK2 heterozygotes.\n\nFor surveillance, intensified breast screening is appropriate. GeneReviews states that CHEK2 surveillance typically includes annual mammography beginning at age 40, with breast MRI recommendations varying by region, and the JAMA Oncology modeling study found that adding annual MRI from age 30 or 35, with mammography from age 40, substantially reduces breast cancer mortality in ATM/CHEK2/PALB2 carriers.\n\nThat means the central teaching point remains: enhanced surveillance is appropriate, while prophylactic mastectomy is not routinely recommended at a modeled lifetime risk around 24%, though it may still be discussed in an individualized shared decision-making framework. This is different from BRCA1/2 carriers, for whom penetrance is higher and prophylactic surgery is more routinely part of counseling. CHEK2 also does not carry established ovarian cancer predisposition in the same way, and CHEK2 status alone is not an indication for risk-reducing salpingo-oophorectomy.","why_other_options_are_wrong":"D is wrong because standard population screening alone would undertreat a CHEK2 carrier with a modeled lifetime breast cancer risk of 24%; current guidance supports intensified surveillance in this setting.\n\nE is wrong because CHEK2 is not managed as BRCA2-equivalent, and bilateral risk-reducing mastectomy is not standard regardless of family history.\n\nC is a much better distractor than the old tamoxifen version, because it sounds plausible. But it is still wrong. The problem is that it withholds MRI until age 40 or until stronger family history / higher modeled risk, whereas the best available evidence and current expert guidance support MRI-based intensified screening earlier for many CHEK2 carriers. The modeling paper suggests MRI starting at age 30\u201335, and GeneReviews reflects MRI consideration before age 40.\n\nA is wrong because CHEK2 is not managed identically to BRCA1, and salpingo-oophorectomy is not recommended on the basis of CHEK2 alone.","evidence":"Evidence confidence:\n\nHigh","references":["Hanson H, et al. Management of individuals with germline pathogenic/likely pathogenic variants in CHEK2: ACMG clinical practice resource. Genetics in Medicine. 2023."],"length_bias_flag":"NONE"},{"id":"4","section":"Epidemiology","question":"A 47-year-old transgender woman in the United States has been receiving estrogen-based gender-affirming hormone therapy for 6 years. She is at average risk for breast cancer. She asks whether her breast cancer risk is now equivalent to that of cisgender women and whether she should begin routine mammographic screening. Which of the following statements most accurately reflects current evidence and U.S. screening recommendations?","options":{"A":"After \u22655 years of estrogen therapy, breast cancer risk in transgender women approximates that of cisgender women; screening recommendations should therefore be identical to those for average-risk cisgender women, regardless of age.","B":"Transgender women on long-term estrogen therapy have higher breast cancer risk than cisgender men but lower than cisgender women; screening mammography is generally recommended from age \u226540 after 5 years of GAHT.","C":"Estrogen exposure in transgender women does not meaningfully increase breast cancer risk compared with cisgender men; routine mammographic screening is therefore not recommended in the absence of genetic or familial risk factors.","D":"Due to limited longitudinal data, routine mammographic screening is not currently recommended for transgender women outside of specialized clinical research settings, as population-level evidence currently remains insufficient to support standard screening protocols.","E":"Breast cancer risk in transgender women is primarily driven by cumulative lifetime estrogen exposure; therefore, routine screening mammography should begin immediately upon initiation of GAHT, irrespective of the patient's current chronological age."},"correct_answer":"B","short_rationale":"The best available cohort data show that transgender women receiving feminizing hormone therapy have a breast cancer risk that is higher than cisgender men but still lower than cisgender women, so her risk is not considered fully equivalent to that of average-risk cisgender women. In the Dutch nationwide cohort, breast cancer incidence in trans women on hormones was about 46-fold higher than in cis men, but still substantially lower than in cis women.\n\nFor screening, current recommendations are not perfectly uniform across organizations, but routine mammographic screening is supported once a transgender woman has had several years of GAHT. The ACR Appropriateness Criteria define the average-risk transfeminine screening scenario as age 40 or older with at least 5 years of hormone use, and list screening mammography as appropriate in that setting. A recent peer-reviewed review summarizing major guidance shows that ACR recommends annual screening mammography starting at age 40 after at least 5 years of GAHT, whereas WPATH advises following local cisgender-woman screening recommendations while considering age and hormone exposure, and UCSF is more conservative, suggesting biennial screening from age 50 after 5\u201310 years of GAHT.\n\nSo option B is the most accurate of the choices given. It gets the risk relationship right, and its screening statement aligns with ACR-based practice, even though some other expert guidance uses a later starting age.","why_other_options_are_wrong":"C is wrong because estrogen-based GAHT does appear to increase breast cancer risk above cis-male baseline.\n\nD is wrong because routine screening is not restricted to research settings; multiple expert groups already provide clinical screening recommendations for transfeminine patients.\n\nA is wrong because current evidence does not support saying the risk simply becomes equivalent to cisgender women after 5 years of hormones, and screening is not identical \u201cregardless of age.\u201d\n\nE is wrong because screening is not recommended immediately upon GAHT initiation irrespective of age; duration of hormone exposure and age both matter in current guidance.","evidence":"Evidence confidence:\n\nModerate to high","references":["de Blok CJM, et al. Breast cancer risk in transgender people receiving hormone treatment: nationwide cohort study in the Netherlands. BMJ. 2019."],"length_bias_flag":"NONE"},{"id":"5","section":"Epidemiology","question":"A 42-year-old transgender man underwent gender-affirming chest surgery (subcutaneous mastectomy with masculinizing chest reconstruction) at age 28 and has been on testosterone therapy since age 25. He has no family history of breast cancer and no known pathogenic variants. He asks whether he requires routine mammographic screening and what the biological rationale would be. Which of the following statements best reflects current evidence and pathophysiologic understanding?","options":{"A":"Screening should follow cisgender male guidelines because testosterone establishes a male-pattern breast microenvironment, eliminates local aromatase activity, and reduces epithelial proliferation to baseline male levels.","B":"Screening is unnecessary because testosterone induces complete lobular atrophy and eliminates estrogen receptor\u2013positive epithelial cells, abolishing carcinogenic potential in any residual glandular breast tissue.","C":"Annual MRI is indicated regardless of surgery because chest reconstruction leaves sufficient residual ductal tissue at oncologic risk, and testosterone independently increases genomic instability in remaining epithelium.","D":"Routine screening is recommended because testosterone aromatizes to estradiol, sustaining estrogen receptor stimulation and producing breast cancer risk equivalent to cisgender women, regardless of prior chest surgery.","E":"Routine screening is not recommended after subcutaneous mastectomy given minimal residual tissue; however, risk is not zero due to residual glandular elements and peripheral testosterone aromatization."},"correct_answer":"E","short_rationale":"Current guidance does not recommend routine screening mammography for average-risk transgender men after gender-affirming chest masculinization surgery. A recent peer-reviewed review summarizing major recommendations states that transgender men who have undergone GACMS should consider annual physical chest exams, but screening mammography is not routinely recommended at this time. UCSF similarly notes that the risk of breast cancer in residual breast tissue after mastectomy is unknown, which is part of why there is no standard routine mammographic screening protocol after chest masculinization surgery.\n\nThe biologic rationale in option E is also the best fit. Chest masculinization surgery is not the same as an oncologic total or risk-reducing mastectomy. Residual fibroglandular tissue may remain to preserve chest contour, so risk is reduced but not eliminated. The same review notes that the amount of tissue removed varies by surgeon and patient anatomy, and that GACMS is not generally equivalent to oncologic risk-reducing mastectomy.\n\nTestosterone does not abolish biologic risk. It can reduce breast epithelium, which may lower risk, but estradiol levels may remain above the normal male range because of peripheral aromatization of testosterone. A 2024 study found that testosterone therapy decreases breast epithelium, but the authors explicitly state that its effect on breast cancer risk remains uncertain. So the most accurate summary is: no routine mammographic screening after top surgery in an average-risk patient, but risk is not zero because residual tissue can remain and testosterone can still contribute indirectly to estrogen exposure through aromatization.","why_other_options_are_wrong":"D is wrong because risk is not considered equivalent to cisgender women regardless of prior surgery, and routine screening is not generally recommended after chest masculinization surgery in an average-risk patient.\n\nA is wrong because screening does not simply revert to \u201ccis male guidelines,\u201d and testosterone does not eliminate local or peripheral aromatization. The claim that it reduces breast biology to baseline male levels is too absolute and not supported by current evidence.\n\nB is wrong because testosterone does not fully abolish carcinogenic potential in residual tissue. Residual glandular tissue can remain after GACMS, and risk is not zero.\n\nC is wrong because annual MRI is not indicated regardless of surgery in an average-risk transmasculine patient, and the statement that testosterone independently increases genomic instability is not part of current screening rationale or guideline language.","evidence":"Evidence confidence:\n\nModerate to high","references":["Carroll EF, Rogers C, Summerside M, Cortina CS. Breast care considerations for transgender and gender-diverse patients. Women\u2019s Health. 2024."],"length_bias_flag":"NONE"},{"id":"6","section":"Epidemiology","question":"Germany begins organized mammography screening at age 50, whereas the United States often recommends starting at age 40. What is the primary driver of this policy difference?","options":{"A":"Germany restricts screening before age 50 because digital mammography lacks sufficient sensitivity in premenopausal women with dense breasts, while U.S. screening programs rely primarily on adjunct tomosynthesis to overcome density limitations.","B":"Germany delays screening because European breast cancers demonstrate slower tumor doubling times and lower prevalence of aggressive molecular subtypes before age 50.","C":"U.S. recommendations prioritize individual risk autonomy and medico-legal risk mitigation, whereas Germany\u2019s program is structured around population-level cost-effectiveness thresholds and benefit-harm modeling within a statutory health insurance system.","D":"The United States has a significantly higher biological incidence of early-onset breast cancer, necessitating earlier detection to offset genetically driven mortality disparities.","E":"Germany\u2019s policy reflects modeling data demonstrating that initiating screening at age 40 produces a substantially higher rate of overdiagnosis and false positives relative to mortality reduction within a centrally organized, publicly funded screening framework."},"correct_answer":"C","short_rationale":"The main difference is not biology. It is that Germany's organized screening program is built around population-level benefit\u2013harm assessment in a centrally organized public system, and European evidence frameworks have historically been most confident about the benefit\u2013harm balance in the 50\u201369 age range. Germany's Federal Joint Committee currently offers organized biennial mammography from age 50 to 75, and German evidence reviews explicitly frame screening decisions around weighing mortality benefit against harms such as false positives and overdiagnosis.\n\nThe IQWiG review for women aged 45\u201349 found only a very small mortality advantage and emphasized that individual weighing of benefits and harms is still essential in this age group. The European Commission evidence framework similarly notes that false-positive rates are higher in women under 50 than in women aged 50\u201369. So the earlier U.S. start is best understood as a different policy threshold for accepting harms in exchange for mortality benefit, not as a difference in tumor biology between countries.\n\nThe U.S. side of the contrast also supports this interpretation. The USPSTF now recommends biennial mammography from age 40 to 74 because it concluded screening in that range has a moderate net benefit, and its modeling work found that starting biennially at 40 reduces breast cancer mortality and increases life-years gained. That is a different benefit\u2013harm judgment, not evidence that U.S. women have biologically different cancers.","why_other_options_are_wrong":"A is wrong because Germany's age threshold is not primarily due to digital mammography being unusable in younger dense breasts, and U.S. recommendations are not based on tomosynthesis having solved the density problem.\n\nB is wrong because there is no accepted evidence that German or European breast cancers are biologically slower-growing before age 50 in a way that explains screening policy. The policy difference is based on screening trade-offs, not national tumor biology.\n\nD is wrong because the U.S. does not have a clearly different biological incidence pattern that explains the policy gap.\n\nE is partly tempting, but it is not the best answer because the \"medico-legal risk mitigation\" part is speculative and not the core evidence-based rationale used in major screening recommendations. The more defensible explanation is formal benefit\u2013harm modeling in different health-system contexts.","evidence":"","references":["Federal Joint Committee (G-BA), Germany: organized mammography screening entitlement from age 50 to 75 every two years.","IQWiG final report on age limits in the German mammography screening programme: for ages 45\u201349, only a very small mortality advantage, with harms and informed weighing emphasized.","European Commission Initiative on Breast Cancer: false-positive rates are higher under age 50 than in women aged 50\u201369.","USPSTF 2024 breast cancer screening recommendation: biennial screening from age 40 to 74, based on moderate net benefit.","USPSTF collaborative modeling study: starting biennial mammography at age 40 reduces mortality and increases life-years gained."],"length_bias_flag":"NONE"},{"id":"7","section":"Epidemiology","question":"Does cumulative radiation exposure from annual digital mammography starting at age 40 meaningfully increase lifetime attributable cancer risk compared to initiating biennial screening at age 50 in average-risk women?","options":{"A":"Yes; breast tissue is uniformly radiosensitive across all ages, so initiating screening at 40 confers the same proportional radiation-induced cancer risk as exposure during adolescence.","B":"No; annual screening from age 40 increases cumulative dose, but modeled lifetime attributable cancer risk remains very low and is substantially outweighed by potential mortality reduction benefits.","C":"Yes; annual digital mammography starting at age 40 produces a clinically meaningful radiation-induced breast cancer risk that is large enough to offset much of the mortality benefit of earlier screening, so postponing screening until age 50 is generally safer for average-risk women.","D":"Yes; cumulative radiation from annual screening from age 40 results in a clinically significant (>1%) absolute increase in lifetime cancer risk compared with biennial screening from age 50.","E":"No; digital mammography delivers no ionizing radiation, so cumulative cancer risk is equivalent regardless of starting age or screening interval."},"correct_answer":"B","short_rationale":"Digital mammography does use ionizing radiation, so starting earlier and screening more often does increase cumulative radiation exposure. However, the modeled absolute radiation-induced cancer risk remains very low. In a major modeling study of digital mammography, annual screening from age 40 to 74 was projected to induce 125 radiation-related breast cancers and 16 radiation-related breast cancer deaths per 100,000 women, while also averting 968 breast cancer deaths through screening. The same study found that biennial screening starting at age 50 reduced radiation-induced cancer risk about 5-fold compared with annual screening from age 40, showing that the relative difference exists but the absolute risk remains small.\n\nThat makes C the best answer: annual screening from age 40 increases cumulative dose, but the lifetime attributable cancer risk is still very low and is generally outweighed by the mortality benefit of screening. A peer-reviewed review on screening in women aged 40\u201349 notes that modern mammography doses are well below regulatory limits and that the risk of a fatal radiation-induced breast cancer from annual screening in the 40s is extremely low, not high enough to justify avoiding screening.","why_other_options_are_wrong":"E is wrong because mammography absolutely does use ionizing radiation. Modern digital mammography uses low doses, but not zero dose.\n\nD is wrong because a greater-than-1% absolute increase in lifetime cancer risk is far too high. The best-known modeling estimates are orders of magnitude lower than that.\n\nC is misleading. It is true that annual screening from 40 produces a higher radiation-attributable risk than biennial screening from 50, and in relative terms it is more than doubled. But the option is still not the best answer because it frames that increase as clinically decisive without acknowledging that the absolute risk remains very low and is substantially outweighed by screening benefit.\n\nA is wrong because breast radiosensitivity is not uniform across ages. Radiation-related breast cancer risk is higher with exposure at younger ages, especially during adolescence and young adulthood, and lower with increasing age at exposure.","evidence":"Evidence confidence:\n\nHigh","references":["Miglioretti DL, et al. Radiation-Induced Breast Cancer Incidence and Mortality From Digital Mammography Screening: A Modeling Study. Ann Intern Med. 2016."],"length_bias_flag":"NONE"},{"id":"8","section":"Epidemiology","question":"A 47-year-old woman with 20% lifetime risk and prior atypical ductal hyperplasia asks whether MRI screening or chemoprevention provides greater absolute reduction in breast cancer risk.","options":{"A":"Both strategies reduce incidence in ADH: MRI by enabling earlier diagnosis before invasion, and tamoxifen by preventing tumor initiation; their absolute benefits are broadly similar when lifetime risk is approximately 20%.","B":"MRI is the better strategy as it lowers the probability of developing invasive cancer by detecting lesions early; chemoprevention mainly improves survival outcomes rather than reducing the absolute incidence of breast cancer.","C":"MRI improves stage at diagnosis but does not reduce incidence; chemoprevention reduces ER-positive breast cancer incidence, and in ADH the absolute incidence reduction is typically larger than any risk reduction attributable to screening alone.","D":"MRI produces an apparent reduction in incidence via length-time bias (preferential detection of indolent tumors), whereas chemoprevention produces an apparent reduction via lead-time bias; therefore neither can be said to reduce absolute risk in ADH.","E":"Chemoprevention yields its largest absolute benefit only when 5-year risk exceeds 3% and breast density is low; in dense breasts, MRI provides the larger absolute reduction in future cancer risk by preventing interval cancers"},"correct_answer":"C","short_rationale":"MRI is a screening test, not a preventive intervention. In women at elevated risk, including those with ADH plus \u226520% lifetime risk, annual MRI is used because it improves detection, downstages disease, and reduces interval cancer presentation. But MRI does not reduce the underlying incidence of breast cancer. NCCN-based screening guidance places women with ADH and \u226520% residual lifetime risk in a group for annual breast MRI, which reflects better detection, not true prevention. MRI literature likewise emphasizes earlier-stage detection and reduced interval cancers, not reduced cancer initiation.\n\nChemoprevention is different: it truly lowers incidence, especially ER-positive breast cancer incidence. This matters particularly in ADH, where endocrine prevention has one of its strongest absolute effects. The American Society of Breast Surgeons states that endocrine therapy should be offered for risk reduction to women with ADH and that it reduces ER-positive breast cancer risk by 50% or more; reviews of the NSABP P-1 and IBIS data report even larger relative reductions in women with atypical hyperplasia, often over 70% in that subgroup.\n\nSo E is the only answer that gets the core concept right: MRI can improve stage at diagnosis, but it does not reduce incidence; chemoprevention does reduce incidence, and in ADH that absolute reduction is generally larger than any \u201crisk reduction\u201d attributable to screening alone, because screening alone is not prevention.","why_other_options_are_wrong":"E is wrong because breast density is not the key determinant of chemoprevention benefit here, and MRI does not reduce future cancer incidence by \u201cpreventing interval cancers.\u201d It may reduce interval cancer presentation through earlier detection, but that is not the same as preventing cancer.\n\nD is wrong because it misuses screening biases. MRI does not create a true incidence reduction through length-time bias, and tamoxifen does not merely create an apparent reduction through lead-time bias; endocrine prevention actually lowers the incidence of ER-positive breast cancer.\n\nA is wrong because MRI does not reduce incidence \u201cby enabling earlier diagnosis before invasion.\u201d Earlier diagnosis is still detection, not prevention of tumor initiation. Tamoxifen can reduce incidence; MRI cannot.\n\nB is wrong because detecting lesions early does not lower the probability of developing invasive cancer in the first place, and chemoprevention\u2019s main demonstrated benefit in this setting is incidence reduction, not merely survival improvement.","evidence":"Evidence confidence:\n\nHigh","references":["NCCN-based 2024 screening table: ADH with \u226520% residual lifetime risk is an annual breast MRI screening group."],"length_bias_flag":"NONE"},{"id":"9","section":"Epidemiology","question":"In women with LCIS and calculated lifetime risk of 19%, is chemoprevention more strongly supported than MRI screening?","options":{"A":"Chemoprevention is more strongly supported, as LCIS is a high-risk lesion for which risk-reducing endocrine therapy is broadly endorsed, whereas MRI is generally reserved for \u226520% lifetime risk.","B":"Both are equally supported, as LCIS automatically qualifies for annual MRI and independently mandates chemoprevention irrespective of the modeled lifetime risk percentage calculated.","C":"MRI screening is more strongly supported, as it provides a mortality benefit in LCIS, whereas chemoprevention has not demonstrated meaningful risk reduction specifically in this population.","D":"Neither is strongly supported, as LCIS is merely a risk marker and does not justify preventive therapy or intensified screening unless a pathogenic germline mutation is also present.","E":"MRI screening is more strongly supported, as LCIS alone mandates annual MRI regardless of calculated lifetime risk, while chemoprevention is only indicated when lifetime risk reaches \u226520%."},"correct_answer":"A","short_rationale":"Assuming this is classic LCIS, chemoprevention is more strongly supported than MRI screening. The strongest guideline-style support is for risk-reducing endocrine therapy: the American Society of Breast Surgeons states that endocrine therapy should be offered for risk reduction to women with lobular carcinoma in situ, and that it reduces ER-positive breast cancer risk by 50% or more in these high-risk groups.\n\nBy contrast, MRI support is weaker here. The 2024 NCCN screening table lists annual breast MRI for lobular neoplasia only when it is accompanied by a residual lifetime risk of 20% or greater. This patient\u2019s modeled lifetime risk is 19%, so she does not cleanly meet that NCCN threshold.\n\nThe ACS guidance points in the same direction: it says there is not enough evidence to recommend for or against yearly MRI screening for women with LCIS, and it specifically reserves its strongest MRI recommendation for women with about 20% to 25% or greater lifetime risk.\n\nThat is why A is the best answer. Chemoprevention is broadly endorsed for LCIS; MRI at 19% lifetime risk is not automatically indicated and is more a matter of individualized discussion than strong routine recommendation. The evidence base for MRI in LCIS is also less robust, with older cohort data failing to show a clear improvement in cancer detection or stage at diagnosis from routine MRI in LCIS populations.","why_other_options_are_wrong":"D is wrong because LCIS is absolutely a high-risk lesion that can justify preventive endocrine therapy even without a pathogenic germline mutation.\n\nB is wrong because LCIS does not automatically qualify every patient for annual MRI irrespective of modeled risk, and chemoprevention is recommended but not \u201cmandated.\u201d\n\nE is wrong because MRI is not more strongly supported here, and chemoprevention is not limited to women whose lifetime risk reaches 20%; LCIS itself is a recognized indication to offer endocrine risk reduction.\n\nC is wrong because MRI has not shown a proven mortality benefit specifically in LCIS, while chemoprevention does have demonstrated risk-reduction efficacy in high-risk lesions such as LCIS.","evidence":"Evidence confidence:\n\nHigh","references":["American Society of Breast Surgeons Resource Guide to Endocrine Therapy for the Management and Risk Reduction of Hormone Receptor Positive Breast Cancer, updated 2023/2024."],"length_bias_flag":"MILD"},{"id":"10","section":"Epidemiology","question":"Should screening begin before age 40 in women with strong family history but negative genetic testing?","options":{"A":"It depends on the affected relative\u2019s age and degree of relation; start 5\u201310 years earlier than the earliest diagnosis for first-degree relatives, but do not start before 30 unless additional high-risk features exist (e.g., atypical hyperplasia, prior mantle radiation, very dense breasts with elevated model-based risk).","B":"No, negative genetic testing supersedes pedigree risk; begin at 40 with routine mammography only, reserving MRI solely for carriers of pathogenic variants or prior chest irradiation.","C":"Yes, initiate screening at age 30 (or 10 years earlier than the youngest affected relative, whichever comes first),using annual mammography plus annual breast MRI, with modality choice individualized to breast density and prior radiation exposure.","D":"Yes, begin earlier than 40 only if the calculated lifetime risk is \u226520% (e.g., Tyrer\u2013Cuzick/BOADICEA), in which case add annual MRI starting at 25\u201330 and mammography starting at 30, otherwise start at 40 with standard intervals.","E":"Yes, but only after formal risk stratification and shared decision-making; if risk is \u201cmoderate\u201d (e.g., 15\u201320% lifetime), start annual mammography at 40 and consider MRI selectively, while if risk is \u201chigh\u201d (\u226520%), start MRI earlier and mammography by 30\\."},"correct_answer":"D","short_rationale":"Negative genetic testing does not erase a strong pedigree-based risk. Current major guidelines still classify women with a calculated lifetime breast cancer risk of about 20% or greater, using models based mainly on family history, as high risk even without an identified pathogenic variant. For these women, annual MRI is recommended and mammography starts earlier than average-risk screening.\n\nACS recommends annual MRI plus mammography for women with a lifetime risk of about 20% to 25% or greater based mainly on family history, typically starting at age 30. ACR similarly recommends MRI surveillance starting at ages 25 to 30 and annual mammography starting between ages 25 and 40 depending on the type of risk. NCCN-style guidance is a little more specific for family-history\u2013driven risk: annual mammography is started 10 years before the youngest affected family member\u2019s diagnosis, but not before age 30, or by age 40, whichever comes first, together with annual MRI.\n\nThat makes A the best answer. It captures the key principle that earlier-than-40 screening is justified when formal risk stratification shows high risk, rather than simply because genetic testing is negative or because family history sounds strong in a qualitative sense. The one nuance is that NCCN often individualizes the mammography start age based on the youngest family diagnosis rather than always fixing it at 30, but among the choices, A is still the most guideline-concordant.","why_other_options_are_wrong":"A is plausible but less guideline-accurate. The \u201cstart 5\u201310 years earlier than the earliest diagnosis\u201d rule is a common heuristic, but current major guidelines are more explicitly anchored to formal risk assessment and high-risk thresholds; NCCN uses the \u201c10 years earlier\u201d approach in the context of high residual lifetime risk, not as a universal rule for any woman with family history.\n\nE is close, but it is too vague and overstates the support for MRI in the 15% to 20% range. ACS recommends MRI for about 20% to 25% or greater lifetime risk and recommends against MRI when lifetime risk is less than 15%; for the middle range or certain intermediate-risk situations, evidence is less definitive.\n\nC is too aggressive because it effectively recommends annual mammography plus MRI at age 30, or even earlier, for all women with strong family history regardless of whether they actually meet high-risk criteria. That is not how ACS, ACR, or NCCN structure screening.\n\nB is wrong because negative germline testing does not supersede family-history risk. MRI is not reserved only for mutation carriers or prior chest irradiation; it is also recommended for women whose modeled lifetime risk reaches about 20% or more based mainly on family history.","evidence":"Evidence confidence:\n\nHigh","references":["American Cancer Society breast screening recommendations for women at high risk."],"length_bias_flag":"NONE"},{"id":"11","section":"Epidemiology","question":"A 44-year-old otherwise average-risk woman with BI-RADS D asks whether contrast-enhanced breast MRI should replace mammography MRI should replace mammography entirely for early cancer detection. Which of the following statements is most accurate?","options":{"A":"Yes, if lifetime risk stays below 20% \u2013 density-driven screening difficulty justifies substituting MRI for mammography, while combined MRI plus mammography is reserved for women with pathogenic variants or formally elevated lifetime risk exceeding that threshold.","B":"No, MRI may be discussed as supplemental screening because dense breasts increase masking and interval cancer risk, but current guidance retains mammography or DBT as part of the screening strategy rather than endorsing MRI-only replacement for an average-risk woman.","C":"Yes, in extremely dense breasts, MRI's superior sensitivity and demonstrated reduction in interval cancers justify using it as the sole primary modality; mammography's residual contribution is too small to outweigh its lower sensitivity in this setting.","D":"No \u2014 the most explicit MRI recommendation for dense breasts comes from EUSOBI and applies to women aged 50\u201370; MRI should generally be deferred until then, and mammography alone remains preferred before age 50 without an identified pathogenic variant.","E":"Yes, particularly with abbreviated MRI \u2014 once contrast MRI is performed, mammography adds nothing meaningful because MRI captures both invasive cancers and calcification-predominant disease, making combined screening redundant regardless of density category or risk level."},"correct_answer":"B","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["NCCN breast screening table, 2024 summary. Supplemental screening should be considered for women with heterogeneous or extremely dense breasts."],"length_bias_flag":"NONE"},{"id":"12","section":"Epidemiology","question":"Should risk-reducing aromatase inhibitors be preferred over tamoxifen in postmenopausal high-risk women, and how do toxicity profiles influence this decision?","options":{"A":"Tamoxifen is preferred when thromboembolic or uterine risk is elevated but bone and joint risk is high, as tamoxifen is bone-protective in postmenopause and may yield better net benefit and adherence than an AI in women with osteopenia or severe arthralgia.","B":"Individualize based on dominant comorbidity: select AI when VTE or uterine risk predominates and tamoxifen when skeletal risk or inflammatory joint disease is the main concern; mitigation capacity for each toxicity profile should guide the final shared decision.","C":"Aromatase inhibitors are generally preferred in postmenopausal high-risk women when bone risk is acceptable, as they reduce ER+ invasive breast cancer risk without VTE or endometrial cancer risk; the main trade-off is musculoskeletal symptoms and accelerated bone loss.","D":"The choice reflects a trade between tamoxifen rare serious harms (VTE, endometrial cancer) with bone benefit, versus AI frequent chronic harms (arthralgia, bone loss); AIs are favored when avoiding rare serious events is paramount, tamoxifen when chronic toxicity matters most.","E":"No universal preference exists; if the aim is maximal ER+ cancer reduction with robust bone health an AI is rational, but if competing risks include fracture or intolerable musculoskeletal symptoms tamoxifen may produce better net benefit matched to the patient's morbidity profile."},"correct_answer":"E","short_rationale":"There is no universal preference. Current guidance treats tamoxifen, raloxifene, anastrozole, and exemestane as options for postmenopausal women at increased breast cancer risk, and explicitly says the choice should take into account age, baseline comorbidities, and adverse-effect profiles.\n\nWhy E is the best answer:\nIt captures the real decision framework. Aromatase inhibitors are a rational choice when the goal is maximal ER-positive risk reduction and bone health is acceptable, because prevention trials showed substantial reductions in invasive and ER-positive breast cancer with anastrozole/exemestane, and AIs avoid tamoxifen\u2019s venous thromboembolism and endometrial cancer risks. But tamoxifen may yield a better net benefit when fracture risk, osteopenia/osteoporosis, or intolerable musculoskeletal symptoms are major competing concerns, because tamoxifen has favorable skeletal effects in postmenopausal women while AIs contribute to bone loss and osteoporotic fracture.\n\nThe key toxicity tradeoff is:\ntamoxifen \u2192 rare but serious harms such as VTE and endometrial cancer, with bone benefit in postmenopause;\nAIs \u2192 no uterine or VTE signal like tamoxifen, but more chronic musculoskeletal symptoms and bone loss, so baseline fracture risk and BMD matter. USPSTF and ASBrS both frame the decision this way rather than endorsing one class across the board.","why_other_options_are_wrong":"B is close, but it is more operational than guideline-anchored. \u201cMitigation capacity\u201d is sensible clinically, but the strongest expert framing is broader: no universal preference; choose according to comorbidities and adverse-effect profile. E states that more cleanly.\n\nD is also close, but it oversimplifies the choice into \u201crare serious versus frequent chronic toxicity\u201d and underplays the importance of bone health and the absence of a blanket AI preference in guidelines.\n\nA is wrong because it reverses the thromboembolic/uterine logic. Elevated VTE or uterine risk would push away from tamoxifen, not toward it.\n\nC is the most tempting distractor, but it is slightly too strong. It implies a general preference for AIs, whereas major guidance does not say AIs should generally replace tamoxifen for prevention in all postmenopausal high-risk women. The recommendation is individualized.","evidence":"Evidence confidence:\n\nHigh","references":["ASCO Clinical Practice Guideline Update, 2019: in postmenopausal women at increased risk, the options include anastrozole, exemestane, raloxifene, or tamoxifen; the decision should consider age, baseline comorbidities, and adverse-effect profiles."],"length_bias_flag":"MILD"},{"id":"13","section":"Epidemiology","question":"A woman with extremely dense breasts and repeated false-positive recalls requests prophylactic mastectomy after testing positive for CHEK2-mutation. Due to the false positive results, the patient can hardly bear the situation psychologically. How would you advise this patient?","options":{"A":"Recommend bilateral risk-reducing mastectomy as the preferred strategy, as CHEK2 variant, extremely dense breasts, and recurrent false-positive recalls together approach high-penetrance gene risk; proceed to surgical planning without requiring further risk modeling at this stage.","B":"Strongly discourage prophylactic mastectomy as CHEK2 is moderate penetrance and dense breasts with false positives do not justify irreversible surgery; continue annual mammography with ultrasound and reassure the patient that recalls are expected with dense tissue.","C":"Agree to risk-reducing mastectomy only after a mandatory 12-month intensified screening trial; if psychological distress persists, require formal psychiatric clearance, as surgery should not be used to treat anxiety in moderate-penetrance gene carriers.","D":"Use a shared risk-based approach: confirm the variant, estimate personal lifetime risk, optimize screening to reduce false positives, discuss chemoprevention and lifestyle changes, and address anxiety with psycho-oncology before considering mastectomy.","E":"Recommend de-escalating screening to reduce anxiety by lowering imaging frequency and relying on clinical breast exams, as CHEK2 conveys only moderate risk; revisit prophylactic surgery only if a lesion becomes suspicious or family history evolves."},"correct_answer":"D","short_rationale":"This is best approached with individualized, shared decision-making rather than either automatic surgery or reflexive dismissal. The ACMG CHEK2 practice resource states that early detection and prevention for CHEK2 heterozygotes should be guided by personalized risk estimates, and that bilateral risk-reducing mastectomy should not routinely be offered but may be considered based on personalized risk assessment and shared medical decision-making. It also stresses referral to a genetics professional and variant-specific interpretation, because CHEK2 risk varies by variant type and modifiers such as family history.\n\nThat makes option D the best answer. It correctly prioritizes:\n\n1. confirming the variant and its clinical meaning,\n2. estimating her individualized lifetime risk rather than treating all CHEK2 carriers like BRCA1/2 carriers,\n3. optimizing screening rather than simply continuing the same pathway,\n4. discussing non-surgical risk reduction such as chemoprevention and lifestyle measures,\n5. addressing the psychological burden directly, since repeated false-positive mammograms can cause persistent distress and affect future screening adherence.\n\nThe screening piece matters here because extremely dense breasts reduce mammographic sensitivity, and dense-breast pathways can be individualized. The ACR density-based criteria note that in intermediate-risk women with extremely dense breasts, breast MRI or abbreviated MRI are usually appropriate, while ultrasound and contrast-enhanced mammography may also be considered depending on context. That supports \u201coptimize screening\u201d rather than simply repeating annual mammography plus recall cycles indefinitely.\n\nThe psychological distress also matters clinically, not just emotionally. False-positive mammograms are associated with breast cancer\u2013specific psychological distress that can persist for years, and long-term psychosocial consequences have been documented up to 12\u201314 years in cohort data.","why_other_options_are_wrong":"C is wrong because neither a mandatory 12-month intensified screening trial nor formal psychiatric clearance is an established requirement before considering surgery in CHEK2 carriers. The problem is not that surgery can never be considered; it is that it should follow individualized risk assessment and shared decision-making, not arbitrary gatekeeping.\n\nB is wrong because it is too dismissive. CHEK2 is moderate-penetrance, but that does not mean risk-reducing mastectomy is never discussable. It also ignores the need for personalized risk modeling, genetics input, and structured support for anxiety. In addition, simply defaulting to annual mammography plus ultrasound is not necessarily the best way to reduce false positives or improve screening performance in extremely dense breasts.\n\nA is wrong because CHEK2 plus dense breasts plus distress from false positives does not automatically \u201capproach high-penetrance gene risk,\u201d and current guidance does not support proceeding to prophylactic mastectomy without personalized risk modeling. CHEK2 management is explicitly not BRCA-style by default.\n\nE is wrong because de-escalating screening to clinical breast exams would be inappropriate. Dense breasts reduce mammographic sensitivity, but that argues for risk-adapted imaging strategy, not less surveillance. Clinical breast exams alone are not an adequate substitute in a CHEK2 carrier.\n\nBest practical interpretation:\n\nThe counseling should validate her distress, explain that false positives are a real harm of screening, and then move into a structured discussion:\nconfirm what CHEK2 variant she carries,\nestimate her actual lifetime risk with a model such as CanRisk/Tyrer\u2013Cuzick plus family history and density,\nreview whether MRI-based surveillance might fit better than her current pathway,\ndiscuss endocrine risk reduction if appropriate,\nand only then discuss prophylactic mastectomy as an individualized option rather than a default recommendation.","evidence":"Evidence confidence:\n\nHigh","references":["Hanson H, et al. ACMG clinical practice resource for management of individuals with germline pathogenic/likely pathogenic variants in CHEK2. Genetics in Medicine. 2023. Personalized risk assessment is recommended; bilateral risk-reducing mastectomy should not routinely be offered but may be considered after shared decision-making."],"length_bias_flag":"NONE"},{"id":"14","section":"Epidemiology","question":"Among premenopausal and postmenopausal women, does a vegetarian dietary pattern independently reduce breast cancer incidence compared with non-vegetarian dietary patterns when controlling for body mass index, alcohol intake, and lifestyle variables?","options":{"A":"No overall independent effect; subtype-specific signal. There is no independent reduction in overall breast cancer incidence, but a vegetarian pattern is independently associated with lower incidence of specific tumor subtypes (e.g., ER+ postmenopausal, or more plausibly certain hormone-related strata), while other subtypes show no difference\u2014consistent with etiologic heterogeneity.","B":"Yes\u2014independent protective association. After multivariable adjustment for BMI, alcohol intake, and key lifestyle covariates (e.g., smoking, physical activity, SES), a vegetarian dietary pattern remains significantly associated with lower breast cancer incidence in both premenopausal and postmenopausal women (or with a clear interaction term showing benefit in each stratum).","C":"Uncertain/insufficient evidence for independent inference. The available data do not support a definitive conclusion because of residual confounding, exposure misclassification (dietary assessment limitations), time-varying confounding (BMI/alcohol changes), or inadequate power within menopausal strata; estimates are imprecise and/or sensitive to model specification.","D":"Effect modification by menopausal status. A vegetarian pattern shows an independent reduction in incidence only in postmenopausal women (or only in premenopausal women), supported by a statistically significant interaction between dietary pattern and menopausal status after controlling for BMI, alcohol, and lifestyle variables.","E":"No\u2014association explained by confounding/mediation. Any apparent reduction in incidence among vegetarians is attenuated to null after adjustment, indicating the observed crude association is largely explained by BMI differences, alcohol consumption patterns, and correlated health behaviors rather than an independent effect of the dietary pattern."},"correct_answer":"C","short_rationale":"If the key word is independently, the best answer is C. The evidence is mixed and not strong enough to conclude a definitive independent protective effect once BMI, alcohol, and correlated lifestyle factors are accounted for. A large 2026 pooled analysis found lower breast cancer risk in vegetarians overall and in postmenopausal women, but the authors explicitly noted that the associations were larger before BMI adjustment and that the postmenopausal signal may be at least partly explained by adiposity.\n\nThat same uncertainty shows up in individual cohorts. In UK Biobank, vegetarian postmenopausal women initially appeared to have lower breast cancer risk, but the association was attenuated and became non-significant after BMI adjustment, and the authors concluded the lower risk may largely be explained by lower BMI. In Adventist Health Study-2, vegetarian women overall did not have a significantly lower breast cancer risk than non-vegetarians, and the authors found no convincing evidence of protection in either premenopausal or postmenopausal women.\n\nRecent systematic reviews also support a cautious interpretation rather than a firm causal claim. A 2026 meta-analysis of prospective studies reported a modest inverse association for vegetarian diets and overall or postmenopausal breast cancer, but it also noted attenuation after BMI adjustment for many outcomes and acknowledged limited data for subgroup and sensitivity analyses. Separately, the 2025 CUP Global systematic review judged \u201cPrudent/Vegetarian/Mediterranean\u201d patterns as only limited-suggestive for lower breast cancer risk, which is weaker than saying a strict vegetarian diet independently reduces incidence across menopausal strata.\n\nSo the most defensible conclusion is not \u201cyes independently,\u201d and not \u201cclearly null after adjustment in all studies,\u201d but rather that the evidence remains uncertain because estimates vary by cohort, menopausal status, adjustment strategy, and residual confounding.","why_other_options_are_wrong":"D is too strong because it claims a statistically secure menopause interaction and an independent effect confined to one stratum. Current data suggest a possible postmenopausal signal, but not a settled independent interaction after full adjustment.\n\nE is also too strong because it says the association is attenuated to null after adjustment, full stop. That is true in some cohorts, especially UK Biobank, but not uniformly across all pooled analyses and meta-analyses.\n\nA is not the best answer because the vegetarian-specific literature is not strongest for subtype-specific independent effects; the main uncertainty is more basic than that.\n\nB overstates the evidence. The available literature does not support a definitive independent protective association in both premenopausal and postmenopausal women after controlling for BMI, alcohol, and lifestyle variables.","evidence":"Evidence confidence:\n\nModerate","references":["Dunneram Y, et al. Vegetarian diets and cancer risk: pooled analysis of 1.8 million women and men in nine prospective studies on three continents. British Journal of Cancer. 2026."],"length_bias_flag":"NONE"},{"id":"15","section":"Epidemiology","question":"How clinically significant is cumulative radiation exposure from annual mammography starting at age 40?","options":{"A":"Not estimable in principle\u2014because BMI, alcohol, and lifestyle confounding (and healthy screener bias) make it impossible to isolate radiation-attributable risk in screening cohorts; therefore clinical significance cannot be evaluated without randomized trials that directly measure radiation-induced cancers.","B":"Mostly negligible, but only if you assume perfect modern low-dose digital technique and ignore real-world factors; once you incorporate callbacks, additional diagnostic views, DBT protocols, and inter-facility dose variability, the cumulative attributable risk becomes clinically meaningful for most women.","C":"Clinically substantial\u2014the cumulative dose confers a radiation-induced breast cancer risk comparable in magnitude to the mortality benefit of screening, so annual screening from 40 is generally net-harm unless restricted to high-risk women.","D":"Clinically important primarily via stochastic deterministic effects\u2014annual mammography from 40 materially increases risk of deterministic breast injury (skin erythema/fibrosis) over time, making cumulative exposure a routine safety-limiting factor similar to radiotherapy constraints.","E":"Usually small and outweighed by screening benefit, but not negligible for everyone; risk matters

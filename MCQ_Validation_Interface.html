<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Clinical Validation</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #F7F5F2; --card: #FFFFFF; --border: #E4E0DA; --text: #2D2A26;
  --text-muted: #8A8580; --accent: #1A6B52; --accent-light: #E8F5F0;
  --correct: #1A6B52; --correct-bg: #E8F5F0; --wrong-bg: #FFF8F0;
  --reject: #C0392B; --reject-bg: #FDECEB; --revise: #D4850A; --revise-bg: #FFF5E5;
  --ok-bg: #E8F5F0; --sidebar-bg: #2D2A26; --sidebar-text: #C8C4BE;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

.sidebar { width:280px; min-width:280px; background:var(--sidebar-bg); display:flex; flex-direction:column; }
.sidebar-header { padding:24px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
.sidebar-header h1 { font-family:'Source Serif 4',serif; font-size:18px; color:#fff; font-weight:700; margin-bottom:4px; }
.sidebar-header p { font-size:12px; color:var(--sidebar-text); }

.reviewer-field { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
.reviewer-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--sidebar-text); margin-bottom:6px; font-weight:600; }
.reviewer-input { width:100%; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color 0.15s; }
.reviewer-input:focus { border-color:rgba(255,255,255,0.3); }
.reviewer-input::placeholder { color:rgba(255,255,255,0.3); }

.progress-bar-wrap { margin-top:12px; background:rgba(255,255,255,0.08); border-radius:6px; height:6px; overflow:hidden; }
.progress-bar-fill { height:100%; background:var(--accent); border-radius:6px; transition:width 0.3s; }
.progress-stats { display:flex; gap:12px; margin-top:8px; font-size:11px; color:var(--sidebar-text); }
.progress-stats span { display:flex; align-items:center; gap:4px; }
.dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.dot-ok { background:#1A6B52; } .dot-revise { background:#D4850A; } .dot-reject { background:#C0392B; } .dot-skip { background:rgba(255,255,255,0.15); }

.view-toggle { padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; gap:4px; }
.view-btn { flex:1; padding:8px; border-radius:8px; border:none; background:transparent; color:var(--sidebar-text); cursor:pointer; font-size:12px; font-weight:600; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.view-btn:hover { background:rgba(255,255,255,0.06); }
.view-btn.active { background:rgba(255,255,255,0.12); color:#fff; }

.filter-bar { padding:12px 20px; display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn { font-size:11px; padding:4px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:var(--sidebar-text); cursor:pointer; transition:all 0.15s; }
.filter-btn:hover, .filter-btn.active { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.25); }

.q-list { flex:1; overflow-y:auto; padding:8px 12px; }
.q-list::-webkit-scrollbar { width:4px; }
.q-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:4px; }
.q-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; cursor:pointer; transition:background 0.15s; margin-bottom:2px; }
.q-item:hover { background:rgba(255,255,255,0.06); }
.q-item.active { background:rgba(255,255,255,0.1); }
.q-item .q-num { font-size:12px; font-weight:600; color:var(--sidebar-text); min-width:36px; }
.q-item .q-section { font-size:11px; color:var(--sidebar-text); opacity:0.7; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-item .q-status { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#questionView { display:flex; flex-direction:column; flex:1; overflow:hidden; }
#overviewView { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); background:var(--card); }
.topbar .nav-group { display:flex; align-items:center; gap:12px; }
.nav-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; color:var(--text); }
.nav-btn:hover { background:var(--bg); }
.nav-btn:disabled { opacity:0.3; cursor:default; }
.q-counter { font-size:14px; font-weight:600; }
.q-counter span { color:var(--text-muted); font-weight:400; }
.section-badge { font-size:12px; background:var(--accent-light); color:var(--accent); padding:4px 12px; border-radius:12px; font-weight:600; }
.reviewer-badge { font-size:12px; color:var(--text-muted); font-style:italic; }
.export-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:13px; font-weight:600; color:var(--text); transition:all 0.15s; font-family:'DM Sans',sans-serif; }
.export-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

.content { flex:1; overflow-y:auto; padding:32px; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.question-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:28px 32px; margin-bottom:20px; }
.question-label { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-muted); font-weight:600; margin-bottom:10px; }
.question-text { font-family:'Source Serif 4',serif; font-size:17px; line-height:1.65; }
.options-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:28px 32px; margin-bottom:20px; }
.option { padding:14px 16px; border-radius:8px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; line-height:1.55; font-size:14px; }
.option:last-child { margin-bottom:0; }
.option.correct { background:var(--correct-bg); }
.option.wrong { background:var(--wrong-bg); }
.option-letter { font-weight:700; min-width:22px; flex-shrink:0; }
.option.correct .option-letter { color:var(--correct); }

.rationale-card { background:var(--card); border-radius:12px; border:1px solid var(--border); margin-bottom:20px; overflow:hidden; }
.rationale-toggle { width:100%; padding:18px 32px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--text); }
.rationale-toggle .arrow { transition:transform 0.2s; font-size:12px; color:var(--text-muted); }
.rationale-toggle .arrow.open { transform:rotate(180deg); }
.rationale-body { padding:0 32px 24px; }
.rationale-body p { font-size:14px; line-height:1.65; margin-bottom:12px; }
.rationale-body p:last-child { margin-bottom:0; }
.rationale-section-title { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--accent); font-weight:700; margin:16px 0 8px; }
.ref-list { list-style:none; padding:0; }
.ref-list li { font-size:13px; color:var(--text-muted); padding:4px 0 4px 16px; position:relative; line-height:1.5; }
.ref-list li::before { content:"\2022"; position:absolute; left:0; color:var(--accent); }

.validation-card { background:var(--card); border-radius:12px; border:2px solid var(--accent); padding:28px 32px; margin-bottom:20px; }
.validation-title { font-size:15px; font-weight:700; color:var(--accent); margin-bottom:20px; }
.val-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
.val-row:last-of-type { border-bottom:none; }
.val-label { font-size:14px; font-weight:500; }
.val-btns { display:flex; gap:6px; }
.val-btn { padding:6px 18px; border-radius:6px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-size:13px; font-weight:600; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.val-btn:hover { border-color:var(--accent); }
.val-btn.selected-ok { background:var(--ok-bg); border-color:var(--correct); color:var(--correct); }
.val-btn.selected-revise { background:var(--revise-bg); border-color:var(--revise); color:var(--revise); }
.val-btn.selected-reject { background:var(--reject-bg); border-color:var(--reject); color:var(--reject); }
.comment-area { width:100%; margin-top:16px; padding:12px 14px; border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; resize:vertical; min-height:60px; outline:none; transition:border-color 0.15s; }
.comment-area:focus { border-color:var(--accent); }
.comment-area::placeholder { color:var(--text-muted); }

.length-flag { display:inline-block; font-size:11px; padding:3px 8px; border-radius:4px; font-weight:600; margin-left:8px; }
.flag-NONE { display:none; } .flag-MILD { background:#FFF5E5; color:#D4850A; } .flag-MODERATE { background:#FDECEB; color:#C0392B; }

.nav-bottom { display:flex; gap:12px; margin-bottom:12px; }
.nav-bottom-btn { flex:1; padding:14px 24px; border-radius:10px; border:1px solid var(--border); background:var(--card); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--text); transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.nav-bottom-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.nav-bottom-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
.nav-bottom-btn.primary:hover { background:#15573F; }
.nav-bottom-btn:disabled { opacity:0.3; cursor:default; background:var(--card); color:var(--text); }
.keyboard-hint { text-align:center; padding:8px; font-size:11px; color:var(--text-muted); }
kbd { background:var(--bg); padding:2px 6px; border-radius:4px; border:1px solid var(--border); font-size:11px; font-family:inherit; }

/* Overview */
.overview-topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); background:var(--card); }
.overview-topbar h2 { font-family:'Source Serif 4',serif; font-size:20px; font-weight:700; }
.overview-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:20px 24px; text-align:center; }
.stat-card .stat-num { font-size:32px; font-weight:700; font-family:'Source Serif 4',serif; }
.stat-card .stat-label { font-size:12px; color:var(--text-muted); margin-top:4px; font-weight:500; }
.stat-ok .stat-num { color:var(--correct); }
.stat-revise .stat-num { color:var(--revise); }
.stat-reject .stat-num { color:var(--reject); }
.stat-open .stat-num { color:var(--text-muted); }

.section-summary { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:24px 28px; margin-bottom:28px; }
.section-summary h3 { font-size:14px; font-weight:700; margin-bottom:16px; }
.section-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--bg); gap:12px; }
.section-row:last-child { border-bottom:none; }
.section-name { width:180px; font-size:13px; font-weight:600; }
.section-bar-wrap { flex:1; height:18px; background:var(--bg); border-radius:9px; overflow:hidden; display:flex; }
.section-bar-ok { background:var(--correct); height:100%; } .section-bar-revise { background:var(--revise); height:100%; }
.section-bar-reject { background:var(--reject); height:100%; } .section-bar-open { background:var(--border); height:100%; }
.section-count { font-size:12px; color:var(--text-muted); min-width:60px; text-align:right; }

.overview-table-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.overview-table-header { padding:20px 28px 12px; display:flex; align-items:center; justify-content:space-between; }
.overview-table-header h3 { font-size:14px; font-weight:700; }
.search-input { padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; width:240px; outline:none; }
.search-input:focus { border-color:var(--accent); }
.ov-table { width:100%; border-collapse:collapse; }
.ov-table th { text-align:left; padding:10px 16px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); font-weight:600; border-bottom:2px solid var(--border); background:var(--bg); position:sticky; top:0; }
.ov-table td { padding:10px 16px; font-size:13px; border-bottom:1px solid var(--bg); vertical-align:top; }
.ov-table tbody tr { cursor:pointer; transition:background 0.1s; }
.ov-table tbody tr:hover { background:var(--accent-light); }
.ov-table-scroll { max-height:calc(100vh - 380px); overflow-y:auto; }
.status-pill { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; }
.pill-OK { background:var(--ok-bg); color:var(--correct); }
.pill-Revise { background:var(--revise-bg); color:var(--revise); }
.pill-Reject { background:var(--reject-bg); color:var(--reject); }
.pill-open { background:var(--bg); color:var(--text-muted); }
.q-preview { max-width:400px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.comment-preview { max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-muted); font-size:12px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>MCQ Validation</h1>
    <p>200 Breast Cancer Questions</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-stats">
      <span><span class="dot dot-ok"></span> <span id="statOk">0</span> OK</span>
      <span><span class="dot dot-revise"></span> <span id="statRevise">0</span> Revise</span>
      <span><span class="dot dot-reject"></span> <span id="statReject">0</span> Reject</span>
      <span><span class="dot dot-skip"></span> <span id="statOpen">200</span> Open</span>
    </div>
  </div>
  <div class="reviewer-field">
    <div class="reviewer-label">Reviewer</div>
    <input class="reviewer-input" id="reviewerName" type="text" placeholder="Enter your name..." oninput="saveReviewerName(this.value)">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="viewQuestions" onclick="setView('questions')">Questions</button>
    <button class="view-btn" id="viewOverview" onclick="setView('overview')">Overview</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('open')">Open</button>
    <button class="filter-btn" onclick="setFilter('OK')">OK</button>
    <button class="filter-btn" onclick="setFilter('Revise')">Revise</button>
    <button class="filter-btn" onclick="setFilter('Reject')">Reject</button>
  </div>
  <div class="q-list" id="qList"></div>
</div>
<div class="main">
  <div id="questionView">
    <div class="topbar">
      <div class="nav-group">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
        <span class="q-counter" id="qCounter"></span>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
        <span class="section-badge" id="sectionBadge"></span>
      </div>
      <div class="nav-group">
        <span class="reviewer-badge" id="reviewerBadge"></span>
        <button class="export-btn" onclick="exportResults()">&#11123; Export CSV</button>
      </div>
    </div>
    <div class="content" id="contentArea"></div>
  </div>
  <div id="overviewView" style="display:none;">
    <div class="overview-topbar">
      <h2>Validation Overview</h2>
      <div class="nav-group">
        <span class="reviewer-badge" id="reviewerBadgeOv"></span>
        <button class="export-btn" onclick="exportResults()">&#11123; Export CSV</button>
      </div>
    </div>
    <div class="content" id="overviewContent"></div>
  </div>
</div>

var current = 0, filter = 'all', activeView = 'questions', tableSearch = '';
var validations = {};
var reviewerName = '';
try { var s = localStorage.getItem('mcq_val_v5'); if(s) validations = JSON.parse(s); } catch(e) {}
try { var rn = localStorage.getItem('mcq_reviewer_v5'); if(rn) reviewerName = rn; } catch(e) {}

function save() { try { localStorage.setItem('mcq_val_v5', JSON.stringify(validations)); } catch(e) {} }
function saveReviewerName(name) {
  reviewerName = name;
  try { localStorage.setItem('mcq_reviewer_v5', name); } catch(e) {}
  updateReviewerBadge();
}
function updateReviewerBadge() {
  var text = reviewerName ? 'Reviewer: ' + reviewerName : '';
  document.getElementById('reviewerBadge').textContent = text;
  document.getElementById('reviewerBadgeOv').textContent = text;
}

function getVal(id) { return validations[id] || { correctOk:null, distractorsOk:null, usable:null, comment:'' }; }
function setVal(id, key, value) {
  if(!validations[id]) validations[id] = { correctOk:null, distractorsOk:null, usable:null, comment:'' };
  validations[id][key] = validations[id][key] === value ? null : value;
  save(); render();
}
function setComment(id, text) {
  if(!validations[id]) validations[id] = { correctOk:null, distractorsOk:null, usable:null, comment:'' };
  validations[id].comment = text; save();
}
function getStatus(id) { var v = validations[id]; return (!v || v.usable===null) ? null : v.usable; }

function getCounts() {
  var ok=0,rev=0,rej=0;
  DATA.forEach(function(q) { var s=getStatus(q.id); if(s==='OK')ok++; else if(s==='Revise')rev++; else if(s==='Reject')rej++; });
  return { ok:ok, rev:rev, rej:rej, open: DATA.length-ok-rev-rej };
}

function getFilteredIndices() {
  var indices = [];
  DATA.forEach(function(q, i) {
    var s = getStatus(q.id);
    if(filter==='all') indices.push(i);
    else if(filter==='open' && s===null) indices.push(i);
    else if(s===filter) indices.push(i);
  });
  return indices;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    var t = b.textContent.trim();
    b.classList.toggle('active', t.toLowerCase()===f.toLowerCase() || (f==='all' && t==='All'));
  });
  renderList();
}

function setView(v) {
  activeView = v;
  document.getElementById('viewQuestions').classList.toggle('active', v==='questions');
  document.getElementById('viewOverview').classList.toggle('active', v==='overview');
  document.getElementById('questionView').style.display = v==='questions' ? '' : 'none';
  document.getElementById('overviewView').style.display = v==='overview' ? '' : 'none';
  document.getElementById('filterBar').style.display = v==='questions' ? '' : 'none';
  document.getElementById('qList').style.display = v==='questions' ? '' : 'none';
  if(v==='overview') renderOverview();
}

function navigate(dir) {
  var filtered = getFilteredIndices();
  if(!filtered.length) return;
  var ci = filtered.indexOf(current);
  current = dir===1 ? (ci===-1||ci>=filtered.length-1 ? filtered[0] : filtered[ci+1]) : (ci<=0 ? filtered[filtered.length-1] : filtered[ci-1]);
  render();
}
function goTo(i) { current = i; if(activeView==='overview') setView('questions'); render(); }

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function updateStats() {
  var c = getCounts();
  document.getElementById('statOk').textContent = c.ok;
  document.getElementById('statRevise').textContent = c.rev;
  document.getElementById('statReject').textContent = c.rej;
  document.getElementById('statOpen').textContent = c.open;
  document.getElementById('progressBar').style.width = ((c.ok+c.rev+c.rej)/DATA.length*100)+'%';
}

function renderList() {
  var filtered = getFilteredIndices();
  var html = '';
  filtered.forEach(function(i) {
    var q = DATA[i], s = getStatus(q.id);
    var color = s==='OK'?'#1A6B52':s==='Revise'?'#D4850A':s==='Reject'?'#C0392B':'rgba(255,255,255,0.12)';
    html += '<div class="q-item '+(i===current?'active':'')+'" onclick="goTo('+i+')"><span class="q-num">Q'+escapeHtml(q.id)+'</span><span class="q-section">'+escapeHtml(q.section)+'</span><span class="q-status" style="background:'+color+'"></span></div>';
  });
  document.getElementById('qList').innerHTML = html;
}

function toggleRationale(btn) {
  var body = btn.nextElementSibling;
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  btn.querySelector('.arrow').classList.toggle('open');
}

function renderQuestion() {
  var q = DATA[current], v = getVal(q.id);
  document.getElementById('qCounter').innerHTML = 'Q'+escapeHtml(q.id)+' <span>/ '+DATA.length+'</span>';
  document.getElementById('sectionBadge').textContent = q.section;
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===DATA.length-1;

  var optKeys = Object.keys(q.options);
  var optionsHtml = '';
  optKeys.forEach(function(k) {
    var ic = k===q.correct_answer;
    optionsHtml += '<div class="option '+(ic?'correct':'wrong')+'"><span class="option-letter">'+escapeHtml(k)+'.</span><span>'+escapeHtml(q.options[k])+'</span></div>';
  });

  var flagClass = q.length_bias_flag && q.length_bias_flag!=='NONE' ? 'flag-'+q.length_bias_flag : 'flag-NONE';
  var flagLabel = q.length_bias_flag && q.length_bias_flag!=='NONE' ? q.length_bias_flag+' length bias' : '';

  var refsHtml = '';
  (q.references||[]).forEach(function(r) { refsHtml += '<li>'+escapeHtml(r)+'</li>'; });

  var rationaleParas = '';
  q.short_rationale.split('\n\n').forEach(function(p) { rationaleParas += '<p>'+escapeHtml(p)+'</p>'; });
  var wrongParas = '';
  q.why_other_options_are_wrong.split('\n\n').forEach(function(p) { wrongParas += '<p>'+escapeHtml(p)+'</p>'; });

  var qid = q.id;
  function vBtn(key, val, label, type) {
    var sel = v[key]===val;
    var cls = sel ? (type==='ok'?'selected-ok':type==='revise'?'selected-revise':'selected-reject') : '';
    return '<button class="val-btn '+cls+'" onclick="setVal(\''+qid+'\',\''+key+'\',\''+val+'\')">'+label+'</button>';
  }

  var area = document.getElementById('contentArea');
  area.innerHTML =
    '<div class="question-card"><div class="question-label">Question <span class="length-flag '+flagClass+'">'+flagLabel+'</span></div><div class="question-text">'+escapeHtml(q.question)+'</div></div>'
    +'<div class="options-card"><div class="question-label">Answer Options <span style="color:var(--correct);font-size:12px;font-weight:600;">\u2014 Correct: '+escapeHtml(q.correct_answer)+'</span></div>'+optionsHtml+'</div>'
    +'<div class="rationale-card"><button class="rationale-toggle" onclick="toggleRationale(this)">Rationale & References <span class="arrow">\u25BC</span></button>'
    +'<div class="rationale-body" style="display:none;"><div class="rationale-section-title">Why '+escapeHtml(q.correct_answer)+' is correct</div>'+rationaleParas
    +'<div class="rationale-section-title">Why other options are wrong</div>'+wrongParas
    +(refsHtml?'<div class="rationale-section-title">References</div><ul class="ref-list">'+refsHtml+'</ul>':'')
    +'</div></div>'
    +'<div class="validation-card"><div class="validation-title">\u2611 Your Validation</div>'
    +'<div class="val-row"><span class="val-label">1. Correct answer is right?</span><div class="val-btns">'+vBtn('correctOk','yes','Yes','ok')+vBtn('correctOk','no','No','reject')+'</div></div>'
    +'<div class="val-row"><span class="val-label">2. Wrong options suitable?</span><div class="val-btns">'+vBtn('distractorsOk','yes','Yes','ok')+vBtn('distractorsOk','partially','Partially','revise')+vBtn('distractorsOk','no','No','reject')+'</div></div>'
    +'<div class="val-row"><span class="val-label">3. MCQ usable?</span><div class="val-btns">'+vBtn('usable','OK','OK','ok')+vBtn('usable','Revise','Revise','revise')+vBtn('usable','Reject','Reject','reject')+'</div></div>'
    +'<textarea class="comment-area" placeholder="Comment (optional)..." oninput="setComment(\''+qid+'\', this.value)">'+(v.comment?escapeHtml(v.comment):'')+'</textarea></div>'
    +'<div class="nav-bottom"><button class="nav-bottom-btn" onclick="navigate(-1)" '+(current===0?'disabled':'')+'>← Previous</button><button class="nav-bottom-btn primary" onclick="navigate(1)" '+(current===DATA.length-1?'disabled':'')+'>Next Question →</button></div><div class="keyboard-hint"><kbd>\u2190</kbd> <kbd>\u2192</kbd> navigate \u00B7 <kbd>1</kbd> correct yes \u00B7 <kbd>2</kbd> distractors yes \u00B7 <kbd>3</kbd> MCQ OK</div>';
  area.scrollTop = 0;
}

function renderOverview() {
  var c = getCounts();
  var sections = {};
  DATA.forEach(function(q) {
    if(!sections[q.section]) sections[q.section] = {ok:0,rev:0,rej:0,open:0,total:0};
    sections[q.section].total++;
    var s = getStatus(q.id);
    if(s==='OK') sections[q.section].ok++;
    else if(s==='Revise') sections[q.section].rev++;
    else if(s==='Reject') sections[q.section].rej++;
    else sections[q.section].open++;
  });

  var sectionEntries = Object.keys(sections).map(function(k){return [k,sections[k]];}).sort(function(a,b){return b[1].total-a[1].total;});
  var sectionRows = '';
  sectionEntries.forEach(function(e) {
    var name=e[0], d=e[1];
    var pOk=d.ok/d.total*100, pRev=d.rev/d.total*100, pRej=d.rej/d.total*100, pOpen=d.open/d.total*100;
    sectionRows += '<div class="section-row"><span class="section-name">'+escapeHtml(name)+'</span>'
      +'<div class="section-bar-wrap"><div class="section-bar-ok" style="width:'+pOk+'%"></div><div class="section-bar-revise" style="width:'+pRev+'%"></div><div class="section-bar-reject" style="width:'+pRej+'%"></div><div class="section-bar-open" style="width:'+pOpen+'%"></div></div>'
      +'<span class="section-count">'+(d.ok+d.rev+d.rej)+' / '+d.total+'</span></div>';
  });

  var searchLower = tableSearch.toLowerCase();
  var tableRows = '';
  DATA.forEach(function(q) {
    if(tableSearch) {
      var match = q.id.indexOf(searchLower)!==-1 || q.section.toLowerCase().indexOf(searchLower)!==-1 || q.question.toLowerCase().indexOf(searchLower)!==-1 || (getVal(q.id).comment||'').toLowerCase().indexOf(searchLower)!==-1;
      if(!match) return;
    }
    var v = getVal(q.id), s = getStatus(q.id);
    var pillClass = s ? 'pill-'+s : 'pill-open';
    var pillText = s || 'Open';
    var corrIcon = v.correctOk==='yes'?'<span style="color:var(--correct)">\u2713</span>':v.correctOk==='no'?'<span style="color:var(--reject)">\u2717</span>':'\u2014';
    var distIcon = v.distractorsOk==='yes'?'<span style="color:var(--correct)">\u2713</span>':v.distractorsOk==='partially'?'<span style="color:var(--revise)">~</span>':v.distractorsOk==='no'?'<span style="color:var(--reject)">\u2717</span>':'\u2014';
    var i = DATA.indexOf(q);
    tableRows += '<tr onclick="goTo('+i+')">'
      +'<td>Q'+escapeHtml(q.id)+'</td>'
      +'<td>'+escapeHtml(q.section)+'</td>'
      +'<td class="q-preview">'+escapeHtml(q.question.substring(0,80))+'...</td>'
      +'<td style="text-align:center">'+corrIcon+'</td>'
      +'<td style="text-align:center">'+distIcon+'</td>'
      +'<td><span class="status-pill '+pillClass+'">'+pillText+'</span></td>'
      +'<td class="comment-preview">'+escapeHtml(v.comment||'')+'</td></tr>';
  });

  document.getElementById('overviewContent').innerHTML =
    '<div class="overview-stats">'
    +'<div class="stat-card stat-ok"><div class="stat-num">'+c.ok+'</div><div class="stat-label">Approved</div></div>'
    +'<div class="stat-card stat-revise"><div class="stat-num">'+c.rev+'</div><div class="stat-label">Revise</div></div>'
    +'<div class="stat-card stat-reject"><div class="stat-num">'+c.rej+'</div><div class="stat-label">Rejected</div></div>'
    +'<div class="stat-card stat-open"><div class="stat-num">'+c.open+'</div><div class="stat-label">Open</div></div></div>'
    +'<div class="section-summary"><h3>Progress by Section</h3>'+sectionRows+'</div>'
    +'<div class="overview-table-wrap"><div class="overview-table-header"><h3>All Questions</h3><input class="search-input" placeholder="Search by ID, section, text..." value="'+escapeHtml(tableSearch)+'" oninput="tableSearch=this.value;renderOverview()"></div>'
    +'<div class="ov-table-scroll"><table class="ov-table"><thead><tr><th>ID</th><th>Section</th><th>Question</th><th>Corr.</th><th>Distr.</th><th>Status</th><th>Comment</th></tr></thead><tbody>'+tableRows+'</tbody></table></div></div>';
}

function render() { updateStats(); renderList(); if(activeView==='questions') renderQuestion(); else renderOverview(); }

document.addEventListener('keydown', function(e) {
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  var q = DATA[current];
  if(e.key==='ArrowRight') navigate(1);
  else if(e.key==='ArrowLeft') navigate(-1);
  else if(e.key==='1') setVal(q.id,'correctOk','yes');
  else if(e.key==='2') setVal(q.id,'distractorsOk','yes');
  else if(e.key==='3') setVal(q.id,'usable','OK');
});

function exportResults() {
  var rows = [['Reviewer','Q-ID','Section','Correct Answer','Correct OK','Distractors OK','MCQ Usable','Comment']];
  DATA.forEach(function(q) {
    var v = getVal(q.id);
    rows.push([reviewerName, q.id, q.section, q.correct_answer, v.correctOk||'', v.distractorsOk||'', v.usable||'', (v.comment||'').replace(/"/g,'""')]);
  });
  var csv = rows.map(function(r){return r.map(function(c){return '"'+c+'"';}).join(',');}).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mcq_validation_' + (reviewerName||'results').replace(/[^a-zA-Z0-9]/g,'_') + '.csv';
  a.click();
}

// Init reviewer name
document.getElementById('reviewerName').value = reviewerName;
updateReviewerBadge();
render();
</script>
</body>
</html>

_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. The definition and treatment approach are strong international consensus and guideline recommendations, but the exact regimen choice in visceral crisis is not based on large randomized trials in this specific population.","references":["Cardoso F, et al. ABC/ESO-ESMO international consensus guidelines for advanced breast cancer. Liver visceral crisis includes rapidly increasing bilirubin >1.5\u00d7 ULN without obstruction."],"length_bias_flag":"MODERATE"},{"id":"143","section":"Metastatic","question":"A 58-year-old woman with HR-positive, HER2-low (IHC 1+), metastatic breast cancer progressed after first-line letrozole plus ribociclib (14 months) and second-line fulvestrant plus alpelisib (6 months). She now presents with rapidly progressive fatigue, early satiety, and new right upper quadrant discomfort over 2 weeks. Laboratory results: bilirubin 3.2 mg/dL (previously 0.9 mg/dL 3 weeks ago), AST/ALT 3\u00d7 ULN, INR 1.2, albumin 3.1 g/dL, platelets 165,000/\u00b5L. CT abdomen shows diffuse bilobar hepatic metastatic progression without biliary obstruction. ECOG 2. No germline BRCA testing has been performed. What is the most appropriate next systemic therapy?","options":{"A":"Elacestrant monotherapy, as oral selective estrogen receptor degradation remains appropriate for endocrine-resistant HR-positive disease even with rapidly progressive hepatic metastases.","B":"Trastuzumab deruxtecan, targeting HER2-low expression after failure of endocrine-based therapy in the setting of hepatic visceral crisis requiring rapid disease control.","C":"Sacituzumab govitecan, targeting Trop-2 expression as an antibody-drug conjugate option for heavily pretreated HR-positive metastatic breast cancer with visceral disease.","D":"Weekly paclitaxel, as standard single-agent cytotoxic chemotherapy remains the preferred approach for visceral crisis in HR-positive metastatic breast cancer after endocrine failure.","E":"Carboplatin-based combination chemotherapy, as platinum agents have superior response rates in visceral crisis compared with taxane monotherapy regardless of BRCA status."},"correct_answer":"B","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"144","section":"Metastatic","question":"A 51-year-old woman with no prior cancer history presents with progressive fatigue, abdominal distension, and jaundice evolving over 2\u20133 weeks. Imaging reveals a 3.2 cm breast mass, diffuse bilateral liver metastases but no biliary obstruction. Biopsy confirms ER 90%, PR 60%, HER2-negative (0 by IHC) invasive ductal carcinoma. Laboratory results: total bilirubin: 4.6 mg/dL (normal 3 weeks earlier), AST/ALT: 4\u00d7 ULN, INR: 1.5, albumin: 2.9 g/dL, platelets: 220,000/\u00b5L, creatinine: normal. ECOG performance status: 2\\. She is diagnosed with de novo metastatic HR+/HER2\u2212 breast cancer with hepatic visceral crisis. Which of the following is the most appropriate initial systemic treatment?","options":{"A":"Fulvestrant plus ribociclib Same issue as A, since endocrine-based therapy is generally not the exam-standard first move when there is imminent organ failure.","B":"Combination cytotoxic chemotherapy, as hepatic visceral crisis with rapidly rising bilirubin above 1.5 times ULN in the absence of biliary obstruction requires urgent systemic therapy for rapid disease control","C":"Letrozole plus ribociclib Excellent first-line therapy in most HR+/HER2-negative metastatic cases, but not the preferred initial treatment in established hepatic visceral crisis.","D":"Single-agent weekly paclitaxel This is the strongest distractor because it may be a pragmatic bedside choice if liver dysfunction makes polychemotherapy unsafe, but the best exam answer remains combination chemotherapy because guidelines frame visceral crisis as a situation requiring the most rapidly effective systemic treatment.","E":"Upfront sacituzumab govitecan Not a standard first-line option for de novo HR-positive, HER2-negative metastatic disease and not the best-supported choice in this crisis setting."},"correct_answer":"B","short_rationale":"This stem describes true hepatic visceral crisis: rapidly progressive liver dysfunction from diffuse liver metastases, bilirubin 4.6 mg/dL, coagulopathy, hypoalbuminemia, and no biliary obstruction. ABC defines liver visceral crisis as a rapidly rising bilirubin above 1.5 times ULN without obstruction, and current ESMO guidance says that in HR-positive, HER2-negative metastatic breast cancer with imminent organ failure, chemotherapy is the preferred initial option.\n\nThe reason this is still D despite newer CDK4/6 data is that RIGHT Choice studied clinically aggressive disease, but its population did not cleanly represent classic ABC-defined hepatic visceral crisis; the ABC 6/7 guideline explicitly notes that the trial\u2019s \u201cvisceral crisis\u201d definition was not according to ABC5 because bilirubin could not be above 1.5 times ULN. So ribociclib plus endocrine therapy is important data, but it does not overturn D for this question stem.\n\nWhy the others are not correct\n\nA. Letrozole plus ribociclib\nExcellent first-line therapy in most HR+/HER2-negative metastatic cases, but not the preferred initial treatment in established hepatic visceral crisis.\n\nB. Fulvestrant plus ribociclib\nSame issue as A, since endocrine-based therapy is generally not the exam-standard first move when there is imminent organ failure.\n\nC. Upfront sacituzumab govitecan\nNot a standard first-line option for de novo HR-positive, HER2-negative metastatic disease and not the best-supported choice in this crisis setting.\n\nE. Single-agent weekly paclitaxel\nThis is the strongest distractor because it may be a pragmatic bedside choice if liver dysfunction makes polychemotherapy unsafe, but the best exam answer remains combination chemotherapy because guidelines frame visceral crisis as a situation requiring the most rapidly effective systemic treatment.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence\n\nBest-answer confidence: high for exam purposes.","references":["Cardoso F, et al. 5th ESO-ESMO International Consensus Guidelines for Advanced Breast Cancer (ABC 5), Ann Oncol 2020. Defines hepatic visceral crisis by rapidly rising bilirubin >1.5 times ULN without obstruction.","ESMO Living Guideline, HR-positive/HER2-negative metastatic breast cancer, updated 2025. States that in imminent organ failure at diagnosis, chemotherapy is the preferred option \\[V, B\\].","Cardoso F, et al. ABC 6 and 7 Guidelines, The Breast 2024. Notes that RIGHT Choice did not use the strict ABC5 visceral-crisis definition because bilirubin >1.5 times ULN was not allowed.","Lu YS, et al. RIGHT Choice, J Clin Oncol 2024. Supports ribociclib plus endocrine therapy in clinically aggressive disease, but not as definitive evidence for overt hepatic visceral crisis like this stem."],"length_bias_flag":"NONE"},{"id":"145","section":"Metastatic","question":"The 51-year-old woman presents with de novo metastatic ER 90%, PR 60%, HER2 0 invasive ductal carcinoma with diffuse liver metastases and hepatic visceral crisis (bilirubin 4.6 mg/dL, INR 1.5). She receives dose-adjusted combination carboplatin/paclitaxel chemotherapy with rapid clinical improvement. After 3 cycles: bilirubin normalizes, transaminases decrease to \\<1.5\u00d7 ULN. ECOG improves to 1\\. Imaging shows partial response She remains chemotherapy-na\u00efve prior to this episode. What is the most appropriate next systemic treatment?","options":{"A":"Start sacituzumab govitecan","B":"Start trastuzumab deruxtecan","C":"Start aromatase inhibitor + CDK4/6 inhibitor","D":"Switch to maintenance capecitabine","E":"Continue combination chemotherapy until maximal response (3 cycles more)"},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. High that ET plus CDK4/6 is the standard first-line approach outside visceral crisis; moderate for the exact \u201cswitch after rescue chemotherapy\u201d sequence, because this is based mainly on guideline logic and clinical practice rather than a dedicated randomized trial.","references":["Cardoso F, et al. ABC5 ESO-ESMO International Consensus Guidelines for Advanced Breast Cancer. Endocrine therapy is preferred for HR-positive/HER2-negative metastatic breast cancer except in visceral crisis."],"length_bias_flag":"NONE"},{"id":"146","section":"Metastatic","question":"A 50-year-old woman presents with de novo metastatic ER 90%, PR 60%, HER2 0 (IHC 0) invasive ductal carcinoma with diffuse liver metastases and hepatic visceral crisis. She receives dose-adjusted weekly paclitaxel with rapid biochemical and radiologic improvement. After 4 cycles, bilirubin normalises, ECOG improves to 1, and imaging shows partial response. Chemotherapy is stopped and she is transitioned to letrozole plus ribociclib. After 14 months, she develops hepatic progression. Repeat liver biopsy shows: ER 80%, PR 20%, HER2 IHC 1+ (ISH negative). Liquid biopsy: ESR1 Y537S mutation detected, PIK3CA wild-type, no AKT1 or PTEN alterations. There is no visceral crisis. What is the most appropriate next-line therapy?","options":{"A":"Sacituzumab govitecan","B":"Fulvestrant + alpelisib","C":"Elacestrant","D":"Capecitabine","E":"Trastuzumab deruxtecan"},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"147","section":"Metastatic","question":"A 58-year-old woman with metastatic ER-positive (70%), PR-negative, HER2 0 breast cancer initially presented with liver and bone metastases. Treatment history: first-line AI + CDK4/6 inhibitor progression at 11 months, second-line fulvestrant + alpelisib (PIK3CA-mutant), progression at 8 months, third-line Capecitabine, progression at 6 months, fourth-line Sacituzumab govitecan with progression after 5 months. She now presents with worsening liver metastases and rising bilirubin (2.2 mg/dL), ECOG 1\\. Repeat biopsy confirms: ER 30%,PR 0%, HER2 0\\. no actionable mutations detected in liquid biopsy. What is the most appropriate next systemic therapy?","options":{"A":"Datopotamab deruxtecan, a Trop-2-directed antibody-drug conjugate approved for HR-positive, HER2-negative (including IHC 0) metastatic breast cancer after prior endocrine therapy and at least one prior chemotherapy line in the metastatic setting","B":"Elacestrant Its meaningful benefit is in ESR1-mutated ER-positive/HER2-negative disease after prior ET plus CDK4/6 inhibition, and this stem gives no ESR1 mutation while also showing endocrine-refractory visceral progression.","C":"Trastuzumab deruxtecan T-DXd is supported for HER2-low or HER2-ultralow disease, and HER2-ultralow requires IHC 0 with membrane staining; a plain HER2 0 result does not establish eligibility.","D":"Gemcitabine + carboplatin This becomes more defensible only if you interpret the case as true visceral crisis, but the stem does not clearly establish ABC-defined hepatic visceral crisis because it does not specify rapid bilirubin kinetics, absence of obstruction now, or clear synthetic failure.","E":"Eribulin This is the strongest distractor because it is a valid later-line chemotherapy with survival benefit in heavily pretreated metastatic breast cancer, but Dato-DXd has more contemporary phase III evidence showing superiority over investigator\u2019s-choice chemotherapy in this treatment space."},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"B. Elacestrant\nIts meaningful benefit is in ESR1-mutated ER-positive/HER2-negative disease after prior ET plus CDK4/6 inhibition, and this stem gives no ESR1 mutation while also showing endocrine-refractory visceral progression.\n\nD. Gemcitabine + carboplatin\nThis becomes more defensible only if you interpret the case as true visceral crisis, but the stem does not clearly establish ABC-defined hepatic visceral crisis because it does not specify rapid bilirubin kinetics, absence of obstruction now, or clear synthetic failure.\n\nC. Trastuzumab deruxtecan\nT-DXd is supported for HER2-low or HER2-ultralow disease, and HER2-ultralow requires IHC 0 with membrane staining; a plain HER2 0 result does not establish eligibility.\n\nE. Eribulin\nThis is the strongest distractor because it is a valid later-line chemotherapy with survival benefit in heavily pretreated metastatic breast cancer, but Dato-DXd has more contemporary phase III evidence showing superiority over investigator\u2019s-choice chemotherapy in this treatment space.\n\nClarity: Good question, but slightly flawed. To make it cleaner, the stem should state whether HER2 0 had any faint membrane staining and whether this is true hepatic visceral crisis versus simply worsening liver-dominant progression. Those two details materially change how hard D versus E or even B can be argued.\n\nPlausibility of distractors: E is the best distractor; B is the next best if the writer intended visceral crisis; C is tempting but should be wrong unless the pathology is HER2-ultralow rather than generic HER2 0.","evidence":"Not stated explicitly in the source draft.","references":["Bardia A, Jhaveri K, Im SA, et al. Datopotamab deruxtecan versus chemotherapy in previously treated inoperable/metastatic HR-positive, HER2-negative breast cancer: primary results from TROPION-Breast01. J Clin Oncol. 2025. Level of evidence: I.","Royce M, et al. FDA Approval Summary: Datopotamab deruxtecan-dlnk for unresectable or metastatic HR-positive, HER2-negative breast cancer. Clin Cancer Res. 2025. Regulatory/peer-reviewed support for use in IHC 0 disease.","Bidard FC, et al. EMERALD trial. J Clin Oncol. 2022, with later subgroup updates in 2024. Elacestrant benefit is centered on ESR1-mutated disease. Level of evidence: I.","Cort\u00e9s J, et al. EMBRACE. Lancet. 2011. Eribulin improved OS in heavily pretreated metastatic breast cancer. Level of evidence: I.","Bardia A, et al. DESTINY-Breast06. N Engl J Med. 2024, plus FDA approval summary 2025. T-DXd applies to HER2-low or HER2-ultralow, not unspecified HER2 0. Level of evidence: I.","Cardoso F, et al. ABC5 guidelines. Ann Oncol. 2020. Hepatic visceral crisis requires rapidly rising bilirubin >1.5\u00d7 ULN without obstruction. Guideline evidence level: consensus/guideline."],"length_bias_flag":"NONE"},{"id":"148","section":"Metastatic","question":"A 62-year-old postmenopausal woman presents with metastatic recurrence 4 years after completing adjuvant trastuzumab-based chemotherapy for stage II HER2-positive, ER-positive breast cancer. She reports significant residual peripheral neuropathy and alopecia-related distress from prior adjuvant treatment. Current findings: ER 95%, PR 10%, HER2 IHC 3+ (confirmed by ISH), liver and multiple bone metastases, no CNS disease, asymptomatic with ECOG 0, normal bilirubin, transaminases, and blood counts. She strongly wishes to avoid cytotoxic chemotherapy if a reasonable alternative exists. What is the most appropriate first-line therapy?","options":{"A":"Trastuzumab + pertuzumab + CDK4/6 inhibitor + aromatase inhibitor","B":"Trastuzumab + pertuzumab + aromatase inhibitor","C":"Tratuzumab emtansine monotherapy","D":"Trastuzumab + pertuzumab + paclitaxel","E":"Trastuzumab + aromatase inhibitor without pertuzumab"},"correct_answer":"B","short_rationale":"Rationale:\nThis patient has HR-positive/HER2-positive metastatic breast cancer, is asymptomatic without visceral crisis, and has a strong and clinically legitimate preference to avoid chemotherapy. In this context, a chemo-sparing first-line strategy using dual HER2 blockade plus endocrine therapy is appropriate. The PERTAIN trial (randomised phase II) evaluated pertuzumab plus trastuzumab plus an aromatase inhibitor versus trastuzumab plus an aromatase inhibitor in first-line HR+/HER2+ metastatic breast cancer. The addition of pertuzumab significantly improved PFS (median 18.9 vs 15.8 months in the overall population). Notably, the benefit was most pronounced in patients who did not receive induction chemotherapy (median PFS 21.7 months), demonstrating that a fully chemo-free dual HER2 blockade plus endocrine therapy approach is a viable first-line option in appropriately selected patients. This patient is an ideal candidate: strongly ER-positive disease (95%), no visceral crisis, excellent performance status, and a clear preference to avoid chemotherapy with a clinical rationale (prior neuropathy). ESMO and NCCN guidelines recognise this as an acceptable alternative to CLEOPATRA-based chemo-containing regimens in selected HR+/HER2+ patients.\n\nWhy the others are wrong:\n**B \u2014 Trastuzumab emtansine (T-DM1) monotherapy.** T-DM1 is not a standard first-line therapy for HER2-positive metastatic breast cancer. It is positioned in the second line based on the EMILIA trial (T-DM1 vs lapatinib plus capecitabine after prior trastuzumab and taxane) and in the post-neoadjuvant setting based on KATHERINE (adjuvant T-DM1 for residual disease after neoadjuvant therapy). Using T-DM1 first-line would bypass both the proven CLEOPATRA regimen and the PERTAIN chemo-sparing alternative. Additionally, T-DM1 is a cytotoxic ADC \u2014 while better tolerated than taxanes, it is not truly chemotherapy-free, and the patient's concern about toxicity would not be fully addressed.\n\n**C \u2014 Trastuzumab plus aromatase inhibitor without pertuzumab.** This omits pertuzumab from the anti-HER2 backbone. The PERTAIN trial directly demonstrated that adding pertuzumab to trastuzumab plus AI significantly improved PFS. Omitting pertuzumab in a patient with liver metastases and intact performance status represents suboptimal dual HER2 blockade. While trastuzumab plus endocrine therapy alone has historical precedent (TAnDEM trial), it is now considered inferior to the pertuzumab-containing combination. There is no clinical rationale to withhold pertuzumab when it adds efficacy without substantially increasing toxicity.\n\n**D \u2014 Trastuzumab plus pertuzumab plus CDK4/6 inhibitor plus aromatase inhibitor.** This four-drug chemo-free combination is not supported by evidence as upfront first-line therapy. The PATINA trial evaluated the addition of palbociclib (CDK4/6 inhibitor) to anti-HER2 therapy plus endocrine therapy, but critically, this was as maintenance after initial induction with chemotherapy plus anti-HER2 therapy \u2014 not as an immediate chemo-free first-line strategy. Extrapolating PATINA to a fully upfront chemo-free four-drug regimen is unsupported. No prospective data validate this combination without prior induction chemotherapy, and the overlapping toxicity profile (cytopenias, hepatotoxicity) would require careful justification that does not exist.\n\n**E \u2014 Trastuzumab plus pertuzumab plus docetaxel.** This is the CLEOPATRA regimen, which is the default first-line standard for HER2-positive metastatic breast cancer. CLEOPATRA demonstrated a landmark overall survival benefit (median OS 56.5 vs 40.8 months; HR 0.68) with pertuzumab plus trastuzumab plus docetaxel versus placebo plus trastuzumab plus docetaxel. In an unselected patient, this would be the correct answer. However, this stem deliberately presents a patient who strongly wishes to avoid chemotherapy due to prior toxicity (neuropathy, alopecia), is asymptomatic without visceral crisis, and has strongly HR-positive disease amenable to endocrine therapy. When a validated chemo-sparing alternative exists (PERTAIN), insisting on chemotherapy against a patient's informed preference \u2014 in the absence of clinical urgency \u2014 does not represent best practice. The question tests whether candidates can integrate patient-centred decision-making with evidence-based options.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate for option A (randomised phase II, PERTAIN). High for option E as the general default standard (phase III, CLEOPATRA). The clinical decision between the two depends on patient selection and shared decision-making, which is exactly what this question tests.","references":["Arpino G et al. (PERTAIN).** \"Pertuzumab plus trastuzumab plus an aromatase inhibitor as first-line therapy in HR+/HER2+ metastatic breast cancer: final analysis.\" *Clin Cancer Res.* 2023."],"length_bias_flag":"NONE"},{"id":"149","section":"Metastatic","question":"A 58-year-old woman with HR+/HER2+ metastatic breast cancer received first-line trastuzumab + pertuzumab + docetaxel for liver and bone metastases. She achieved a partial response lasting 14 months and now has radiographic progression in the liver. Clinical details: ECOG 1, no CNA metastasis, LVEF 58%, mild residual grade 1 neuropathy. Pulmonary function: normal. What is the most appropriate second-line therapy?","options":{"A":"Trastuzumab emtansine T-DM1 used to be the standard second-line option, but it has been displaced by T-DXd based on DESTINY-Breast03.","B":"Tucatinib + trastuzumab + capecitabine This is an excellent later-line regimen and especially attractive with brain metastases, but in a patient without CNS disease the preferred second-line therapy remains T-DXd.","C":"Trastuzumab deruxtecan (T-DXd), as the preferred second-line HER2-directed therapy after progression on trastuzumab, pertuzumab, and taxane, based on DESTINY-Breast03","D":"Trastuzumab + endocrine therapy This is not appropriate here because she has visceral progression in the liver after HER2-directed first-line therapy and should receive the standard next HER2-targeted systemic therapy with the strongest efficacy data.","E":"Trastuzumab + lapatinib This is an older regimen with less efficacy than modern HER2-directed options and is not a preferred second-line choice."},"correct_answer":"C","short_rationale":"After first-line trastuzumab + pertuzumab + taxane, T-DXd is the preferred second-line standard for HER2-positive metastatic breast cancer. ESMO\u2019s current living guideline lists T-DXd as the preferred second-line therapy, and DESTINY-Breast03 showed it was superior to T-DM1 with major improvements in progression-free survival and later overall survival. In this stem there is no brain metastasis, LVEF is preserved, and pulmonary function is normal, so there is no feature pushing tucatinib ahead of T-DXd.","why_other_options_are_wrong":"A. Trastuzumab emtansine\nT-DM1 used to be the standard second-line option, but it has been displaced by T-DXd based on DESTINY-Breast03.\n\nB. Tucatinib + trastuzumab + capecitabine\nThis is an excellent later-line regimen and especially attractive with brain metastases, but in a patient without CNS disease the preferred second-line therapy remains T-DXd.\n\nD. Trastuzumab + endocrine therapy\nThis is not appropriate here because she has visceral progression in the liver after HER2-directed first-line therapy and should receive the standard next HER2-targeted systemic therapy with the strongest efficacy data.\n\nE. Trastuzumab + lapatinib\nThis is an older regimen with less efficacy than modern HER2-directed options and is not a preferred second-line choice.","evidence":"The question is good overall. \u201cNo CNA metastasis\u201d is likely a typo and should probably read \u201cno CNS metastasis\u201d; that matters because CNS involvement would make option C more tempting. As written, the intended best answer is still clear.\n\nEvidence\n\nStrong. This is a high-evidence, guideline-aligned question with a clear modern standard based on a phase III trial plus current ESMO guidance.\n\nPlausibility of distractors\n\nA is the best distractor because it was the historic second-line standard.\nC is also plausible, especially if the author meant CNS disease, but it is not the best answer in a patient without brain metastases.\nD and E are weak distractors for an expert-level question.","references":["Cort\u00e9s J, et al. Trastuzumab deruxtecan versus trastuzumab emtansine in HER2-positive metastatic breast cancer. N Engl J Med. 2022. Phase III evidence supporting T-DXd over T-DM1.","Hurvitz SA, et al. Updated results from DESTINY-Breast03. Lancet. 2023, with long-term survival analysis in 2024 confirming OS benefit and reinforcing T-DXd as second-line standard.","ESMO Living Guideline for metastatic breast cancer, HER2-positive disease, 2025. T-DXd is the preferred second-line therapy after trastuzumab/pertuzumab/taxane.","Lin NU, et al. HER2CLIMB updated analysis. JAMA Oncol. 2023. Tucatinib/trastuzumab/capecitabine has major value, particularly for patients with brain metastases, but is not the default second-line choice in this stem.","Strength of recommendation: very high"],"length_bias_flag":"NONE"},{"id":"150","section":"Metastatic","question":"A 49-year-old premenopausal woman was diagnosed with stage IIIB HR+/HER2+ breast cancer. She received neoadjuvant TCHP, residual disease at surgery, adjuvant T-DM1 for 14 cycles. 8 months after completing adjuvant T-DM1, she develops multiple liver metastases and bone lesions. Liver metastasis biopsy revealed: ER 80%, PR 10% HER2 IHC 3+ What is the most appropriate first-line treatment for metastatic disease?","options":{"A":"Trastuzuman emtansine","B":"Trastuzumab + pertuzumab + taxane","C":"Trastuzumab + pertuzumab + endocrine therapy","D":"Dapotomab deruxtecan","E":"Trastuzumab deruxtecan (T-DXd)"},"correct_answer":"E","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nHigh. DESTINY-Breast03 is a phase III trial, and current guideline/approval evolution strongly supports T-DXd-based sequencing in HER2-positive metastatic disease.","references":["Hurvitz SA, et al. DESTINY-Breast03. Lancet 2023 updated results. T-DXd was superior to T-DM1 in previously treated HER2-positive metastatic breast cancer."],"length_bias_flag":"NONE"},{"id":"151","section":"Metastatic","question":"A 48-year-old premenopausal woman with HR+/HER2+ metastatic breast cancer is receiving trastuzumab deruxtecan (T-DXd) as second-line therapy after prior trastuzumab/pertuzumab + taxane. She achieved a partial response lasting 11 months. Current restaging shows two enlarging liver lesions (2.1 cm and 2.4 cm), all other prior liver lesions decreased or stable. Stable bone disease. No new lesions. No CNS metastases. No ILD. ECOG 0\\. LVEF 60%. CA 15-3 stable. What is the most appropriate nexgt management step?","options":{"A":"Discontinue T-DXd and switch to tucatinib, trastuzumab, and capecitabine This is the strongest distractor because tucatinib, trastuzumab, and capecitabine is an established later-line HER2-positive regimen and is generally viewed as a preferred third-line option after T-DXd, but this patient has only two progressive lesions with otherwise controlled disease, so switching systemic therapy now is premature.","B":"Continue T-DXd unchanged and repeat imaging in six weeks to rule out pseudoprogression This imaging pattern already fits oligoprogression, and pseudoprogression is not an established management construct for T-DXd in metastatic breast cancer, so passive observation is weaker than ablating the two escaping lesions.","C":"Add capecitabine to ongoing T-DXd This is not a validated or guideline-based intensification strategy; the evidence-based regimens are T-DXd as its own line or tucatinib plus trastuzumab plus capecitabine as a separate next-line regimen.","D":"Discontinue T-DXd and start CDK4/6 inhibitor plus aromatase inhibitor plus trastuzumab CDK4/6-based therapy in HR+/HER2+ disease is not the standard salvage approach here; the strongest evidence, including PATINA, is for first-line maintenance after induction therapy, not for post-T-DXd oligoprogression.","E":"Continue T-DXd and add SBRT to the two oligoprogressive liver lesions as local ablation rather than declaring systemic failure, because isolated progression of two lesions with otherwise stable disease represents oligoprogression, and metastasis-directed therapy can prolong the benefit of an otherwise effective systemic regimen without premature switch to the next treatment line"},"correct_answer":"E","short_rationale":"This is a classic oligoprogression pattern, not generalized systemic failure: only two liver lesions are growing while the rest of the liver disease and bone disease remain controlled on T-DXd, with ECOG 0, preserved LVEF, and no ILD. In this situation, a reasonable expert strategy is to preserve an otherwise effective HER2-directed therapy and treat the escaping lesions with local ablative therapy. Reviews of HER2-positive metastatic breast cancer specifically note that continuing systemic therapy and adding local ablative therapy to oligoprogressive lesions is often considered, and breast-cancer cohorts of metastasis-directed RT/SBRT have shown that this can delay the next systemic line.\n\nThe evidence is not phase III and not T-DXd-specific, so this is an expert-management answer rather than a hard guideline mandate. Still, in the largest reported breast-cancer cohort of extracranial oligoprogression treated with SBRT while maintaining the same systemic therapy, median post-RT PFS was 11.3 months and median time to next systemic therapy was 13.6 months. Separate retrospective data also suggest that RT given with or near T-DXd is feasible and generally well tolerated, though lung dose and ILD vigilance remain important.","why_other_options_are_wrong":"A. Discontinue T-DXd and switch to tucatinib, trastuzumab, and capecitabine\nThis is the strongest distractor because tucatinib, trastuzumab, and capecitabine is an established later-line HER2-positive regimen and is generally viewed as a preferred third-line option after T-DXd, but this patient has only two progressive lesions with otherwise controlled disease, so switching systemic therapy now is premature.\n\nB. Continue T-DXd unchanged and repeat imaging in six weeks to rule out pseudoprogression\nThis imaging pattern already fits oligoprogression, and pseudoprogression is not an established management construct for T-DXd in metastatic breast cancer, so passive observation is weaker than ablating the two escaping lesions.\n\nC. Add capecitabine to ongoing T-DXd\nThis is not a validated or guideline-based intensification strategy; the evidence-based regimens are T-DXd as its own line or tucatinib plus trastuzumab plus capecitabine as a separate next-line regimen.\n\nD. Discontinue T-DXd and start CDK4/6 inhibitor plus aromatase inhibitor plus trastuzumab\nCDK4/6-based therapy in HR+/HER2+ disease is not the standard salvage approach here; the strongest evidence, including PATINA, is for first-line maintenance after induction therapy, not for post-T-DXd oligoprogression.","evidence":"Good expert-level question. The stem correctly signals oligoprogression by showing only two enlarging lesions with all other disease stable or responding. The only small flaw is that \u201cnexgt\u201d is a typo, and the item would be even cleaner if it explicitly said the lesions were technically suitable for SBRT or ablation by multidisciplinary review.\n\nEvidence\n\nModerate. The logic for B is strong and clinically very plausible, but the supporting evidence is mostly retrospective, prospective-retrospective, or single-arm rather than randomized HER2-positive, post-T-DXd phase III evidence.\n\nPlausibility of distractors\n\nC is the best distractor because it is the standard systemic next step once T-DXd is truly failing.\nA is somewhat plausible but weaker, because waiting for \u201cpseudoprogression\u201d is not a standard T-DXd strategy in this setting.\nD and E are relatively weak for an expert question.","references":["Milano M, Valenza C, Ferrari A, et al. Metastasis-directed stereotactic radiotherapy and systemic treatment continuation for patients with oligoprogressive metastatic breast cancer. Eur J Cancer. 2025;215:115164. Supports SBRT to oligoprogressive sites while maintaining the same systemic therapy.","LeVee A, Young H, Yoon S, et al. Efficacy of metastasis-directed radiation therapy to prolong systemic therapy for patients with oligoprogressive metastatic breast cancer. Cancers (Basel). 2025;17:2153. Retrospective cohort showing many patients remained on the same therapy for at least 6 months after MDRT.","Marra A, et al. Management of advanced-stage HER2+ breast cancer. 2024 review. Notes that adding local ablative therapy while continuing systemic therapy is often considered for oligoprogressive lesions.","Curigliano G, Mueller V, Borges V, et al. Tucatinib versus placebo added to trastuzumab and capecitabine for patients with pretreated HER2-positive metastatic breast cancer with and without brain metastases. Ann Oncol. 2022;33:321-329. Establishes tucatinib, trastuzumab, capecitabine as a key later-line regimen, but not necessarily the best move in isolated oligoprogression.","Hurvitz SA, et al. DESTINY-Breast03 updated analyses. Confirms T-DXd as a major standard HER2-positive line of therapy and frames option E as unsupported intensification rather than an established regimen.","Metzger O, et al. PATINA. Supports palbociclib plus anti-HER2 plus endocrine therapy as first-line maintenance in HR+/HER2+ metastatic disease, not as salvage after T-DXd progression.","Debbi K, et al. Safety and efficacy of combined trastuzumab-deruxtecan and concurrent radiation therapy in breast cancer. Breast. 2025.","Visani L, et al. Concomitant administration of T-DXd and RT appears feasible and well tolerated. 2026 multicentre cohort. These support the practical feasibility of local RT while continuing T-DXd.","Evidence grade","Best answer certainty: moderate.","Clinical plausibility: high."],"length_bias_flag":"NONE"},{"id":"152","section":"Metastatic","question":"A 49-year-old woman with HR+/HER2+ metastatic breast cancer received: neoadjuvant TCHP (carboplatin+paclitaxel+trastuzumab+pertuzumab), residual disease at surgery. Adjuvant 14 cycles of Trastuzumab emtansine (T-DM1). Progression 13 month later, so started first-line metastatic: trastuzumab + pertuzumab + taxane, progression after 8 month, second-line metastatic: trastuzumab deruxtecan (T-DXd). After 11 months of response on T-DXd, she developed oligoprogressive liver metastases treated with SBRT. T-DXd was continued.Three months later, imaging showed progressive mediastinal and retroperitoneal lymph node metastases, the other metastases were stable. Biopsy of a progressing lymph node confirms ER 70%, PR 40%, HER2 IHC 3+. What is the most appropriate next management?","options":{"A":"Switch to tucatinib + trastuzumab + capecitabine","B":"Continue T-DXd and add endocrine therapy + CDK4/6 inhibitor","C":"Continue T-DXd and administer radiation therapy to the involved lymph nodes","D":"switch to Trastuzumab Emtansin","E":"Switch to margetuximab + chemotherapy"},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nHigh for tucatinib + trastuzumab + capecitabine as an effective later-line HER2-positive metastatic regimen, based on phase III HER2CLIMB; moderate for the exact post-T-DXd sequence, supported by strong retrospective real-world data and current guideline positioning.","references":["Murthy RK, et al. HER2CLIMB. N Engl J Med. 2020. Tucatinib + trastuzumab + capecitabine improved PFS and OS in previously treated HER2-positive metastatic breast cancer."],"length_bias_flag":"NONE"},{"id":"153","section":"Metastatic","question":"A 34-year-old woman presents with inflammatory changes of the right breast. Clinical staging: cT4b cN3a, skin edema and ulceration, fixed ipsilateral supraclavicular lymph node. Core biopsy (open biopsy from breast mass): invasive NST, ER 0%, PR 0%, HER2 0 (IHC 0), grade 3. Axillary lymph node biopsy: Invasive carcinoma, ER 0%, PR 0%, HER2 IHC 1+ Staging CT and bone scan: No distant metastases. ECOG 0. What is the most appropriate initial systemic treatment?","options":{"A":"Neoadjuvant dose-dense EC followed by carboplatin/paclitaxel plus pembrolizumab, as this is biopsy-proven node-positive stage III TNBC eligible for perioperative chemo-immunotherapy per KEYNOTE-522","B":"Neoadjuvant trastuzumab deruxtecan as primary systemic therapy T-DXd is not a standard neoadjuvant treatment for HER2-negative early breast cancer, and this patient is not HER2-positive.","C":"Immediate modified radical mastectomy followed by adjuvant chemotherapy Inflammatory breast cancer should start with neoadjuvant systemic therapy as part of trimodality treatment, not immediate surgery.","D":"Neoadjuvant dose-dense AC followed by paclitaxel without immunotherapy This omits pembrolizumab, which is now part of the standard perioperative regimen for high-risk stage II/III TNBC.","E":"Neoadjuvant trastuzumab + pertuzumab + taxane for HER2-targeted therapy HER2 IHC 0 in the breast and IHC 1+ in the node still fall under HER2-negative disease, so HER2-directed neoadjuvant therapy is not indicated."},"correct_answer":"A","short_rationale":"This is nonmetastatic, locally advanced triple-negative inflammatory breast cancer, so the correct initial strategy is neoadjuvant systemic therapy, not upfront surgery. Current stage II/III TNBC standards support pembrolizumab with neoadjuvant chemotherapy followed by adjuvant pembrolizumab, and inflammatory breast cancer is managed with trimodality therapy built around neoadjuvant systemic treatment, then mastectomy, then radiotherapy.\n\nThe HER2 discordance does not make this HER2-positive disease. By ASCO/CAP, HER2-positive breast cancer is IHC 3+ or ISH-amplified; IHC 1+ remains HER2-negative for protein overexpression/gene amplification, so anti-HER2 regimens such as trastuzumab/pertuzumab are not indicated here.\n\nImportant item-writing caveat: A is the best available and clearly intended answer, but it is not perfectly written. The KEYNOTE-522 backbone was paclitaxel/carboplatin plus pembrolizumab followed by AC or EC plus pembrolizumab, with adjuvant pembrolizumab after surgery. So the option gets the class of treatment right, but not the standard sequence or full perioperative pembrolizumab wording.","why_other_options_are_wrong":"B. Neoadjuvant dose-dense AC followed by paclitaxel without immunotherapy\nThis omits pembrolizumab, which is now part of the standard perioperative regimen for high-risk stage II/III TNBC.\n\nC. Neoadjuvant trastuzumab deruxtecan as primary systemic therapy\nT-DXd is not a standard neoadjuvant treatment for HER2-negative early breast cancer, and this patient is not HER2-positive.\n\nD. Neoadjuvant trastuzumab + pertuzumab + taxane for HER2-targeted therapy\nHER2 IHC 0 in the breast and IHC 1+ in the node still fall under HER2-negative disease, so HER2-directed neoadjuvant therapy is not indicated.\n\nE. Immediate modified radical mastectomy followed by adjuvant chemotherapy\nInflammatory breast cancer should start with neoadjuvant systemic therapy as part of trimodality treatment, not immediate surgery.","evidence":"Good concept, but the stem has two important technical flaws. True inflammatory breast cancer should be staged cT4d rather than cT4b, and an ipsilateral supraclavicular node is cN3c rather than cN3a. Those staging inconsistencies should be corrected.\n\nThere is also a treatment-wording flaw: none of the options exactly matches the standard KEYNOTE-522-style perioperative regimen, because A reverses the classic sequence and does not explicitly state pembrolizumab continuation after surgery. Still, A is clearly the intended best answer.\n\nEvidence\n\nStrong for the overall treatment principle. Pembrolizumab plus neoadjuvant chemotherapy followed by adjuvant pembrolizumab improved event-free survival and overall survival in stage II/III TNBC, and ASCO recommends this approach for high-risk early TNBC. Evidence specific to inflammatory breast cancer is more extrapolative, but the multimodality framework is standard.\n\nPlausibility of distractors\n\nB is the strongest distractor because it reflects the pre-immunotherapy neoadjuvant TNBC standard.\nD is a useful biologic trap, but only if the reader mistakenly treats HER2 1+ as HER2-positive.\nE is weak for an expert audience because inflammatory breast cancer is classically treated with neoadjuvant therapy first.","references":["Schmid P, et al. Pembrolizumab for Early Triple-Negative Breast Cancer. N Engl J Med. 2020. Phase III KEYNOTE-522 regimen and pCR data.","Schmid P, et al. Event-free Survival with Pembrolizumab in Early Triple-Negative Breast Cancer. N Engl J Med. 2022. Phase III EFS benefit.","Schmid P, et al. Overall Survival with Pembrolizumab in Early-Stage Triple-Negative Breast Cancer. N Engl J Med. 2024. OS benefit confirming perioperative pembrolizumab as standard.","Korde LA, et al. ASCO Guideline Rapid Recommendation Update on pembrolizumab in high-risk early-stage TNBC. J Clin Oncol. 2022. Recommends pembrolizumab with neoadjuvant chemotherapy followed by adjuvant pembrolizumab for stage II/III TNBC.","Wolff AC, et al. Human Epidermal Growth Factor Receptor 2 Testing in Breast Cancer: ASCO/CAP Guideline Update. J Clin Oncol. 2023. Confirms IHC 1+ is HER2-negative for overexpression/amplification; HER2-positive remains IHC 3+ or ISH-amplified.","Ueno NT, et al. International Consensus on the Clinical Management of Inflammatory Breast Cancer. J Cancer. 2018. Supports neoadjuvant systemic therapy, mastectomy, and radiotherapy as standard IBC management.","Dawood S, et al. International expert panel on inflammatory breast cancer: consensus statement for standardized diagnosis and treatment. Ann Oncol. 2011. Classic trimodality IBC standard.","Evidence grade","Best-answer certainty: high, but with item-writing imperfections."],"length_bias_flag":"NONE"},{"id":"154","section":"Metastatic","question":"A 34-year-old woman with cT4b cN3a G3 triple-negative breast cancer (ER 0%, PR 0%, HER2 0 in breast; HER2 1+ in axillary node) began neoadjuvant therapy with: dose-dense 4 cycles of Epirubicin + cyclophosphamide (EC) in combination pembrolizumab. After 3 cycles, clinical examination and imaging show: enlargement of the primary breast mass, increased skin involvement, enlarged supraclavicular lymph nodes, no distant metastases on staging. ECOG 0\\. What is the most appropriate next step?","options":{"A":"Switch to carboplatin + paclitaxel + pembrolizumab","B":"Initiate trastuzumab deruxtecan due to HER2 1+ in the lymph node","C":"Continue EC + pembrolizumab for 1\u20132 additional cycles and reassess","D":"Proceed immediately to modified radical mastectomy","E":"Switch to sacituzumab govitecan"},"correct_answer":"A","short_rationale":"Rationale:\nThis is true progression during neoadjuvant therapy, not just poor response. In general, guidelines say progression on NAC should trigger a change in plan rather than \u201cmore of the same.\u201d AGO states that in case of disease progression, NACT should be stopped and the patient should proceed to surgery or radiotherapy; for \u201cno change,\u201d a non\u2013cross-resistant switch can be considered.\n\nWhy D is still the best answer among these choices:\nThe stem suggests worsening skin disease and supraclavicular nodal progression, which makes immediate surgery less attractive and may mean the disease is not optimally operable right now. Among the listed options, the most rational next step is to stop EC and move immediately to the non\u2013cross-resistant carboplatin/paclitaxel + pembrolizumab part of the TNBC regimen. This is the only option that both changes ineffective therapy and still uses an evidence-based TNBC backbone. KEYNOTE-522 used pembrolizumab with carboplatin/taxane regardless of PD-L1 status in stage II\u2013III TNBC.\n\nWhy the others are wrong:\nC: Wrong because she is progressing on EC+pembrolizumab; continuing it is not appropriate.\nD: Not the best answer here because the stem suggests worsening skin and supraclavicular disease, making immediate modified radical mastectomy a poor fit; surgery is preferred only if the disease is operable.\nE: Wrong because sacituzumab govitecan is not standard curative-intent neoadjuvant salvage therapy in nonmetastatic TNBC.\nA: Correct, best among the options because it promptly switches to a non\u2013cross-resistant, guideline-based TNBC regimen.\nB: Wrong because T-DXd is not indicated here; HER2-low in one node does not convert this stage III TNBC case into a neoadjuvant T-DXd indication.\n\nImportant caveat:\nThis question is a bit messy. If the patient were clearly operable despite progression, guideline logic would support stopping NAC and taking her to surgery promptly. But with worsening skin involvement and supraclavicular nodal progression, D is the best available answer from the list.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. High for the KEYNOTE-522 carboplatin/taxane+pembrolizumab backbone in stage II\u2013III TNBC, but only lower-level consensus supports the exact mid-course switch strategy after progression on EC.","references":["AGO Breast Committee. Neoadjuvant Systemic Therapy 2024. In disease progression: stop NACT and proceed to surgery or radiotherapy; for no change, non\u2013cross-resistant continuation can be considered."],"length_bias_flag":"NONE"},{"id":"155","section":"Metastatic","question":"A 34-year-old woman with cT4b cN3a G3 triple-negative breast cancer (ER 0%, PR 0%, HER2 0 in breast; HER2 1+ in axillary node) began neoadjuvant therapy with epirubicin + cyclophosphamide + pembrolizumab. After clinical progression, she was switched to: Carboplatin + paclitaxel + pembrolizumab. After 3 cycles of this regimen, she again demonstrates: further enlargement of the breast mass, persistent inflammatory skin changes, progressive supraclavicular lymphadenopathy but no distant metastases on repeat staging. ECOG 0\\. What is the most appropriate next step?","options":{"A":"Switch to sacituzumab govitecan in an attempt to achieve tumor shrinkage prior to definitive surgical intervention","B":"Continue pembrolizumab monotherapy while expediting surgery scheduling for definitive locoregional control","C":"Enroll in a clinical trial of neoadjuvant antibody\u2013drug conjugate therapy as an alternative systemic approach","D":"Proceed to urgent modified radical mastectomy with axillary dissection followed by comprehensive radiation","E":"Switch to cisplatin monotherapy due to suspected platinum sensitivity in young triple-negative breast cancer"},"correct_answer":"D","short_rationale":"Rationale:\nThis is true progression through both standard neoadjuvant TNBC backbones. Current guidance is to stop ineffective neoadjuvant systemic therapy and proceed to definitive locoregional treatment, meaning surgery if operable, or radiotherapy if not. Among the listed options, urgent modified radical mastectomy with axillary dissection followed by comprehensive radiation is the best fit.\n\nWhy the others are wrong:\nA: Sacituzumab govitecan is not standard curative-intent neoadjuvant salvage therapy for nonmetastatic TNBC.\nB: Pembrolizumab monotherapy is not an evidence-based bridging strategy after frank progression on chemo-immunotherapy.\nD: Correct, because after progression during neoadjuvant therapy the priority is definitive local control if feasible.\nE: Cisplatin monotherapy is not a guideline-based salvage standard here after progression on platinum/taxane-containing therapy.\nC: A clinical trial is reasonable in principle, but not the best answer when the disease is progressing locally and standard practice is to move to definitive locoregional treatment rather than more preoperative experimental systemic therapy.\n\nImportant caveat:\nIf the disease is truly unresectable at this point, the guideline-consistent alternative is urgent radiotherapy rather than more ineffective systemic therapy. That nuance is not well represented in the answer choices.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. This is based mainly on guideline consensus and retrospective outcome data for progression during neoadjuvant therapy, not randomized trials.","references":["AGO Breast Committee. Neoadjuvant Systemic Therapy 2024. In case of disease progression: stop NACT and proceed to surgery or radiotherapy."],"length_bias_flag":"MODERATE"},{"id":"156","section":"Metastatic","question":"A 34-year-old woman with cT4b cN3a G3 triple-negative breast cancer completed neoadjuvant pembrolizumab plus sequential EC followed by carboplatin plus paclitaxel. She underwent modified radical mastectomy with axillary dissection. Pathology shows: ypT3 ypN3a (9/20 positive lymph nodes), L1 V0 Pn0 R1 (lymphangiosis at medial and dorsal margins), ER 0%, PR 0%, HER2 0. Three weeks postoperatively, staging CT reveals new progressive infraclavicular lymph node metastases not present on preoperative imaging. No distant metastases are identified. Germline BRCA testing is pending. What is the most appropriate next management strategy?","options":{"A":"Palliative systemic therapy only, as postoperative locoregional progression after neoadjuvant chemo-immunotherapy indicates no curative-intent options remain.","B":"Adjuvant pembrolizumab monotherapy to complete one year per KEYNOTE-522 protocol, with chest wall radiation to follow after immunotherapy completion.","C":"Adjuvant capecitabine for 6\u20138 cycles followed by chest wall radiation, applying CREATE-X data for residual triple-negative disease after neoadjuvant chemotherapy.","D":"Curative-intent radiation to the chest wall and regional nodes with systemic therapy individualised to tumour biology, prior treatment exposure, and pending germline BRCA results.","E":"Chest wall and regional nodal radiation alone without additional systemic therapy, followed by close surveillance with imaging every three months."},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"B \u2014 Capecitabine followed by radiation. CREATE-X established capecitabine for patients with stable residual TNBC after neoadjuvant therapy. This patient has actively progressing disease after exposure to four cytotoxic agents plus immunotherapy \u2014 a fundamentally different scenario. AGO 2025 grades capecitabine after prior platinum plus pembrolizumab as very low-level evidence. This option also delays radiation while administering a systemic agent with questionable efficacy against platinum- and taxane-refractory disease, when the progressive infraclavicular nodes require urgent local control.\n\nC \u2014 Pembrolizumab monotherapy per KEYNOTE-522. This patient's disease progressed through pembrolizumab-containing neoadjuvant therapy, demonstrating primary checkpoint inhibitor resistance. Continuing pembrolizumab as the sole systemic strategy without additional active agents is unlikely to control actively progressive disease. KEYNOTE-522 adjuvant pembrolizumab was designed for patients with stable residual disease, not documented postoperative progression. Pembrolizumab may still have a role within a multimodal strategy, but not as monotherapy in this context.\n\nD \u2014 Palliative intent only. This is overly nihilistic. The patient has locoregional disease without distant metastases (cM0). The CALOR trial demonstrated that systemic chemotherapy improves disease-free survival in ER-negative isolated locoregional recurrence, supporting curative-intent treatment. AGO and ESMO guidelines recognise that curative-intent multimodal therapy is appropriate for locoregionally confined disease even after prior systemic therapy. Her young age, absence of distant metastases, and otherwise recoverable performance status all favour aggressive management.\n\nE \u2014 Radiation alone without systemic therapy. Radiation addresses local disease but ignores systemic risk. This patient has highly aggressive biology (grade 3 TNBC, lymphovascular invasion, 9/20 positive nodes, R1 margins) with demonstrated treatment resistance and active postoperative progression. CALOR trial data support adding systemic therapy to local treatment for ER-negative locoregional recurrence. The specific systemic agent should be individualised, but omitting systemic therapy entirely is not defensible in this clinical context.\nLevel of evidence: Moderate. No randomised trial directly addresses postoperative locoregional progression after neoadjuvant chemo-immunotherapy in TNBC. The recommendation is based on CALOR data, AGO locoregional recurrence guidelines, and expert consensus on curative-intent multimodal management of cM0 disease.","evidence":"Level of evidence: Moderate. No randomised trial directly addresses postoperative locoregional progression after neoadjuvant chemo-immunotherapy in TNBC. The recommendation is based on CALOR data, AGO locoregional recurrence guidelines, and expert consensus on curative-intent multimodal management of cM0 disease.","references":["Not stated explicitly in the source draft.","AGO Breast Committee 2025. Locoregional recurrence guideline \u2014 curative-intent radiation plus individualised systemic therapy for unresectable cM0 locoregional progression.","Wapnir IL et al. (CALOR). J Clin Oncol. 2018;36(11):1073\u20131079.","Schmid P et al. (KEYNOTE-522). N Engl J Med. 2024;391:1981\u20131991.","Masuda N et al. (CREATE-X). N Engl J Med. 2017;376:2147\u20132159.","Loibl S et al. \"ESMO Clinical Practice Guideline: Early Breast Cancer.\" Ann Oncol. 2024;35(2):159\u2013182.","Tutt ANJ et al. (OlympiA). N Engl J Med. 2021;384:2394\u20132405."],"length_bias_flag":"MILD"},{"id":"157","section":"Metastatic","question":"A 34-year-old woman with metastatic triple-negative breast cancer had the following treatment history: neoadjuvant anthracycline + platinum + taxane + pembrolizumab (primary refractory), followed by surgery and radiation. Metastatic nodal relapse after 10 months so started by sacituzumab govitecan (SG), under SG disease controlled for 8 months. She now presents with progressive contralateral axillary and paraaortic lymph node metastases. Biopsy of a contralateral axilarry node reveals: ER 0%, PR 0% HER2 IHC 0 with faint, incomplete membrane staining in \\<10% of tumor cells, ISH negative. A second pathology review confirms HER2 ultra-low, not meeting formal HER2-low (1+) criteria. Comprehensive NGS shows no actionable alterations. Germline BRCA testing is negative.ECOG 0.What is the most appropriate next systemic treatment?","options":{"A":"Start eribulin as next-line standard chemotherapy for pretreated metastatic breast cancer","B":"Initiate trastuzumab deruxtecan given emerging data in HER2 ultra-low disease","C":"Repeat HER2 testing at a third reference laboratory to attempt reclassification as HER2-low","D":"Rechallenge with sacituzumab govitecan given prior durable disease control","E":"Enroll in a clinical trial evaluating next-generation antibody\u2013drug conjugates"},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate. High that T-DXd ultralow approval is HR-positive only and not TNBC; moderate for the exact post-SG sequence, where standard practice falls back to single-agent chemotherapy and trial enrollment is encouraged.","references":["FDA approval notice for trastuzumab deruxtecan in unresectable or metastatic HR-positive HER2-low or HER2-ultralow breast cancer, January 2025. HER2-ultralow approval is HR-positive only."],"length_bias_flag":"NONE"},{"id":"158","section":"Metastatic","question":"A 49-year-old patient with metastatic triple-negative breast cancer (TNBC) is receiving sacituzumab govitecan (SG) in second line. She previously had anthracycline/taxane-based chemotherapy and PD-L1-negative disease. After 6 months of systemic disease control on SG, restaging imaging shows isolated progressive enlargement of ipsilateral subclavian lymph node metastases (SUV increase and short-axis growth from 14 mm to 24 mm). No new distant metastases are detected. The patient is asymptomatic, ECOG 0\\. What is the most appropriate management strategy?","options":{"A":"Discontinue SG and switch to eribulin due to RECIST 1.1 progression, as continuation of antibody\u2013drug conjugate therapy beyond radiologic progression is not evidence-based in metastatic TNBC.","B":"Continue SG without local therapy, as nodal enlargement under antibody\u2013drug conjugate therapy may represent immune-cell infiltration or pseudoprogression rather than true disease progression.","C":"Continue SG and add locoregional radiotherapy to the progressive subclavian lymph node basin as an ablative approach for oligoprogressive disease, aiming to prolong systemic disease control.","D":"Switch to platinum-based chemotherapy combined with concurrent radiotherapy to enhance radiosensitization in this biologically aggressive TNBC with isolated nodal progression under current therapy.","E":"Interrupt SG and administer definitive-dose radiotherapy to the supraclavicular region, followed by re-staging and reassessment of systemic therapy options prior to resuming sacituzumab govitecan."},"correct_answer":"C","short_rationale":"Rationale:\nThis is oligoprogression: isolated nodal progression while the rest of the disease remains controlled on sacituzumab govitecan. In metastatic breast cancer, the most evidence-based strategy in this setting is local ablative treatment of the progressing site while maintaining the otherwise effective systemic therapy, with the goal of delaying time to the next systemic line. Retrospective breast cancer series in 2025 showed that metastasis-directed radiotherapy for oligoprogressive disease allowed many patients to remain on the same systemic treatment for at least 6 months, and reviews of oligoprogression support this approach in selected patients. Sacituzumab govitecan with radiotherapy also appears feasible without a clear signal of excess toxicity in small retrospective cohorts.\n\nWhy the others are wrong:\nA: Wrong because isolated oligoprogression does not automatically require abandoning an otherwise effective ADC. Local ablative therapy can be used to prolong benefit from the same systemic treatment.\n\nB: Wrong because simple observation is not appropriate here. This is metabolically and morphologically progressive nodal disease, and the evidence for oligoprogression management favors local ablation rather than watchful waiting.\n\nE: Close in spirit, but less good than B. The key evidence-based principle is to treat the oligoprogressive site locally while maintaining the same active systemic therapy, not to stop SG and reassess as if this were generalized progression.\n\nD: Wrong because there is no evidence-based role for switching to platinum plus concurrent radiotherapy for isolated nodal oligoprogression under SG. That would be overtreatment and abandons an otherwise active drug too early.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate-low. The principle of local treatment plus continuation of effective systemic therapy in oligoprogressive breast cancer is supported mainly by retrospective cohorts and phase II or mixed-histology data, not by a definitive randomized breast-cancer-specific trial. The SG-plus-RT safety data are also retrospective and small.","references":["Milano M, et al. Metastasis-directed stereotactic radiotherapy and systemic treatment continuation for patients with oligoprogressive metastatic breast cancer. Eur J Cancer. 2025. Radiotherapy to oligoprogressive sites is used to prolong time to next systemic treatment."],"length_bias_flag":"NONE"},{"id":"159","section":"Metastatic","question":"A 46-year-old woman with metastatic triple-negative breast cancer (PD-L1 CPS 15\\) was treated with first-line paclitaxel + pembrolizumab,partial response and second- line sacituzumab govitecan. After 11 months on sacituzumab, she develops progressive headaches, diplopia, and nausea. MRI brain reveals 14 supratentorial and infratentorial metastases (largest 2.2 cm), diffuse linear leptomeningeal enhancement along basilar cisterns and nodular deposits in the cauda equina. CSF cytology: positive for malignant cells. Spine MRI: multifocal nodular leptomeningeal disease. CT: stable extracranial disease. ECOG 1\\. Which of the following is the most appropriate next step?","options":{"A":"Oral dexamethasone for symptom management, whole-brain radiotherapy (WBRT) for diffuse parenchymal and leptomeningeal disease, followed by intrathecal methotrexate given positive CSF cytology and linear leptomeningeal enhancement","B":"Oral dexamethasone followed by capecitabine as next-line systemic therapy; however, systemic chemotherapy alone is not the best immediate next step for symptomatic multifocal brain metastases with cytology-proven leptomeningeal disease requiring urgent local CNS-directed treatment.","C":"Stereotactic radiosurgery (SRS) to all parenchymal metastases plus continuation of sacituzumab govitecan; however, this is not appropriate for diffuse symptomatic disease with 14 brain metastases plus linear leptomeningeal enhancement and nodular cauda equina deposits requiring whole-brain treatment.","D":"Oral dexamethasone and whole-brain radiotherapy (WBRT) alone; this is reasonable for the parenchymal disease but is now incomplete, because her positive CSF cytology plus diffuse linear leptomeningeal enhancement are exactly the features for which guidelines recommend considering intrathecal therapy.","E":"Intrathecal methotrexate therapy alone without prior whole-brain radiotherapy; this does not address the 14 symptomatic parenchymal brain metastases and diffuse intracranial burden that make WBRT a necessary component of the initial management strategy."},"correct_answer":"A","short_rationale":"The immediate priorities are still dexamethasone plus WBRT because she has symptomatic, diffuse CNS disease with 14 brain metastases and leptomeningeal involvement. But unlike a pure nodular-only case, this stem also gives positive CSF cytology and diffuse linear leptomeningeal enhancement. EANO\u2013ESMO says intrathecal therapy should be considered when tumor cells are present in the CSF or when there is linear LM, and the SNO/ASCO consensus review similarly states that intrathecal therapy is generally most effective for thin linear LM with unobstructed CSF flow.\n\nSo the nodular cauda equina deposits make intrathecal methotrexate less attractive, but they do not negate the rest of the presentation. Because she has mixed linear plus nodular LM and positive CSF cytology, adding intra-CSF therapy after WBRT is reasonable. That makes A stronger than C among the choices provided.\n\nThe important caveat is that the evidence supports the concept of intra-CSF therapy more strongly than methotrexate specifically. Historical trials of untargeted intrathecal agents such as methotrexate showed modest outcomes, with median survival around 2 to 4 months in older studies, and the classic randomized breast-cancer trial did not show clear benefit for intraventricular chemotherapy over non-intrathecal treatment. By contrast, the randomized DEPOSEIN trial showed improved LM-related PFS when intra-CSF liposomal cytarabine was added to systemic therapy in newly diagnosed breast-cancer LM.","why_other_options_are_wrong":"B. SRS to all lesions plus continuation of sacituzumab govitecan\nThis is not appropriate for diffuse symptomatic parenchymal metastases plus leptomeningeal disease.\n\nC. Dexamethasone plus WBRT\nReasonable, but now incomplete, because her positive CSF cytology plus linear LM are exactly the features for which guidelines say intrathecal therapy should be considered.\n\nD. Dexamethasone followed by capecitabine\nSystemic therapy alone is not the best immediate next step in symptomatic multifocal brain metastases with cytology-proven LM.\n\nE. Intrathecal methotrexate alone\nThis does not address the 14 symptomatic parenchymal brain metastases and diffuse intracranial burden that make WBRT necessary up front.","evidence":"This question is more ambiguous than it first looked. If the stem had described nodular-only LM, C would be stronger. But because it explicitly includes positive CSF cytology and diffuse linear leptomeningeal enhancement, it creates a guideline-based argument for adding intra-CSF therapy. The real flaw is that option A hard-codes methotrexate, whereas a cleaner expert option would say \u201cWBRT followed by consideration of intra-CSF therapy after CSF-flow assessment.\u201d","references":["EANO\u2013ESMO Clinical Practice Guideline for leptomeningeal metastasis, 2023: intrathecal therapy should be considered with tumor cells in CSF or linear LM. Guideline-level evidence.","Wilcox JA, et al. Neuro-Oncology 2024 SNO/ASCO consensus review: intrathecal therapy is generally most effective in thin linear LM with unobstructed CSF flow, while bulky or nodular LM is less responsive. Expert consensus/review.","Boogerd W, et al. Eur J Cancer 2004: randomized breast-cancer LM study did not establish clear benefit for intraventricular chemotherapy over non-intrathecal treatment. Level II evidence, but old.","Le Rhun E, et al. DEPOSEIN randomized phase III study: intra-CSF liposomal cytarabine plus systemic therapy improved LM-related PFS versus systemic therapy alone in newly diagnosed breast-cancer LM. Level I evidence for intra-CSF therapy as a class concept, though not for methotrexate specifically.","Evidence grade","For choosing WBRT immediately: high.","For adding intra-CSF therapy in this particular case: moderate, guideline-supported because of positive CSF and linear LM.","For methotrexate specifically as the intra-CSF agent: low to moderate, because the best breast-cancer randomized support is stronger for liposomal cytarabine than for methotrexate."],"length_bias_flag":"NONE"},{"id":"160","section":"Metastatic","question":"A 49-year-old woman with HER2-positive / HR-negative metastatic breast cancer presents with new-onset focal seizures and mild expressive aphasia. treatment history: Neoadjuvant TCHP \u2192 surgery \u2192 adjuvant Trastuzumab/Pertuzumab. Metastatic relapse (lung) started first line metastatic treatment with Trastuzumab-Emtansine. Further progression, so switched to trastuzumab deruxtecan (T-DXd). Currently on T-DXd with stable extracranial disease. Current MRI brain shows: 3 enhancing lesions (largest: 2.8 cm (left frontal, cortical/subcortical), others: 0.8 cm and 1.1 cm), moderate vasogenic edema, no midline shift, no leptomeningeal disease. She started on levetiracetam and dexamethasone. What is the most appropriate next management strategy?","options":{"A":"Immediate stereotactic radiosurgery (SRS) to all lesions while continuing T-DXd","B":"Switch systemic therapy to tucatinib + trastuzumab + capecitabine and reassess with MRI in 6 weeks","C":"Surgical resection of the dominant lesion followed by adjuvant SRS to cavity and remaining lesions","D":"Whole-brain radiotherapy (WBRT) with hippocampal avoidance","E":"immediate stereotactic radiosurgery to all lesions followed by switch systemic therapy to tucatinib + trastuzumab + capecitabine"},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["DESTINY-Breast12, Nature Medicine 2024. T-DXd showed substantial intracranial activity in active and stable brain metastases."],"length_bias_flag":"NONE"},{"id":"161","section":"Metastatic","question":"A 52-year-old woman presents with newly diagnosed de novo metastatic triple-negative breast cancer. Pathology: ER \\<1%, PR \\<1%, HER2 0 by IHC PD-L1 positive (CPS \\\\= 19), Germline BRCA1/2 negative. Disease burden: multiple liver metastases, bilateral pulmonary nodules, no CNS metastases. ECOG 1.No autoimmune disease. She has not received prior chemotherapy for metastatic disease and completed adjuvant dose-dense AC\u2192paclitaxel 3 years ago. Which of the following is the most appropriate first-line systemic therapy?","options":{"A":"Olaparib Olaparib is for germline BRCA1/2-mutated HER2-negative metastatic breast cancer, and this patient is germline BRCA-negative.","B":"Atezolizumab + nab-paclitaxel This was supported by IMpassion130, but the question gives PD-L1 as CPS 19, which is the pembrolizumab biomarker framework, and current standards favor pembrolizumab-based therapy here.","C":"Pembrolizumab plus paclitaxel, as first-line immunochemotherapy for PD-L1-positive (CPS \u226510) metastatic triple-negative breast cancer based on KEYNOTE-355","D":"Sacituzumab govitecan Sacituzumab govitecan monotherapy is an established option after prior chemotherapy in metastatic TNBC, not the best listed first-line choice for a PD-L1-positive patient eligible for pembrolizumab.","E":"Atezolizumab + paclitaxel This is incorrect because IMpassion131 was negative and did not show benefit for atezolizumab plus paclitaxel."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"A. Olaparib\nOlaparib is for germline BRCA1/2-mutated HER2-negative metastatic breast cancer, and this patient is germline BRCA-negative.\n\nB. Atezolizumab + nab-paclitaxel\nThis was supported by IMpassion130, but the question gives PD-L1 as CPS 19, which is the pembrolizumab biomarker framework, and current standards favor pembrolizumab-based therapy here.\n\nD. Sacituzumab govitecan\nSacituzumab govitecan monotherapy is an established option after prior chemotherapy in metastatic TNBC, not the best listed first-line choice for a PD-L1-positive patient eligible for pembrolizumab.\n\nE. Atezolizumab + paclitaxel\nThis is incorrect because IMpassion131 was negative and did not show benefit for atezolizumab plus paclitaxel.","evidence":"Good question overall. The only small issue is that using CPS makes pembrolizumab the clearly intended answer and makes atezolizumab less competitive, because atezolizumab trials used the SP142 immune-cell assay rather than CPS.\n\nEvidence\n\nStrong. This is a high-evidence, guideline-aligned first-line TNBC question based on phase III KEYNOTE-355 plus major guideline support.\n\nPlausibility of distractors\n\nB is the best distractor historically.\nC is biologically tempting but trial-negative.\nD and E are much weaker for an expert-level first-line PD-L1-positive case.","references":["Cort\u00e9s J, et al. Pembrolizumab plus Chemotherapy in Advanced Triple-Negative Breast Cancer. N Engl J Med. 2022. Phase III OS-confirming KEYNOTE-355. Level of evidence: I.","Cort\u00e9s J, et al. KEYNOTE-355 primary analysis. Lancet. 2020. Phase III PFS benefit with pembrolizumab plus paclitaxel, nab-paclitaxel, or gemcitabine-carboplatin. Level of evidence: I.","ESMO Clinical Practice Guideline / metastatic breast cancer treatment algorithm. In CPS \u226510 TNBC, pembrolizumab plus paclitaxel, nab-paclitaxel, or carboplatin-gemcitabine is recommended. Strength: I, A.","FDA approval summary for pembrolizumab in metastatic TNBC with CPS \u226510. Regulatory support aligned with KEYNOTE-355.","Miles D, et al. IMpassion131. Ann Oncol. 2021. Atezolizumab plus paclitaxel was negative. Level of evidence: I.","Schmid P, et al. IMpassion130. Lancet Oncol. 2020. Atezolizumab plus nab-paclitaxel showed benefit in PD-L1-positive disease, but this is not the best answer in a CPS-framed question with pembrolizumab available. Level of evidence: I.","Bardia A, et al. ASCENT. N Engl J Med. 2021. Sacituzumab govitecan improved outcomes in previously treated metastatic TNBC. Level of evidence: I.","# **Toxicity","11 questions"],"length_bias_flag":"NONE"},{"id":"201","section":"Metastatic","question":"A 49-year-old woman with no prior cancer history presents with progressive headaches and mild left-hand weakness. Brain MRI reveals a single 2.8 cm right frontal lobe enhancing mass with surrounding edema, causing mild midline shift. No leptomeningeal disease is seen. Systemic staging reveals a 3.5 cm left breast mass and ipsilateral axillary lymphadenopathy. Core biopsy of the breast mass shows: Invasive ductal carcinoma, ER -, PR-, HER2 3+ by IHC, Ki 67 60%, grade 3\\. She has ECOG 1\\. Neurosurgery deems the lesion resectable. What is the most appropriate initial management strategy?","options":{"A":"Surgical resection of the symptomatic dominant brain lesion followed by SRS to the cavity and remaining lesions, then initiate first-line systemic therapy with trastuzumab, pertuzumab, and docetaxel for the newly diagnosed HER2-positive metastatic breast cancer","B":"Immediate systemic therapy with trastuzumab, pertuzumab, and taxane, deferring all local brain therapy until systemic response is assessed. Same problem as B, and even more clearly wrong because it ignores urgent symptomatic local control entirely.","C":"Surgical resection followed by SRS to the cavity, then initiate trastuzumab deruxtecan as systemic HER2-directed therapy. The local part is right, but T-DXd monotherapy is not the current first-line labeled approach in untreated metastatic HER2-positive breast cancer.","D":"Whole-brain radiotherapy first, then initiate systemic HER2-targeted therapy after radiotherapy is completed. WBRT is not the preferred initial approach for a single resectable lesion; surgery plus postoperative cavity SRS is favored to achieve local control while sparing neurocognitive toxicity.","E":"Immediate systemic therapy with trastuzumab, pertuzumab, and taxane plus dexamethasone for edema, deferring local brain treatment. She is symptomatic and has a resectable mass with edema and mild midline shift, so local brain therapy should not be deferred."},"correct_answer":"A","short_rationale":"She has a single, symptomatic, resectable 2.8 cm brain metastasis with edema and mild midline shift. Current brain-metastasis guidance supports upfront local therapy for symptomatic brain metastases, notes that patients with large tumors with mass effect are more likely to benefit from surgery, and recommends SRS to the surgical cavity for 1 to 2 resected brain metastases. That makes surgery followed by cavity SRS the correct initial CNS strategy.\n\nThe systemic-therapy part is where the item becomes dated. As of late 2025, first-line FDA approval in metastatic HER2-positive breast cancer is for trastuzumab deruxtecan plus pertuzumab, not T-DXd monotherapy. The FDA label specifically states that T-DXd monotherapy is for patients who have already received prior anti-HER2 therapy in the metastatic setting or relapsed during or within 6 months of early-stage anti-HER2 therapy. So option C is not correct as written. Among the listed options, A is the best available answer because it gets the urgent local management right and uses an established untreated-HER2+ systemic backbone, even though the most up-to-date first-line systemic regimen today would be surgery + cavity SRS followed by T-DXd plus pertuzumab.","why_other_options_are_wrong":"B. Immediate systemic therapy with trastuzumab, pertuzumab, and taxane, deferring all local brain therapy until systemic response is assessed.\nSame problem as E, and even more clearly wrong because it ignores urgent symptomatic local control entirely.\n\nC. Surgical resection followed by SRS to the cavity, then initiate trastuzumab deruxtecan as systemic HER2-directed therapy.\nThe local part is right, but T-DXd monotherapy is not the current first-line labeled approach in untreated metastatic HER2-positive breast cancer.\n\nD. Whole-brain radiotherapy first, then initiate systemic HER2-targeted therapy after radiotherapy is completed.\nWBRT is not the preferred initial approach for a single resectable lesion; surgery plus postoperative cavity SRS is favored to achieve local control while sparing neurocognitive toxicity.\n\nE. Immediate systemic therapy with trastuzumab, pertuzumab, and taxane plus dexamethasone for edema, deferring local brain treatment.\nShe is symptomatic and has a resectable mass with edema and mild midline shift, so local brain therapy should not be deferred.","evidence":"Good concept, but not fully current. Before the December 2025 FDA approval of first-line T-DXd plus pertuzumab, E would have been a very clean answer. In 2026, no option is fully correct because A uses the wrong T-DXd formulation strategy and E uses the older systemic standard. The stem should either update option A to \u201cT-DXd plus pertuzumab\u201d or explicitly state that the question is based on the pre-DESTINY-Breast09 standard.\n\nEvidence\n\nStrong for the local-management piece. Strong that symptomatic resectable solitary brain metastasis should undergo local treatment first and that cavity SRS is appropriate after resection. Strong that T-DXd monotherapy is not the first-line labeled use anymore. The only ambiguity is that the \u201cbest\u201d systemic regimen after surgery/SRS in 2026 would actually be T-DXd plus pertuzumab, which is missing from the answer set.","references":["ASCO-SNO-ASTRO brain metastases guideline: patients with symptomatic brain metastases should receive local therapy; surgery is reasonable for large tumors with mass effect; SRS to the surgical cavity should be offered for 1 to 2 resected metastases. High-level guideline evidence.","FDA Enhertu label, 2025: first-line metastatic HER2-positive breast cancer indication is T-DXd in combination with pertuzumab; T-DXd monotherapy is for patients with prior anti-HER2-based treatment. High-authority regulatory evidence.","FDA approval notice, December 15, 2025: T-DXd plus pertuzumab approved for first-line unresectable or metastatic HER2-positive breast cancer. High-authority regulatory evidence."],"length_bias_flag":"NONE"},{"id":"202","section":"Metastatic","question":"A 48-year-old premenopausal woman was diagnosed 6 years ago with: Invasive ductal carcinoma, ER 90%, PR 70%, HER2-negative (IHC 0). She underwent surgery, adjuvant chemotherapy, ovarian suppression plus tamoxifen, and completed 5 years of endocrine therapy. She now presents with multiple liver lesions and pulmonary nodules. A biopsy of a liver metastasis shows: ER 5% (low positive), PR negative, HER2 IHC 2+, FISH non-amplified. PD-L1 negative. No actionable germline mutations. Which of the following is the most appropriate first-line systemic treatment?","options":{"A":"Fulvestrant combined with a CDK4/6 inhibitor for endocrine-resistant disease","B":"Trastuzumab deruxtecan as antibody-drug conjugate therapy for HER2-low disease","C":"Trastuzumab plus pertuzumab plus taxane-based chemotherapy","D":"Chemotherapy for triple-negative breast cancer (e.g., paclitaxel + bevacizumab)","E":"Aromatase inhibitor combined with a CDK4/6 inhibitor for HR-positive disease"},"correct_answer":"D","short_rationale":"Not stated explicitly in the sour

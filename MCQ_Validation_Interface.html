nal + family history\u2013based risk modeling (e.g., Tyrer\u2013Cuzick/BOADICEA); she qualifies for intensified screening (annual breast MRI in addition to mammography) only if her calculated lifetime breast cancer risk \u226520% (or meets other high-risk criteria), even though she is a true negative for the familial CHEK2 variant.","E":"Treat as hereditary breast cancer syndrome family member despite true negative because the sister\u2019s diagnosis at 51 implies undiscovered high-penetrance disease; recommend MRI + mammography and discuss prophylactic mastectomy unless a multigene panel in the patient is also negative; however, prospective validation of this strategy remains an area of active investigation (as reported in a meta-analysis of observational studies)."},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"55","section":"Biomarker","question":"In a patient with newly diagnosed hormone receptor-positive, HER2-negatvie metastatic breast cancer, which biomarker should be assessed to guide systemic therapy","options":{"A":"Estrogen receptor, progesterone receptor, PIK3CA mutation, AKT1/PTEN status, and PD-L1 status in all patients, without germline testing","B":"Estrogen receptor, progesterone receptor, PIK3CA mutation, germline BRCA1/2, and ESR1 mutational status only if the patient has had prior aromatase inhibitor exposure","C":"Estrogen receptor, progesterone receptor, PD-L1 status, and ESR1 mutational status in all patients at baseline","D":"Estrogen receptor, progesterone receptor, HER2-ultralow status, and PD-L1 status, because these are the main predictive biomarkers in HR-positive/HER2-negative metastatic disease","E":"Estrogen receptor, progesterone receptor, germline BRCA1/2 only; tumor genomic testing is not routinely needed in HR-positive/HER2-negative disease"},"correct_answer":"B","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Not stated explicitly in the source draft."],"length_bias_flag":"NONE"},{"id":"56","section":"Biomarker","question":"In mTNBC, which PD-L1 testing approach is validated for selecting patients for first-line pembrolizumab plus chemotherapy?","options":{"A":"Immune cell (IC) \u22651% using SP142","B":"TPS \u226550% using SP263","C":"Combined positive score (CPS) \u226510 using 22C3","D":"Tumor proportion score (TPS) \u22651% using 22C3","E":"Combined positive score (CPS) \u226515 using 22C4"},"correct_answer":"C","short_rationale":"For first-line pembrolizumab plus chemotherapy in metastatic triple-negative breast cancer, the validated companion-diagnostic approach is PD-L1 testing by 22C3 with a combined positive score (CPS) \u226510. The FDA approval for pembrolizumab in locally recurrent unresectable or metastatic TNBC was based on KEYNOTE-355, and the companion diagnostic was PD-L1 IHC 22C3 pharmDx using CPS \u226510.","why_other_options_are_wrong":"D is wrong because TPS is not the validated scoring system for pembrolizumab selection in mTNBC; the approved method is CPS, not tumor proportion score.\n\nA is wrong because IC \u22651% using SP142 was the assay/cutoff historically associated with atezolizumab in TNBC, not pembrolizumab. Pembrolizumab selection in mTNBC uses 22C3 CPS \u226510.\n\nB is wrong because TPS \u226550% using SP263 is a lung-cancer-style framework, not the validated breast-cancer companion-diagnostic approach for pembrolizumab in mTNBC.\n\nE is wrong because 22C4 is not the validated assay here, and the cutoff is CPS \u226510, not CPS \u226515.","evidence":"Evidence confidence: High","references":["FDA pembrolizumab approval for locally recurrent unresectable or metastatic TNBC based on KEYNOTE-355."],"length_bias_flag":"MILD"},{"id":"57","section":"Biomarker","question":"Which biomarker best predicts benefit from sacituzumab govitecan in heavily pretreated mTNBC?","options":{"A":"High TROP-2 expression by immunohistochemistry","B":"SLFN11 overexpression by transcriptomic assay","C":"Activating TROP-2 mutation on next-generation sequencing","D":"High Ki-67 proliferation index on core biopsy","E":"No validated predictive biomarker selection required"},"correct_answer":"E","short_rationale":"There is currently no validated predictive biomarker required to select heavily pretreated mTNBC patients for sacituzumab govitecan. In the phase III ASCENT analysis, benefit was observed across Trop-2 expression subgroups, and the investigators explicitly stated that Trop-2 testing is not required for treatment.","why_other_options_are_wrong":"A is wrong because although sacituzumab targets TROP-2, high TROP-2 expression by IHC is not a validated selection biomarker for routine clinical use. Post hoc analyses have explored associations, but treatment is not restricted to high expressers.\n\nB is wrong because SLFN11 is not an established or approved predictive biomarker for sacituzumab govitecan in mTNBC. Current biomarker work in this area remains exploratory.\n\nD is wrong because Ki-67 is not a validated predictor of sacituzumab benefit.\n\nC is wrong because activating TROP-2 mutation is not the biomarker used for sacituzumab selection; the drug is used without requiring a specific TROP-2 mutation on NGS.","evidence":"Evidence confidence: High","references":["ASCENT final results: \u201cTrop-2 testing is not required for SG treatment.\u201d"],"length_bias_flag":"NONE"},{"id":"58","section":"Biomarker","question":"A patient with mTNBC received first-line chemotherapy. No prior comprehensive NGS was performed. She now progresses. When should PIK3CA/PTEN/AKT testing be performed?","options":{"A":"Only after progression on three or more lines of systemic therapy","B":"At first progression if comprehensive testing was not done previously","C":"Only if the tumor is reclassified as HER2-low on repeat biopsy","D":"Only if the PD-L1 combined positive score is 10 or higher","E":"Only within the context of a registered clinical trial protocol"},"correct_answer":"B","short_rationale":"The best answer is B: if comprehensive genomic testing was not done earlier, first progression is the most appropriate time to perform it. Current advanced breast cancer guidance supports considering NGS/ctDNA profiling to identify actionable alterations in metastatic disease, and this is especially relevant once first-line therapy has failed and the next-line strategy is being planned. The SEOM-GEICAM-SOLTI 2025 advanced breast cancer guideline states that NGS and ctDNA genomic profiling tests could be considered to help identify actionable alterations in advanced breast cancer.\n\nThat said, this question is a little imperfect biologically. PIK3CA/PTEN/AKT testing is most clearly established in HR-positive/HER2-negative advanced breast cancer, where these alterations directly inform PI3K/AKT-pathway-targeted therapy. In mTNBC, these markers are not yet routine label-defining biomarkers in standard practice, but broad genomic profiling at progression can still be useful for trial eligibility and to identify potentially targetable alterations if testing has not already been done.","why_other_options_are_wrong":"A is wrong because there is no need to wait until three or more lines of therapy. If genomic profiling is going to help with second-line planning or trial selection, delaying that long is not the best approach.\n\nD is wrong because PD-L1 status is relevant for first-line pembrolizumab decisions in mTNBC, but it is not the gatekeeper for whether broader genomic testing such as PIK3CA/PTEN/AKT analysis should be performed.\n\nE is wrong because these tests are not restricted only to registered clinical trials. Genomic profiling can be considered in routine advanced breast cancer care to identify actionable alterations and trial options.\n\nC is wrong because HER2-low status is a separate therapeutic classifier and does not determine whether PI3K/AKT-pathway testing should be performed.","evidence":"Evidence confidence:\n\nModerate","references":["SEOM-GEICAM-SOLTI clinical guidelines in advanced breast cancer, 2025: NGS and ctDNA genomic profiling tests could be considered to identify actionable alterations in advanced breast cancer."],"length_bias_flag":"MODERATE"},{"id":"59","section":"Biomarker","question":"In the Phase III SOLAR-1 trial, which finding regarding PIK3CA mutation detection in liquid biopsy (ctDNA) versus archived tissue was most significant for clinical practice?","options":{"A":"ctDNA results matched archived tissue PIK3CA testing in approximately 80% of the metastatic cohort across all mutation hotspots.","B":"Tissue testing was significantly more sensitive than ctDNA for detecting H1047R across all metastatic subgroups analyzed.","C":"ctDNA testing identified patients who derived clinical benefit from alpelisib despite having PIK3CA wildtype results on archived tissue.","D":"PIK3CA mutations in ctDNA were only predictive of alpelisib response when variant allele frequency exceeded 5% at baseline.","E":"ctDNA results were non-concordant with tissue in over 50% of the metastatic cohort, limiting its utility as a companion diagnostic."},"correct_answer":"C","short_rationale":"The most clinically important finding was that ctDNA could identify patients who benefited from alpelisib even when archived tissue was reported as PIK3CA wild type. A recent review summarizing SOLAR-1 states that a subgroup analysis showed overall survival improvement for patients with PIK3CA-mutant ctDNA irrespective of their PIK3CA testing result on tissue at study screening. That is the key practice-changing implication: a plasma-positive result can be clinically actionable even when old tissue is negative.","why_other_options_are_wrong":"E is wrong because the concordance issue was important, but the \u201cmost significant\u201d practice implication was not simply that nonconcordance was high. Also, the review summarizing SOLAR-1 reports concordance between tissue and ctDNA at about 55%, not just as a reason to dismiss ctDNA utility.\n\nB is wrong because the clinically relevant message from SOLAR-1 was not that tissue was uniformly more sensitive for H1047R across all subgroups. The practical point was that plasma-positive patients clearly benefited, and plasma-negative results should not fully replace tissue testing.\n\nD is wrong because SOLAR-1 did not establish a variant allele frequency >5% threshold as the predictive rule for alpelisib benefit.\n\nA is wrong because \u201capproximately 80%\u201d does not match the SOLAR-1 ctDNA-versus-tissue comparison; one review reports about 55% concordance in SOLAR-1, with later real-world/platform studies showing higher rates in other settings.","evidence":"Evidence confidence: High","references":["AACR summary of the SOLAR-1 liquid biopsy analysis: ctDNA-based PIK3CA assessment was a strong indicator of benefit from alpelisib."],"length_bias_flag":"MILD"},{"id":"60","section":"Biomarker","question":"A 49-year-old woman is diagnosed with stage II (T2N1) triple-negative breast cancer (TNBC). The oncology team is considering neoadjuvant systemic therapy. hich of the following statements regarding PD-L1 testing in early-stage TNBC is most accurate?","options":{"A":"PD-L1 testing is not required to select patients for neoadjuvant pembrolizumab in high-risk early-stage TNBC, as established by KEYNOTE-522","B":"PD-L1 positivity defined by CPS \u226510 using the 22C3 assay is required before adding pembrolizumab to neoadjuvant chemotherapy.","C":"PD-L1 expression assessed by tumor proportion score (TPS) \u22655% predicts pathologic complete response benefit in early TNBC.","D":"PD-L1 testing using the SP142 assay is mandatory because only PD-L1\u2013positive tumors benefit from immune checkpoint inhibition in early TNBC.","E":"PD-L1 testing should be performed on surgical specimens rather than core biopsies to accurately determine eligibility for immunotherapy."},"correct_answer":"A","short_rationale":"In high-risk early-stage TNBC, PD-L1 testing is not required to use neoadjuvant pembrolizumab. The FDA approval for pembrolizumab plus neoadjuvant chemotherapy, followed by adjuvant pembrolizumab, was based on KEYNOTE-522, and patients were enrolled regardless of PD-L1 status. The FDA summary explicitly states that patients on the pembrolizumab arm had event-free survival benefit regardless of tumor PD-L1 status.","why_other_options_are_wrong":"B is wrong because CPS \u226510 with 22C3 is the validated approach for metastatic TNBC, not early-stage TNBC. The FDA approval page distinguishes these: PD-L1 CPS \u226510 applies to locally recurrent unresectable or metastatic TNBC, while the early-stage approval did not require PD-L1 selection.\n\nD is wrong because SP142-based PD-L1 selection was associated with atezolizumab in metastatic TNBC, not pembrolizumab in early-stage TNBC. Early-stage pembrolizumab benefit in KEYNOTE-522 was not restricted to PD-L1-positive tumors.\n\nE is wrong because eligibility for neoadjuvant pembrolizumab in early TNBC is not determined by PD-L1 testing on surgical specimens. The treatment decision is made before surgery, and PD-L1 is not required for selection.\n\nC is wrong because TPS is not the validated scoring method here, and TPS \u22655% is not the biomarker threshold used to select early-stage TNBC patients for pembrolizumab.","evidence":"Evidence confidence: High","references":["FDA approval for high-risk early-stage TNBC: patients were enrolled regardless of PD-L1 expression."],"length_bias_flag":"NONE"},{"id":"61","section":"Biomarker","question":"A 58-year-old woman with ER-positive, HER2-negative metastatic breast cancer relapses after 3 years of adjuvant aromatase inhibitor therapy and then progresses after 14 months of first-line letrozole plus a CDK4/6 inhibitor. Her archived untreated primary tumor from 4 years earlier was ESR1 wild type. Plasma ctDNA at metastatic progression now shows ESR1 Y537S. Which interpretation is most accurate?","options":{"A":"ESR1 mutations are mainly induced by CDK4/6 inhibitors rather than endocrine therapy, so the mutation does not specifically imply aromatase inhibitor resistance; the more appropriate interpretation is that this represents a CDK4/6-pathway escape mechanism requiring alternative kinase-targeted rather than endocrine-directed systemic therapy modification.","B":"The ctDNA result is likely artifactual because clinically relevant ESR1 mutations are usually truncal and therefore should have been detectable in the untreated primary tumor; a negative archival result strongly suggests that this finding represents a false-positive result from clonal hematopoiesis or sequencing noise rather than true acquired tumor biology.","C":"ESR1 mutations in metastatic breast cancer are generally germline variants and therefore should trigger hereditary cancer counseling and formal genetics referral rather than a therapy change; identifying this variant warrants cascade testing of first-degree relatives before modifying the systemic treatment plan for the metastatic disease.","D":"ESR1 mutations usually predict improved sensitivity to continued aromatase inhibitor therapy because they reflect persistent estrogen dependence and ongoing receptor signaling that remains targetable by estrogen deprivation; switching away from the current aromatase inhibitor would therefore be counterproductive in this clinical context.","E":"ESR1 mutations are typically acquired under estrogen-deprivation selective pressure, are uncommon in untreated primary tumors, and are enriched after aromatase inhibitor exposure, so a negative archival primary does not exclude a clinically meaningful acquired ESR1 mutation; ctDNA-based ESR1 testing at metastatic progression is therefore recommended to guide endocrine therapy selection"},"correct_answer":"E","short_rationale":"ESR1 ligand-binding domain mutations are a classic mechanism of acquired endocrine resistance, especially after estrogen deprivation with aromatase inhibitors. They are rare in treatment-naive primary tumors, but become much more common after exposure to endocrine therapy and are enriched in metastatic disease after aromatase inhibitor treatment. That means a wild-type archived primary tumor does not rule out a clinically meaningful ESR1 mutation emerging later in metastatic disease.\n\nThis is also why current practice recommends testing for ESR1 mutations at recurrence or progression on endocrine therapy, preferably with ctDNA when feasible. ASCO\u2019s rapid recommendation update supports ESR1 mutation testing to guide therapy in ER-positive, HER2-negative metastatic breast cancer, and the real-world prevalence data show ESR1 mutation frequency rises with later lines of therapy and is detectable in liquid biopsy, particularly after aromatase inhibitor based treatment.","why_other_options_are_wrong":"B is wrong because ESR1 mutations are not usually truncal in untreated primary disease. Their rarity in treatment-naive tumors and enrichment after endocrine therapy is one of the strongest arguments that they are selected during treatment rather than present from the start in most cases.\n\nA is wrong because the best-established selective pressure is endocrine therapy, especially aromatase inhibition, not CDK4/6 inhibition alone.\n\nD is wrong because ESR1 hotspot mutations such as Y537S confer ligand-independent ER activity and are associated with resistance to aromatase inhibitor therapy, not improved AI sensitivity.\n\nC is wrong because ESR1 mutations detected in this context are tumor-acquired alterations used to guide metastatic therapy, not typical germline hereditary cancer findings.","evidence":"Not stated explicitly in the source draft.","references":["Jeselsohn R et al. ESR1 mutations: a mechanism for acquired endocrine resistance in breast cancer. Nature Reviews Clinical Oncology. 2015."],"length_bias_flag":"SEVERE"},{"id":"62","section":"Biomarker","question":"A 63-year-old woman with ER-positive, HER2-negative metastatic breast cancer has been on first-line letrozole plus ribociclib for 11 months with radiographic stable disease. Serial ctDNA testing now detects an emergent ESR1 mutation, but imaging still shows no progression. Which statement best distinguishes the clinical use case supported by SERENA-6 from the one established by EMERALD?","options":{"A":"EMERALD established ctDNA-guided early intervention before progression, whereas SERENA-6 established only post-progression ESR1-directed therapy; this means that in clinical practice, EMERALD results should guide pre-progression endocrine switching based on molecular monitoring, while SERENA-6 results apply only after conventional radiographic disease progression has been confirmed on standard imaging assessment using established response criteria.","B":"Neither trial used ESR1 mutation as a biomarker-defined inclusion strategy; both EMERALD and SERENA-6 enrolled patients regardless of ESR1 mutation status and stratified only by prior CDK4/6 inhibitor duration and visceral disease burden, with ESR1 testing performed retrospectively as an exploratory correlative biomarker analysis rather than as a prespecified selection criterion for treatment assignment or primary endpoint analysis in the randomized portion of the study.","C":"SERENA-6 and EMERALD both required radiographic progression before randomization and both compared oral SERD plus CDK4/6 inhibitor versus chemotherapy; neither trial incorporated ctDNA-based molecular monitoring as part of the treatment-switching algorithm, and the endocrine backbone in both studies was a next-generation oral SERD combined with continued CDK4/6 inhibitor rather than oral SERD monotherapy or combination with conventional endocrine therapy.","D":"Both trials validated switching immediately to oral SERD monotherapy at first ctDNA positivity, with discontinuation of the CDK4/6 inhibitor before radiographic progression; these results collectively establish that any detectable ESR1 mutation in circulating tumor DNA, regardless of variant allele frequency or mutational subtype, mandates immediate cessation of both the aromatase inhibitor and the CDK4/6 inhibitor and transition to oral SERD monotherapy as the standard molecular-guided intervention.","E":"EMERALD supports elacestrant after radiographic progression following prior endocrine therapy, including mandatory CDK4/6 inhibitor exposure, in ESR1-mutated ER-positive, HER2-negative advanced breast cancer; SERENA-6 tested switching from the aromatase inhibitor to camizestrant while continuing the same CDK4/6 inhibitor when an emergent ESR1 mutation was detected by ctDNA before radiographic progression."},"correct_answer":"E","short_rationale":"EMERALD and SERENA-6 answer different clinical questions. EMERALD studied patients who had already progressed after prior endocrine therapy, with mandatory prior CDK4/6 inhibitor exposure, and showed that elacestrant improved progression-free survival versus standard endocrine therapy, with the clearest benefit in ESR1-mutated disease. This is the evidence base behind the current post-progression use of elacestrant in ESR1-mutated ER-positive, HER2-negative advanced or metastatic breast cancer.\n\nSERENA-6, by contrast, moved ESR1 biology earlier into first-line management. It monitored patients on first-line aromatase inhibitor plus CDK4/6 inhibitor, detected emergent ESR1 mutations in ctDNA before radiographic progression, and tested an endocrine backbone switch to camizestrant while continuing the same CDK4/6 inhibitor. In the NEJM report, this ctDNA-guided switch prolonged progression-free survival compared with continuing the aromatase inhibitor combination.\n\nThe key distinction, therefore, is this: EMERALD is a post-progression ESR1-directed strategy, whereas SERENA-6 is a pre-progression, ctDNA-triggered intervention strategy that attempts to intercept acquired resistance earlier.","why_other_options_are_wrong":"D is wrong because EMERALD did not test pre-progression switching at first ctDNA positivity, and SERENA-6 did not simply stop the CDK4/6 inhibitor and use oral SERD monotherapy.\n\nC is wrong because SERENA-6 specifically intervened before radiographic progression, and EMERALD was not a chemotherapy comparison trial.\n\nA is the reverse of the truth. EMERALD is the post-progression trial, and SERENA-6 is the early ctDNA-guided switch trial.\n\nB is wrong because ESR1 mutation was central to both programs, though used differently. In EMERALD it defined the subgroup with strongest clinical utility for elacestrant, and in SERENA-6 emergent ESR1 mutation detected by ctDNA was the trigger for treatment switching.","evidence":"Not stated explicitly in the source draft.","references":["Bidard FC et al. EMERALD phase III trial, initial publication. Journal of Clinical Oncology. 2022."],"length_bias_flag":"SEVERE"},{"id":"63","section":"Biomarker","question":"A 47-year-old woman with high-risk TNBC completed neoadjuvant chemotherapy plus pembrolizumab, underwent surgery, and finished adjuvant pembrolizumab. She is asymptomatic and has no evidence of disease on standard follow-up. She asks whether she should undergo serial tumor-informed ctDNA testing every 3 months and, if it becomes positive, whether systemic therapy should be started immediately before radiographic relapse. Which statement is most accurate?","options":{"A":"ctDNA surveillance should replace standard clinical follow-up and breast imaging because a negative ctDNA result has sufficient negative predictive value to safely de-escalate conventional surveillance; specifically, serial negative ctDNA results after curative-intent therapy can be used to reduce imaging frequency and eliminate routine clinical breast examinations from the standard follow-up protocol.","B":"ctDNA detection after curative-intent therapy is strongly prognostic and often precedes clinical relapse by months, but routine ctDNA surveillance to trigger treatment escalation is not standard outside clinical trials because clinical utility has not been established in prospective interventional studies, and some patients already have overt metastases on imaging when ctDNA becomes positive, limiting the window for pre-emptive intervention","C":"Routine ctDNA surveillance is already standard of care after curative-intent therapy because ctDNA positivity reliably precedes relapse and early intervention has been proven to improve event-free and overall survival in prospective randomized trials; major guidelines now recommend serial tumor-informed ctDNA testing every 3 months as a validated surveillance strategy for all breast cancer subtypes.","D":"ctDNA surveillance is useful mainly in ER-positive/HER2-negative disease and is not informative in TNBC because high ctDNA shedding rates in triple-negative tumors make the assay nonspecific for relapse prediction; in hormone receptor-positive disease, lower shedding rates produce a more favorable signal-to-noise ratio that allows clinically meaningful discrimination between true molecular relapse and background noise.","E":"A positive post-adjuvant ctDNA result should automatically trigger systemic therapy such as pembrolizumab or a PARP inhibitor regardless of subtype, even if imaging is negative; current evidence supports that molecular relapse detection mandates immediate treatment escalation before radiographically detectable metastatic disease develops, as delay beyond the molecular relapse window significantly compromises outcomes."},"correct_answer":"B","short_rationale":"ctDNA detection after curative-intent treatment in early breast cancer is a strong prognostic marker for molecular residual disease, and it often precedes clinical relapse by a substantial lead time. In the Garcia-Murillas study, ctDNA detection during follow-up had a median lead time of 10.7 months before clinical relapse.\n\nBut that does not mean routine ctDNA surveillance is standard of care or that treatment should automatically begin at molecular relapse. A 2024 review in npj Breast Cancer states that prospective trials are still needed to establish the clinical utility required to incorporate ctDNA into routine practice. The 2025 St. Gallen/German review likewise states that ctDNA testing should not be done outside clinical studies in this setting.","why_other_options_are_wrong":"A is wrong because ctDNA surveillance has not yet shown proven event-free or overall survival benefit when used routinely to trigger early treatment after adjuvant therapy.\n\nC is wrong because a negative ctDNA result is not strong enough to replace standard follow-up or de-escalate recommended surveillance.\n\nD is wrong because ctDNA is actually quite informative in TNBC and has been prospectively studied there. The problem is lack of proven clinical utility for intervention.\n\nE is wrong because a positive ctDNA result alone does not automatically mandate pembrolizumab, PARP inhibition, or other systemic therapy outside a trial.","evidence":"","references":["Garcia-Murillas I, et al. Assessment of molecular relapse detection in early-stage breast cancer. JAMA Oncology. 2019. Median lead time 10.7 months.","Panet F, et al. Use of ctDNA in early breast cancer: analytical validity and clinical potential. npj Breast Cancer. 2024.","Turner NC, et al. Results of the c-TRAK TN trial. Annals of Oncology. 2023.","AACR news release on ZEST, 2024. The trial was terminated early because of low ctDNA detection after treatment.","Untch M, et al. 2025 St. Gallen/German discussion of early breast cancer treatment. ctDNA testing should not be done outside clinical studies."],"length_bias_flag":"SEVERE"},{"id":"64","section":"Biomarker","question":"Which of the following most accurately defines HER2-low in metastatic breast cancer?","options":{"A":"Tumors with HER2 IHC 2+ and HER2/CEP17 ratio \\<2.0 but average HER2 copy number \u2265 6.0 signals per cell","B":"Tumors with heterogeneous HER2 expression showing focal IHC 3+ staining in \\<10% of tumor cells and negative ISH","C":"Tumors with HER2 IHC 2+ regardless of ISH status, including cases with low-level HER2 gene copy number gain without meeting amplification criteria","D":"Tumors demonstrating HER2 immunohistochemistry (IHC) 1+ or 2+ with negative in situ hybridization (ISH), in the absence of HER2 gene amplification","E":"Tumors with HER2 IHC 0 or 1+ and equivocal ISH results that do not fulfill ASCO/CAP criteria for HER2 positivity"},"correct_answer":"D","short_rationale":"Rationale:\nHER2-low in metastatic breast cancer is defined as HER2 IHC 1+ or HER2 IHC 2+ with negative ISH, meaning there is no HER2 gene amplification. That is the definition used in the T-DXd trials and reflected in current pathology guidance.\n\nWhy the others are wrong:\nC: Wrong because IHC 2+ is not HER2-low if ISH is positive; those tumors are HER2-positive.\nE: Wrong because IHC 0 is not HER2-low; that falls outside the standard HER2-low definition.\nA: Wrong because IHC 2+ with HER2/CEP17 ratio under 2.0 but average HER2 copy number at least 6.0 is interpreted as HER2-positive, not HER2-low.\nB: Wrong because focal IHC 3+ staining is not the definition of HER2-low.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nHigh. This is based on current ASCO/CAP pathology guidance and the clinical-trial definition used for metastatic HER2-low therapy.","references":["CAP 2023 HER2 Testing in Breast Cancer Guideline Update. Metastatic candidates for HER2-low-directed therapy are IHC 1+ or 2+/ISH negative."],"length_bias_flag":"MILD"},{"id":"65","section":"Biomarker","question":"Which of the following most accurately defines HER2-ultralow in metastatic breast cancer?","options":{"A":"Tumors with HER2 immunohistochemistry (IHC) 1+ or 2+ with negative in situ hybridization (ISH), in the absence of HER2 gene amplification, as defined by current ASCO/CAP criteria","B":"Tumors with faint, incomplete membranous staining in \u226410% of tumor cells that does not reach the threshold for IHC 1+, in the absence of HER2 amplification","C":"Tumors with HER2 IHC 2+ and negative ISH, but with heterogeneous expression limited to a small tumor subclone comprising less than 30% of the invasive tumor cell population","D":"Tumors with no membranous HER2 staining at all (classic IHC 0), regardless of any faint cytoplasmic or incomplete staining in fewer than 10% of tumor cells","E":"Tumors with focal circumferential membrane staining that is intense in less than 10% of tumor cells and confirmed negative by in situ hybridization testing for gene amplification"},"correct_answer":"B","short_rationale":"HER2-ultralow refers to tumors that are formally HER2 IHC 0 by classic ASCO/CAP interpretation, but with faint or barely perceptible incomplete membranous staining in more than 0% and up to 10% of tumor cells. That is the definition used in DESTINY-Breast06 and reflected in the 2025 CAP breast biomarker reporting template and recent international pathology consensus work.","why_other_options_are_wrong":"A: This is the definition of HER2-low (IHC 1+ or IHC 2+/ISH\u2212), not HER2-ultralow.\nC: IHC 2+/ISH\u2212 with heterogeneous subclonal expression still falls within HER2-low, not ultralow.\nD: Complete absence of membranous staining defines HER2-0 (HER2-null); ultralow requires some faint/incomplete staining to be present.\nE: Intense circumferential staining, even if focal, suggests IHC 3+-level overexpression in that subpopulation, not ultralow.","evidence":"","references":["Bardia A, et al. DESTINY-Breast06. N Engl J Med. 2024. HER2-ultralow included patients with IHC 0 with membrane staining.","CAP Breast Biomarker Reporting Template, March 2025. IHC 0 is further detailed as 0/absent membrane staining versus 0+/with membrane staining.","Rakha EA, et al. International Expert Consensus Recommendations for HER2 Reporting in Breast Cancer: Focus on HER2-Low and Ultralow Categories. Mod Pathol. 2025.","Wolff AC, et al. ASCO/CAP HER2 Testing Guideline Update. J Clin Oncol. 2023."],"length_bias_flag":"MODERATE"},{"id":"66","section":"Biomarker","question":"Which statement most accurately reflects the current biological understanding of HER2-low breast cancer?","options":{"A":"HER2-low status is primarily a predictive biomarker for antibody-drug conjugates rather than a biologically distinct entity with consistent molecular features.","B":"HER2-low tumors demonstrate consistent HER2 mRNA overexpression relative to HER2-0 tumors that is reproducibly detectable across multiple gene expression platforms.","C":"HER2-low tumors have a distinct ERBB2 somatic mutational profile that differentiates them biologically from true HER2-0 tumors on genomic sequencing.","D":"HER2-low tumors represent a stable intrinsic molecular subtype that is biologically distinct from HER2-negative disease on gene expression profiling.","E":"HER2-low classification is driven by HER2 gene amplification below the ISH positivity threshold rather than by protein expression on immunohistochemistry."},"correct_answer":"A","short_rationale":"Rationale:\nCurrent evidence does not support HER2-low as a consistently distinct biological subtype. The best current interpretation is that HER2-low is mainly a treatment-predictive category for antibody-drug conjugates, while the underlying biology is largely driven by hormone receptor status and broader tumor context rather than a unique, reproducible HER2-low molecular program. ESMO expert consensus states that HER2-low, as currently defined, should not be considered a distinct molecular entity, and a large genomic analysis found no significant genomic differences from HER2-0 tumors after accounting for ER status, apart from slightly higher ERBB2 copy count.\n\nWhy the others are wrong:\nC: Wrong because HER2-low tumors do not show a distinct ERBB2 somatic mutational profile that reliably separates them from HER2-0 tumors.\nD: Wrong because HER2-low is not established as a stable intrinsic molecular subtype on gene-expression profiling.\nA: Correct because HER2-low currently functions mainly as a predictive biomarker for ADC eligibility rather than a clearly separate biological entity.\nB: Wrong because consistent HER2 mRNA overexpression across platforms has not been shown as a defining reproducible feature of HER2-low disease.\nE: Wrong because HER2-low classification is based on low-level protein expression by IHC, specifically IHC 1+ or IHC 2+/ISH-negative, not sub-threshold gene amplification.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate to high. This is based on expert consensus, contemporary pathology guidance, and large genomic analyses, but the field is still evolving and some translational studies continue to explore whether biologic subgroups exist within HER2-low disease.","references":["Tarantino P, et al. ESMO expert consensus statements on the definition, diagnosis, and management of HER2-low breast cancer. Ann Oncol. 2023."],"length_bias_flag":"NONE"},{"id":"67","section":"Curative Treatment","question":"A 48-year-old premenopausal woman has a pT1c (1.8cm), Grade 2, ER+/PR+, HER2-negative invasive ductal carcinoma with one micrometastasis in a sentinel lymph node (pN1mi). Her Oncotype DX Recurrence Score is 18\\. Which treatment would a clinician recommend?","options":{"A":"OFS plus aromatase inhibitor for 5\u201310 years without chemotherapy, as RxPONDER confirms premenopausal patients with RS \u226425 and 1\u20133 positive nodes derive no benefit from chemotherapy with optimal endocrine therapy.","B":"Dose-dense AC followed by paclitaxel then tamoxifen for 10 years, as micrometastatic nodal disease in a premenopausal patient with RS 18 warrants full cytotoxic treatment regardless of genomic score.","C":"Tamoxifen monotherapy for 5\u201310 years without chemotherapy or OFS, as RS 18 falls below the threshold for meaningful chemotherapy benefit per TAILORx data in node-negative patients.","D":"Four cycles of TC chemotherapy followed by OFS plus aromatase inhibitor, as RxPONDER established chemotherapy benefit for all premenopausal node-positive patients with RS \u226425 regardless of clinical risk.","E":"Enrollment in NRG-BR009 (OFSET trial) randomizing OFS plus aromatase inhibitor alone versus chemotherapy followed by OFS plus aromatase inhibitor, designed for premenopausal ER+/HER2\u2212 pN0\u20131 patients with RS \u226425."},"correct_answer":"E","short_rationale":"This is an expert-level edge case because the patient has pN1mi, not classic macrometastatic pN1a-c disease. The broad RxPONDER/ASCO message supports chemotherapy for premenopausal patients with 1\u20133 positive nodes and RS \u226425, but the evidence is less secure for pN1mi specifically; published analysis notes pN1mi was not cleanly represented in the main evidence base and did not show the same clear chemotherapy-associated survival signal as pN1a-c. That is exactly why NRG-BR009/OFSET exists, and it explicitly includes pN1mi patients with RS \\<26. For a hard expert exam testing recognition of the evidence gap, E is the best answer.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Not stated explicitly in the source draft.","references":["Andr\u00e9 F, Ismaila N, Henry NL, et al. Biomarkers for Adjuvant Endocrine and Chemotherapy in Early-Stage Breast Cancer: ASCO Guideline Update. J Clin Oncol. 2022."],"length_bias_flag":"NONE"},{"id":"68","section":"Curative Treatment","question":"How should chemotherapy decisions be individualized in HR+/HER2\u2013 early breast cancer when genomic assays (e.g., Oncotype DX) yield intermediate risk scores?","options":{"A":"Base the decision primarily on age/menopausal status and clinical risk, recognizing that for many postmenopausal patients with intermediate RS, endocrine therapy alone is often sufficient, while in premenopausal patients chemotherapy benefit may reflect ovarian function suppression; therefore consider clinical risk, nodal status, patient values, and the option of OFS + endocrine therapy when chemotherapy benefit is marginal.","B":"Ignore clinical-pathologic features once an RS is available; the genomic score supersedes tumor size/grade/PR/Ki-67 and should be the only determinant of chemotherapy use; the strength of this recommendation varies across international consensus guidelines, though the absolute magnitude of benefit may differ based on individual patient characteristics, although the evidence base supporting this approach is limited to retrospective cohort data.","C":"Recommend chemotherapy only if the tumor is grade 3 or high Ki67 or tumor size > 3 cm, regardless of RS range, because histologic grade is the strongest predictor of chemotherapy benefit in HR+/HER2\u2013 early disease; this approach has been evaluated in prospective studies with conflicting results, and clinicians should weigh the risk-benefit ratio in the context of the patient's overall treatment goals.","D":"Treat all \u201cintermediate\u201d RS results as chemo-indicated because assay uncertainty is highest in the middle range, so the safest strategy is to add chemotherapy routinely, although the evidence base supporting this approach is limited to retrospective cohort data; comparative effectiveness data for this approach versus alternatives are still evolving, with the caveat that implementation requires careful consideration of patient preferences and comorbidities.","E":"Convert intermediate RS into a binary decision by repeating the genomic assay (preferably on a separate block) until it classifies as \u201clow\u201d or \u201chigh,\u201d then treat according to the new category, though the absolute magnitude of benefit may differ based on individual patient characteristics, although the evidence base supporting this approach is limited to retrospective cohort data."},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate overall. High for the postmenopausal/intermediate-RS omission component and for incorporating clinical risk; moderate to indirect for the premenopausal clause that chemotherapy benefit may largely reflect ovarian function suppression and that OFS plus endocrine therapy can be considered as an alternative strategy in marginal cases.","references":["Andr\u00e9 F, Ismaila N, Allison KH, et al. Biomarkers for Adjuvant Endocrine and Chemotherapy in Early-Stage Breast Cancer: ASCO Guideline Update. J Clin Oncol. 2022."],"length_bias_flag":"NONE"},{"id":"69","section":"Curative Treatment","question":"In patients with ER-low (1\u20139%), HER2-negative early breast cancer who have completed standard chemotherapy, is it acceptable to omit endocrine therapy based on the biological similarity of these tumors to TNBC?\"","options":{"A":"Agree, omit endocrine therapy because ER-low tumors are biologically similar to TNBC","B":"Abstain, depends primarily on Progesterone Receptor (PR) status (omit if PR-negative; give if PR-positive)","C":"Disagree, endocrine therapy is mandatory and provides the same magnitude of benefit as in strongly ER-positive disease, regardless of ER percentage","D":"Disagree, continue to follow the \u22651% ASCO/CAP threshold (offer endocrine therapy even in ER-low disease)","E":"Agree, but only if a basal-like molecular profile is confirmed; then manage as TNBC and omit endocrine therapy"},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate. High for the classification/threshold recommendation to offer endocrine therapy based on ASCO/CAP guidance; lower for the magnitude of benefit in ER-low disease, which is based on limited and mostly retrospective data rather than randomized trials specifically in ER-low tumors.","references":["Allison KH, Hammond MEH, Dowsett M, et al. Estrogen and Progesterone Receptor Testing in Breast Cancer: ASCO/CAP Guideline Update. J Clin Oncol. 2020."],"length_bias_flag":"NONE"},{"id":"70","section":"Curative Treatment","question":"A 49-year-old female patient was diagnosed with HR+ HER2-low breast cancer, stage T1 N0 G2, Oncotype RS 16. Would suppression of ovarian function be advisable if the patient had her last menstrual period no more than 11 months ago?","options":{"A":"OFS should be routinely recommended in all women \\<50 with HR-positive disease regardless of stage or genomic risk because benefit is consistent across all subgroups.","B":"OFS is generally not indicated because near-12-month amenorrhea at age 49 is sufficient to manage her as postmenopausal for endocrine selection; tamoxifen alone is typically adequate.","C":"OFS can be considered because amenorrhea \\<12 months does not establish menopause; she should be treated as potentially pre/perimenopausal, and OFS is particularly relevant if an aromatase inhibitor is planned or ovarian status is uncertain.","D":"OFS should be deferred initially because in low clinical/genomic risk disease the preferred default is tamoxifen alone; menopause should be confirmed (e.g., FSH/estradiol on serial testing) before escalating to OFS or AI-based therapy, unless higher-risk features emerge.","E":"OFS is usually not favored because pT1N0 with RS 16 implies low absolute risk; any incremental benefit over tamoxifen is expected to be small and is typically reserved for higher-risk scenarios or when choosing AI therapy."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate to high","references":["ASCO 2019 (Burstein). Supports that less than 12 months of amenorrhea does not establish postmenopausal status.","NCCN 2024. Supports that aromatase inhibitor therapy requires confirmed menopause or ovarian function suppression.","SOFT (Francis, NEJM 2015). Supports ovarian function suppression benefit in premenopausal women, with benefit varying by risk.","TEXT+SOFT (Pagani, NEJM 2014). Supports that ovarian function suppression is required when using an aromatase inhibitor in premenopausal women.","SOFT+TEXT update (Francis, NEJM 2018). Supports persistent benefit and an individualized treatment approach.","SOFT+TEXT 15-year follow-up (Francis, JCO 2025). Provides the most current long-term evidence.","ASTRRA (Kim, JCO 2023). Supports considering ovarian function suppression when ovarian status remains uncertain."],"length_bias_flag":"NONE"},{"id":"71","section":"Curative Treatment","question":"A 42-year-old premenopausal woman with a germline BRCA2 pathogenic variant has biopsy-proven ER-positive, PR-positive, HER2-negative invasive ductal carcinoma of the breast, nuclear grade 3. Before neoadjuvant therapy, imaging and biopsy showed a 3.1 cm primary tumor with one biopsy-confirmed ipsilateral axillary lymph node metastasis. She received standard anthracycline-taxane neoadjuvant chemotherapy followed by breast surgery and axillary staging. Final pathology shows residual invasive carcinoma measuring 2.4 cm and one of seven axillary lymph nodes positive for macrometastatic disease. Postoperative regional radiotherapy is indicated. Which adjuvant treatment sequence is most appropriate?","options":{"A":"False because olaparib should not start before indicated postoperative radiotherapy; OlympiA required completion of local therapy, and practical guidance recommends starting olaparib at least 2 weeks after radiation because PARP inhibition is radiosensitizing.","B":"False for the same reason as A, and also because tamoxifen is a weaker endocrine backbone than AI plus OFS for a high-risk premenopausal patient when OFS is feasible.","C":"False as the single best answer because it is incomplete. RT then olaparib plus endocrine therapy is OlympiA-consistent, but it omits abemaciclib despite this patient also meeting monarchE-style high-risk criteria and despite St. Gallen supporting sequential olaparib then abemaciclib in this setting.","D":"Start AI plus OFS immediately, then postoperative radiotherapy, then 12 months olaparib, then 2 years abemaciclib plus AI plus OFS sequentially.","E":"False because if both targeted agents are used, the supported expert-consensus sequence is olaparib first and abemaciclib afterward, not the reverse."},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate overall. High for the radiotherapy-before-olaparib rule and for concurrent endocrine therapy with olaparib, because those come from OlympiA-based practice. Moderate for abemaciclib eligibility, because she clearly matches monarchE high-risk criteria. Low for the exact full sequence in D, because olaparib followed by abemaciclib is based on St. Gallen expert consensus rather than randomized sequencing data. At a strict trial-only level, A would be more defensible; at the expert-consensus level your revised question is testing, D is the better key.","references":["Tutt ANJ, et al. Adjuvant Olaparib for Patients with BRCA1- or BRCA2-Mutated Breast Cancer. N Engl J Med. 2021."],"length_bias_flag":"NONE"},{"id":"72","section":"Curative Treatment","question":"A 35-year-old woman with stage II TNBC is a candidate for KEYNOTE-522 therapy. She suffers from ulcerative colitis, which is well controlled with Mesalazin. Which therapy would be recommended for the patient if the risk of a fatal immune-related adverse event (irAE) is compared to the absolute improvement in event-free survival (EFS) with pembrolizumab in this setting?","options":{"A":"False because prophylactic systemic steroids are not standard for preventing checkpoint colitis, and guidelines state no prophylactic role for steroids has been demonstrated.","B":"False because pembrolizumab is validated as part of the full perioperative KEYNOTE-522 regimen, not as a \u201creserve only after surgery if residual disease\u201d strategy after omitting neoadjuvant pembrolizumab.","C":"Proceed with KEYNOTE-522 (standard neoadjuvant chemo backbone + pembrolizumab) with GI co-management, baseline stool markers (e.g., fecal calprotectin), careful counseling, and a low threshold to hold pembrolizumab for any diarrhea/flare","D":"False because it is too conservative. Pre-existing UC raises GI toxicity risk, but available evidence does not support routine omission of pembrolizumab in all patients with well-controlled IBD; that would forgo a proven perioperative EFS benefit.","E":"False as the single best answer because GI assessment and co-management are sensible, but the patient already has well-controlled disease on mesalazine; making pembrolizumab contingent on a separate delayed decision is more cautious than the evidence requires and departs from the validated perioperative approach. In practice, the assessment should happen, but it should usually be integrated into starting KEYNOTE-522 rather than postponing pembrolizumab by default."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate.","references":["Schmid P, et al. Overall Survival with Pembrolizumab in Early-Stage Triple-Negative Breast Cancer. N Engl J Med. 2024. KEYNOTE-522 5-year EFS 81.2% vs 72.2%."],"length_bias_flag":"NONE"},{"id":"73","section":"Curative Treatment","question":"In a 43-year-old patient with stage I TNBC (cT1c cN0, G3) who received neoadjuvant anthracycline/taxane-based chemotherapy without immunotherapy and was found to have nodal disease (ypNmi) postoperatively, is there any evidence or ongoing clinical trial data supporting the initiation of adjuvant pembrolizumab in this setting?","options":{"A":"Start adjuvant pembrolizumab: KEYNOTE-522 does not support initiating pembrolizumab after surgery even if it was not given preoperatively; pembrolizumab in that trial began in the neoadjuvant phase and continued after surgery. Also, this patient's original cT1cN0 stage I disease is outside the ASCO-recommended KEYNOTE-522 population of T1cN1-2 or T2-4N0 stage II/III TNBC, and late-start post-operative checkpoint inhibitor therapy has not been validated in prospective trials.","B":"Initiation of adjuvant checkpoint blockade with atezolizumab depending on PD-L1 status; however, the adjuvant ALEXANDRA/IMpassion030 trial was negative, and there is currently no established role for starting adjuvant atezolizumab based on PD-L1 in this setting. Post-neoadjuvant adjuvant atezolizumab has not been validated for residual TNBC, and PD-L1-based selection applies to the metastatic pembrolizumab indication rather than the early-stage adjuvant setting.","C":"Start adjuvant pembrolizumab: SWOG S1418/NRG-BR006 has proven benefit for ypNmi after neoadjuvant chemotherapy, so it should be started; however, the publicly available trial data show that the study has closed enrollment and final efficacy results confirming benefit are still awaited. Extrapolating from ongoing trial enrollment to a treatment recommendation is premature without published primary endpoint analysis confirming that adjuvant pembrolizumab improves outcomes in this residual-disease population.","D":"No further systemic therapy is indicated because ypNmi is minimal residual disease and does not alter recurrence risk; in fact, micrometastatic nodal disease after neoadjuvant chemotherapy represents a favorable pathologic response that does not warrant post-neoadjuvant systemic therapy escalation, and residual TNBC after neoadjuvant chemotherapy in this scenario is adequately managed with surveillance alone without adjuvant capecitabine or any other systemic agent.","E":"Do not start adjuvant pembrolizumab outside a trial: KEYNOTE-522 supports perioperative pembrolizumab (begin preoperatively and continued adjuvantly), but there is no evidence base to \"start late\" post-op after chemo alone; the most evidence-supported adjuvant systemic option for residual TNBC after neoadjuvant chemotherapy is capecitabine based on CREATE-X (and consider olaparib only if germline BRCA1/2 with qualifying high-risk criteria per OlympiA)."},"correct_answer":"E","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate.","references":["Korde LA, Somerfield MR, Carey LA, et al. ASCO Guideline Rapid Recommendation Update: pembrolizumab with neoadjuvant chemotherapy followed by adjuvant pembrolizumab for T1cN1-2 or T2-4N0 stage II/III TNBC. J Clin Oncol. 2022."],"length_bias_flag":"MODERATE"},{"id":"74","section":"Curative Treatment","question":"When is neoadjuvant chemotherapy preferred over upfront surgery in clinically node-negative TNBC?","options":{"A":"False because neoadjuvant therapy is not used only when mastectomy is already planned, and it is not primarily a way to \u201cjustify\u201d later capecitabine or olaparib. Those are post-neoadjuvant options if residual disease is present; they are not the main reason to choose NAC up front.","B":"False because the value of NAC in TNBC is not confined to germline BRCA1/2 carriers. AGO specifically states platinum addition can be considered irrespective of gBRCA status, and TNBC neoadjuvant decision-making is not restricted to BRCA-mutated disease.","C":"False because it is too restrictive. Pembrolizumab-based perioperative therapy is standard for stage II/III disease, but neoadjuvant chemotherapy is not limited to cT2+ tumors and is not used only to \u201cenable pembrolizumab.\u201d cT1cN0 TNBC is also a recognized neoadjuvant setting in current guidelines.","D":"For any cN0 TNBC \u2265T1c (>1 cm), because TNBC's aggressive biology and the opportunity for downstaging to facilitate breast-conserving surgery favor neoadjuvant chemotherapy over initial surgery, and current ASCO and AGO guidelines specifically list cT1cN0 TNBC as a neoadjuvant-preferred scenario","E":"False because NAC is not reserved for inoperable disease. It is standard or preferred in many operable TNBC cases, especially stage II/III and commonly cT1cN0, precisely to guide systemic management and potentially improve surgical outcomes."},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate overall. High that NAC is standard/preferred for stage II/III TNBC. Moderate for cT1cN0 specifically, because guideline support exists, but the strength is lower than for larger or node-positive disease and is based more on guideline synthesis and nonrandomized/indirect evidence than on a dedicated randomized trial proving superiority over upfront surgery in all cT1cN0 cases.","references":["Korde LA, Somerfield MR, Carey LA, et al. Neoadjuvant Chemotherapy, Endocrine Therapy, and Targeted Therapy for Breast Cancer: ASCO Guideline. J Clin Oncol. 2021. PubMed summary: patients with TNBC who are clinically node-positive and/or at least T1c should be offered neoadjuvant anthracycline- and taxane-containing therapy."],"length_bias_flag":"NONE"},{"id":"75","section":"Curative Treatment","question":"A 52-year-old patient has an invasive breast carcinoma that is HR-negative, HER2-low (IHC 1+, ISH\u2013), clinical stage cT2 cN0, G2. What is the most appropriate standard treatment approach?","options":{"A":"False because trastuzumab deruxtecan is not standard adjuvant therapy for early HER2-low breast cancer with residual disease; the current HER2-low relevance recognized by ASCO/CAP is in metastatic eligibility, not routine early-stage adjuvant use. This option also omits the standard perioperative pembrolizumab approach.","B":"False because HER2-low is not HER2-positive disease. Trastuzumab with or without pertuzumab is for HER2-positive tumors, not IHC 1+, ISH-negative tumors.","C":"Neoadjuvant paclitaxel plus carboplatin plus pembrolizumab followed by AC plus pembrolizumab, then surgery; continue adjuvant pembrolizumab to complete one year, with capecitabine only if pembrolizumab is contraindicated.","D":"False because it omits pembrolizumab in a stage II TNBC setting where perioperative pembrolizumab is the standard, and HER2-low status does not justify using a non-immunotherapy pathway instead.","E":"False because pembrolizumab is not a \u201cpost-operative only\u201d drug in this setting; the validated regimen starts it preoperatively with chemotherapy and continues it afterward."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: high.","references":["Schmid P, et al. Pembrolizumab for Early Triple-Negative Breast Cancer. N Engl J Med. 2020; updated survival results 2024."],"length_bias_flag":"NONE"},{"id":"76","section":"Curative Treatment","question":"A 35-year-old with stage II TNBC (grade 3, Ki-67 >25%) has residual invasive disease (non-pCR) after neoadjuvant therapy. Germline BRCA testing is negative. The treating oncologist plans adjuvant capecitabine. The patient asks whether an antibody\u2013drug conjugate (ADC) such as sacituzumab govitecan (SG) can be used instead or in addition. Which option best reflects current evidence-based management and the role of ADCs in this scenario?","options":{"A":"False because the first clause is too absolute. SG is not standard adjuvant therapy, but it is not true that there are no adjuvant or post-neoadjuvant SG trials. SASCIA is a phase III post-neoadjuvant trial and ASCENT-05/OptimICE-RD is an ongoing phase III trial.","B":"Do not use adjuvant SG outside clinical trials; SG has been evaluated post-neoadjuvant in SASCIA, and SG plus pembrolizumab is under investigation in ASCENT-05 with results awaited","C":"False because grade 3 and Ki-67 >25% do not identify a validated subgroup for adjuvant SG escalation after non-pCR, and there is no evidence-based standard to add SG to capecitabine on that basis.","D":"False because germline BRCA negativity does not create an indication for adjuvant SG. BRCA status mainly matters here because olaparib would be relevant in qualifying germline BRCA1/2 carriers, not because SG becomes standard in BRCA-wildtype disease.","E":"False because SG is not evidence-based standard of care for residual early TNBC after neoadjuvant therapy. No prospective phase III result has established adjuvant SG as a standard replacement for capecitabine in this setting."},"correct_answer":"B","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nHigh that capecitabine is an evidence-based standard option for residual TNBC after neoadjuvant chemotherapy. Low for adjuvant SG outside trials, because current support is investigational only and based on ongoing studies rather than practice-changing efficacy results. Overall for choosing E over the other options: moderate.","references":["Masuda N, et al. Adjuvant Capecitabine for Breast Cancer after Preoperative Chemotherapy. N Engl J Med. 2017."],"length_bias_flag":"NONE"},{"id":"77","section":"Curative Treatment","question":"What is the role of platinum agents in early-stage TNBC outside BRCA-mutated disease?","options":{"A":"False because the claim that carboplatin only increases pCR without durable benefit is outdated. BrighTNess showed improved EFS with carboplatin, and current guidelines still incorporate carboplatin rather than recommending it be omitted routinely in modern regimens.","B":"False because platinum\u2019s established role is as part of neoadjuvant therapy, not primarily as a post-neoadjuvant escalation strategy for residual disease. The statement that neoadjuvant carboplatin lacks meaningful pCR improvement is directly contradicted by randomized trial data.","C":"False because it overgeneralizes to all stage I-III TNBC, including T1a/bN0, and incorrectly suggests platinum can reasonably replace anthracyclines as routine practice. Current guidance supports platinum-containing regimens mainly in higher-risk disease, and anthracycline-free substitution is not established here as a standard based on the cited evidence.","D":"In KEYNOTE-522\u2013eligible disease (e.g., T1cN1 or T2+), the paclitaxel + carboplatin + pembrolizumab backbone yields a \\~13\u201314% absolute pCR increase (64.8% vs 51.2%) with EFS/OS benefit reported in updates; outside germline BRCA, platinum is often favored in higher-risk patients, but clinicians still individualize based on myelosuppression risk and ability to maintain dose intensity.","E":"False because platinum benefit is not confined to germline BRCA carriers. AGO 2025 explicitly states platinum can be added irrespective of germline BRCA status, and correlative BrighTNess analyses did not show that benefit was limited to BRCA-mutated patients."},"correct_answer":"D","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate to high. High that carboplatin is part of the standard pembrolizumab-containing neoadjuvant regimen for stage II/III TNBC and that it improves pCR. Moderate for a broad statement that platinum should be favored outside BRCA-mutated disease in all higher-risk patients, because some of that is still guideline synthesis and individualized practice rather than a single definitive trial answering every subgroup.","references":["Loibl S, et al. Early breast cancer: ESMO Clinical Practice Guideline for diagnosis, treatment and follow-up. Ann Oncol. 2024. Stage II-III TNBC: taxane-carboplatin followed by AC/EC with pembrolizumab is recommended."],"length_bias_flag":"MILD"},{"id":"78","section":"Curative Treatment","question":"In patients with HER2-positive, node-negative tumors \u22642 cm, in which scenario is systemic de-escalation most consistent with contemporary evidence and guideline-based practice?","options":{"A":"False because T-DM1 has shown excellent outcomes in ATEMPT, but it has not replaced paclitaxel/trastuzumab as the standard de-escalated regimen for stage I disease. ATEMPT was designed around toxicity and acceptable efficacy, and subsequent analyses have not established T-DM1 as superior enough to supplant TH as routine standard.","B":"False because routine neoadjuvant chemotherapy plus dual HER2 blockade for any T1cN0 tumor is more intensive than contemporary stage I practice. Consensus guidance for stage I HER2-positive disease continues to favor paclitaxel/trastuzumab, not mandatory neoadjuvant dual blockade with later shortening of trastuzumab.","C":"For T1b\u2013T1cN0 tumors (about 0.5\u20132.0 cm), a de-escalated adjuvant regimen of weekly paclitaxel for 12 weeks plus trastuzumab to complete 1 year is an accepted standard alternative to multi-agent or anthracycline-based therapy; for selected T1aN0 tumors (\u22645 mm), omission of systemic therapy may be reasonable in very low-risk or comorbid patients.","D":"False because de-escalation is not limited to HR-positive disease. Paclitaxel plus trastuzumab is used for stage I HER2-positive disease irrespective of HR status, and reviews summarizing guideline practice note it can be considered particularly for pT1N0 HER2-positive cancers, especially if HR-negative.","E":"False because trastuzumab monotherapy is not an evidence-based equivalent to chemo plus trastuzumab in this setting. The evidence base supporting de-escalation is for paclitaxel plus trastuzumab, not trastuzumab alone."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence:\nModerate to high. High for paclitaxel plus trastuzumab as the accepted de-escalated standard in T1b-T1cN0 disease, supported by APT long-term data and consensus/guideline adoption. Moderate for omission of systemic therapy in selected T1aN0 tumors, because that is based on limited prospective evidence and individualized guideline interpretation rather than randomized trials versus no treatment.","references":["Tolaney SM, et al. Adjuvant paclitaxel and trastuzumab for node-negative, HER2-positive breast cancer: final 10-year analysis of the phase 2 APT trial. Lancet Oncol. 2023. 10-year invasive DFS 91.3%, recurrence-free interval 96.3%."],"length_bias_flag":"MILD"},{"id":"79","section":"Curative Treatment","question":"How do age, frailty, and comorbidities modify the indication for chemotherapy in patients with biologically high-risk early breast cancer?","options":{"A":"False because frailty and comorbidity affect the treatment decision itself, not just supportive care. ASCO recommends geriatric assessment specifically to inform chemotherapy decision-making by identifying vulnerabilities not routinely captured in standard oncology evaluation.","B":"False because ASTER 70s was not a pan-cancer or pan-subtype result; it addressed women \u226570 with ER-positive, HER2-negative, genomic-high-risk disease, not all biologic subtypes.","C":"Age alone is not decisive; competing mortality from frailty or comorbidity may make the absolute benefit of chemotherapy negligible even in biologically aggressive disease, and geriatric assessment should inform treatment decisions","D":"False because frailty is not just a dose-reduction issue. When competing mortality and frailty are substantial, the net benefit of chemotherapy may be too small to justify treatment at all.","E":"False because chronological age \u226570 should not automatically override tumor biology; guideline-based care emphasizes physiologic age, frailty, comorbidity, and life expectancy rather than age alone."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate. High for the principle that geriatric assessment, frailty, comorbidity, and life expectancy should modify chemotherapy decisions in older adults. Moderate for applying that principle across all biologically high-risk early breast cancers, because direct randomized data are limited and vary by subtype; ASTER 70s is strong but subtype-specific.","references":["Biganzoli L, et al. Updated recommendations regarding the management of older patients with breast cancer: EUSOMA and SIOG joint paper. Lancet Oncol. 2021."],"length_bias_flag":"NONE"},{"id":"80","section":"Curative Treatment","question":"After breast-conserving surgery, when can radiation safely be omitted in low-risk HR+ patients?","options":{"A":"False because age 62 is below the classic randomized omission populations used in guideline-based standard practice. More recent biomarker-selected studies explored younger ages, but this is not the routine omission scenario from established guidelines. ([nejm.org](https://www.nejm.org/doi/full/10.1056/NEJMoa2207586?utm_source=chatgpt.com))","B":"False because HER2-positive disease is not the low-risk HR-positive omission population studied in CALGB 9343 or PRIME II, and pT2 >2 cm also falls outside the classic CALGB omission criteria. ([nejm.org](https://www.nejm.org/doi/full/10.1056/NEJMoa2207586?utm_source=chatgpt.com))","C":"A 72-year-old woman with pT1c (1.7 cm), pN0, ER-positive, PR-positive, clear margins, and planned adjuvant endocrine therapy; this matches the CALGB 9343 and PRIME II trial populations in which omission of whole-breast radiation after breast-conserving surgery did not worsen overall survival when adjuvant endocrine therapy was given","D":"False as the single best answer because it is too broad and less trial-grounded. Limited life expectancy can support individualized omission, but the clearest contemporary evidence/guideline-based omission scenario is the older patient meeting CALGB/PRIME-style criteria, as in A. ([pmc.ncbi.nlm.nih.gov](https://pmc.ncbi.nlm.nih.gov/articles/PMC11846025/?utm_source=chatgpt.com))","E":"False because radiotherapy omission is not supported at any age just because the tumor is pT1N0 ER-positive and endocrine therapy is planned. Age and overall low-risk context still matter. ([nejm.org](https://www.nejm.org/doi/full/10.1056/NEJMoa2207586?utm_source=chatgpt.com))"},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: high for A.","references":["Hughes KS, et al. Lumpectomy Plus Tamoxifen With or Without Irradiation in Women Age 70 Years or Older With Early Breast Cancer: long-term CALGB 9343 results. J Clin Oncol. 2013. ([ascopost.com](https://ascopost.com/issues/august-15-2013/for-women-70-years-with-early-breast-cancer-adding-radiotherapy-to-lumpectomy-and-tamoxifen-does-not-increase-survival/?utm_source=chatgpt.com))"],"length_bias_flag":"NONE"},{"id":"81","section":"Curative Treatment","question":"What are current indications for post-mastectomy radiation therapy (PMRT) in patients with 1\u20133 positive nodes?","options":{"A":"PMRT should be recommended in patients if they have breast cancer with pT1-2, 1 or 2 positive nodes, ER/PR-positive and HER2-negative, even when they received axillary dissection; all patients with any degree of nodal involvement after upfront mastectomy require PMRT regardless of additional clinicopathologic features, tumor biology, or volume of axillary disease.","B":"PMRT is no longer recommended for patients with initial cN2-3 breast cancer who receive neoadjuvant systemic therapy and achieve pCR; complete pathologic response in the axilla eliminates the indication for regional radiation regardless of the initial clinical nodal burden, as pathologic downstaging supersedes the original clinical stage for all locoregional treatment decisions.","C":"PMRT is recommended for most patients with pN+ disease after upfront mastectomy, but may be omitted in select patients with pN1mic or low-burden pN1a (1\u20133 nodes) after adequate ALND when they have favorable features (e.g., pT1\u20132, low\u2013intermediate grade, HR+/HER2\u2013, postmenopausal, no LVI, and low 21-gene recurrence score), per the 2025 ASTRO/ASCO/SSO guideline","D":"PMRT should be recommended for patients with 1\u20133 positive nodes only when the positive nodes are sentinel nodes only without completion ALND; if a completion axillary dissection is performed, PMRT is not indicated because the axilla has been surgically cleared and the risk of locoregional recurrence is sufficiently low to omit radiation regardless of other tumor characteristics or biology.","E":"PMRT is indicated for all patients with 1\u20133 positive nodes, regardless of additional clinicopathologic features; all node-positive patients after mastectomy require comprehensive chest wall and regional nodal irradiation without exception, as even a single positive lymph node confers a locoregional recurrence risk that mandates radiation therapy regardless of tumor size, grade, or receptor status."},"correct_answer":"C","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate overall. High for the general recommendation that PMRT benefits patients with 1\u20133 positive nodes. Lower, evolving evidence for omission in select pN1mic/low-burden pN1a patients with favorable biology, even though this is now explicitly incorporated into the 2025 ASTRO/ASCO/SSO guideline.","references":["Jimenez RB, et al. Postmastectomy Radiation Therapy: An ASTRO-ASCO-SSO Clinical Practice Guideline. J Clin Oncol. 2025."],"length_bias_flag":"SEVERE"},{"id":"82","section":"Curative Treatment","question":"When is a tumor bed boost recommended after whole-breast irradiation?","options":{"A":"Best answer, with one caveat: \u201cpositive surgical margins\u201d is not the ideal wording because re-excision is usually preferred when feasible. Still, among the choices this option most closely matches contemporary risk-adapted practice.","B":"False because negative margins do not eliminate boost consideration in TNBC or G3 disease. Boost can still be recommended in these higher-risk subgroups to improve local control, even though overall survival is not improved.","C":"False because this describes a mostly lower-risk group except for positive margins, and it is not the population with the largest absolute boost benefit. Younger and biologically higher-risk patients derive more absolute local-control benefit.","D":"False because pN1 and LVI alone are not the core standard indications for a tumor-bed boost, and the statement incorrectly downplays margin status and biology. Current guidance still weighs age/menopausal status and biologic/local-risk features such as G3, TNBC, HER2-positive, and EIC.","E":"False because a boost is not recommended for all patients with any DCIS component regardless of age, grade, margins, and biology. The current approach is risk-adapted, not universal."},"correct_answer":"A","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate to high. High that boost improves local control but not overall survival, and that younger patients derive the greatest absolute benefit, based on randomized long-term EORTC data. Moderate for the exact modern risk-adapted feature set, because this comes from contemporary guideline/consensus synthesis rather than a single trial testing every listed subgroup.","references":["Bartelink H, Maingon P, Poortmans P, et al. Whole-breast irradiation with or without a boost for patients treated with breast-conserving surgery for early breast cancer: 20-year follow-up of a randomised phase 3 trial. Lancet Oncol. 2015."],"length_bias_flag":"NONE"},{"id":"83","section":"Curative Treatment","question":"In the setting of adjuvant hypofractionated whole-breast irradiation after breast-conserving surgery, which boost strategy enables biologically escalated dosing to the tumor bed without prolonging overall treatment time, through differential dose painting within the same fraction using inverse-planned photon therapy?","options":{"A":"Electron-based concomitant boost delivered in alternating fractions during whole-breast treatment; this approach uses matched electron fields to the tumor bed but does not employ inverse-planned photon dose painting within the same fraction as described in the stem.","B":"Post\u2013whole-breast interstitial high-dose-rate (HDR) brachytherapy boost delivered as a separate invasive procedure after completing external-beam whole-breast irradiation; this is not same-fraction integrated photon dose painting.","C":"Sequential external beam boost using conformal photon therapy following whole-breast irradiation, which adds additional fractions after the whole-breast course is completed and therefore prolongs overall treatment time rather than integrating the boost into the same fractionation schedule.","D":"Intraoperative kilovoltage radiotherapy applied immediately after tumor excision in the operating room; this is a single-fraction technique delivered at the time of surgery, not inverse-planned photon dose painting during the adjuvant hypofractionated whole-breast treatment course.","E":"Simultaneous integrated boost (SIB) delivered via inverse-planned IMRT, which enables differential dose painting of the whole breast and tumor bed within the same fraction, thereby providing biologically escalated dosing without prolonging overall treatment time"},"correct_answer":"E","short_rationale":"Not stated explicitly in the source draft.","why_other_options_are_wrong":"Not stated explicitly in the source draft.","evidence":"Level of evidence: moderate to high. The technical definition of SIB with inverse-planned IMRT is well established, and randomized/phase III data support that SIB can shorten treatment time with noninferior local control/cosmesis compared with sequential boost strategies.","references":["Franco P, et al. Intensity-modulated and hypofractionated simultaneous integrated boost adjuvant breast radiation employing statics ports of tomotherapy (TomoDirect): a prospective phase II trial. Describes SIB as integration of whole-breast and boost radiation in a single plan with differential dose per fraction, associated with inverse-planned IMRT."],"length_bias_flag":"NONE"},{"id":"84","section":"Curative Treatment","question":"A 52-year-old woman with pT2N1 HR+/HER2+ breast cancer completes 6 cycles of anthracycline-free, taxane-based chemotherapy with concurrent trastuzumab. She is now planned for adjuvant left-sided whole-breast RT. Her cardiologist clears her for continued trastuzumab. Which of the following statements best reflects the evidence-based approach to systemic therapy sequencing with RT in this patient?","options":{"A":"Capecitabine, if planned as extended adjuvant therapy for residual disease, can be safely administered concurrently with RT without meaningful increase in skin or mucosal toxicity, as fluoropyrimidine-based agents do not act as radiosensitizers in breast tissue at standard oral dosing.","B":"CDK4/6 inhibitors, if added as extended adjuvant therapy, should be held during RT due to enhanced myelosuppression and increased radiation dermatitis, per ASCO and ASTRO guidance; this recommendation applies specifically to HER2-positive early breast cancer receiving concurrent anti-HER2 and radiation therapy.","C":"RT should be delayed until trastuzumab is completed to avoid pulmonary radiosensitization, as trastuzumab significantly increases radiation-induced pneumonitis risk when delivered concurrently with whole-breast RT, particularly in left-sided disease with tangential field coverage.","D":"Trastuzumab should be held during RT regardless of cardiac clearance, as concurrent trastuzumab and left-sided RT produces a well-established synergistic increase in cardiomyopathy risk exceeding either modality alone, independent of prior anthracycline exposure or baseline cardiac function.","E":"Concurrent trastuzumab and RT is acceptable if cardiac function is preserved, as current evidence does not demonstrate a clinically significant additive cardiotoxicity beyond that seen with trastuzumab alone in this anthracycline-free context, and delaying trastuzumab would forgo a proven survival benefit"},"correct_answer":"E","short_rationale":"The central clinical distinction this question tests is whether trastuzumab concurrent with left-sided whole-breast RT is contraindicated in an anthracycline-free regimen. The answer is no. The well-established synergistic cardiotoxicity is primarily driven by the triple combination of anthracyclines + trastuzumab + RT. When anthracyclines are removed, the residual cardiac risk of concurrent trastuzumab + RT does not exceed the risk of trastuzumab alone, provided baseline cardiac function is preserved and LVEF is monitored.","why_other_options_are_wrong":"B is no
